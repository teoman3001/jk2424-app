<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pricing Settings – JK2424 ADMIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background:#050505;
      color:#f5f5f5;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin:0;
      padding:20px;
    }
    h1 {
      font-size:22px;
      color:#f9d25a;
      margin-bottom:20px;
    }
    .card {
      background:#111;
      padding:20px;
      border:1px solid #333;
      border-radius:12px;
      max-width:500px;
    }
    label {
      font-size:13px;
      color:#ccc;
      display:block;
      margin-bottom:6px;
    }
    input {
      width:100%;
      padding:10px;
      font-size:14px;
      border-radius:8px;
      border:1px solid #444;
      background:#0c0c0c;
      color:#fff;
      margin-bottom:16px;
    }
    button {
      width:100%;
      padding:12px;
      font-size:14px;
      background:#f9d25a;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      color:#000;
    }
    #msg {
      margin-top:10px;
      font-size:13px;
      color:#7dd3fc;
    }
  </style>
</head>

<body>
  <h1>Pricing Settings</h1>

  <div class="card">
    <label>Base Fare ($)</label>
    <input id="baseFare" type="number" step="0.01" />

    <label>Included Miles</label>
    <input id="includedMiles" type="number" step="0.1" />

    <label>Extra Per Mile ($)</label>
    <input id="extraPerMile" type="number" step="0.01" />

    <label>Minimum Fare ($)</label>
    <input id="minFare" type="number" step="0.01" />

    <button id="saveBtn">Save Settings</button>

    <div id="msg"></div>
  </div>

  <script>
    async function loadSettings() {
      try {
        const res = await fetch('/api/admin/pricing');
        const data = await res.json();
        if (!data.ok) return;

        document.getElementById('baseFare').value = data.settings.baseFare;
        document.getElementById('includedMiles').value = data.settings.includedMiles;
        document.getElementById('extraPerMile').value = data.settings.extraPerMile;
        document.getElementById('minFare').value = data.settings.minFare;

      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const baseFare = Number(document.getElementById('baseFare').value);
      const includedMiles = Number(document.getElementById('includedMiles').value);
      const extraPerMile = Number(document.getElementById('extraPerMile').value);
      const minFare = Number(document.getElementById('minFare').value);

      const body = {
        baseFare,
        includedMiles,
        extraPerMile,
        minFare
      };

      document.getElementById('msg').textContent = 'Saving...';

      try {
        const res = await fetch('/api/admin/pricing', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (data.ok) {
          document.getElementById('msg').textContent = 'Saved successfully!';
        } else {
          document.getElementById('msg').textContent = 'Error saving.';
        }

      } catch(err) {
        console.error(err);
        document.getElementById('msg').textContent = 'Server error.';
      }
    });

    loadSettings();
  </script>
</body>
</html>
