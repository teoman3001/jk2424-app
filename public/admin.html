<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #050505;
      color: #f5f5f5;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .brand {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 4px;
      color: #f5d05c;
    }
    .sub {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #444;
      color: #fff;
      background: #111;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 8px;
      margin-top: 4px;
    }
    .card {
      background: #111;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 18px 36px rgba(0,0,0,0.6);
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #aaa;
      margin-bottom: 4px;
      display: block;
    }
    input, select {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #444;
      background: #050505;
      color: #f5f5f5;
      padding: 6px 8px;
      font-size: 13px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #f5d05c;
      box-shadow: 0 0 0 1px #f5d05c55;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    button {
      border-radius: 999px;
      border: none;
      background: #f5d05c;
      color: #000;
      font-weight: 600;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .status {
      margin-top: 6px;
      font-size: 12px;
      color: #aaa;
    }
    .status.ok { color: #6bff94; }
    .status.err { color: #ff6b6b; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 900px;
    }
    thead {
      background: #181818;
    }
    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid #222;
      vertical-align: top;
    }
    th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ccc;
    }
    tbody tr:nth-child(even) {
      background: #101010;
    }
    .pill-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      text-transform: capitalize;
      background: #222;
      color: #eee;
    }
    .pill-status.pending { background:#444; }
    .pill-status.confirmed { background:#265dff; }
    .pill-status.paid { background:#169c5d; }
    .pill-status.on_the_way { background:#f0a500; }
    .pill-status.arrived { background:#c27c2c; }
    .pill-status.completed { background:#1fb36a; }
    .pill-status.cancelled { background:#a32d2d; }
    .hint {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand">JK2424</div>
        <div class="sub">PRIVATE CHAUFFEUR · ADMIN PANEL</div>
      </div>
      <div class="badge">Internal use only</div>
    </header>

    <!-- PRICING SETTINGS -->
    <section class="card">
      <div class="section-header">
        <h2>Pricing settings</h2>
        <small class="hint">These values are used by web and mobile when calculating estimates.</small>
      </div>

      <div class="grid">
        <div>
          <label for="baseFare">Base fare ($)</label>
          <input id="baseFare" type="number" step="0.01" />
        </div>
        <div>
          <label for="includedMiles">Included miles</label>
          <input id="includedMiles" type="number" step="0.01" />
        </div>
        <div>
          <label for="extraPerMile">Extra per mile ($)</label>
          <input id="extraPerMile" type="number" step="0.01" />
        </div>
        <div>
          <label for="minimumFare">Minimum fare ($)</label>
          <input id="minimumFare" type="number" step="0.01" />
        </div>
        <div>
          <label for="nightMultiplier">Night multiplier (×)</label>
          <input id="nightMultiplier" type="number" step="0.01" />
        </div>
      </div>

      <button id="savePricingBtn">Save pricing</button>
      <div id="pricingStatus" class="status"></div>
    </section>

    <!-- BOOKINGS -->
    <section class="card">
      <div class="section-header">
        <h2>Bookings</h2>
        <small class="hint">Newest first. Change status from the dropdown.</small>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Created</th>
              <th>Trip</th>
              <th>Customer</th>
              <th>Miles</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <!-- Filled by admin.js -->
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Admin JS -->
  <script src="./admin.js"></script>
</body>
</html>
