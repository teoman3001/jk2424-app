<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 ADMIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:#050505;
      color:#f5f5f5;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }
    .brand {
      font-weight:700;
      font-size:20px;
      letter-spacing:2px;
      color:#f9d25a;
    }
    .sub {
      font-size:11px;
      color:#aaa;
    }
    .badge {
      font-size:11px;
      padding:2px 8px;
      border-radius:999px;
      background:#1b1b1b;
      border:1px solid #333;
      margin-left:8px;
    }

    .filters {
      display:flex;
      gap:6px;
      margin: 8px 0 16px 0;
      flex-wrap:wrap;
    }
    .filter-btn {
      font-size:11px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid #444;
      background:#111;
      color:#ddd;
      cursor:pointer;
    }
    .filter-btn.active {
      background:#f9d25a;
      color:#111;
      border-color:#f9d25a;
      font-weight:600;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:11px;
      background:#0c0c0c;
      border-radius:8px;
      overflow:hidden;
    }
    thead {
      background:#151515;
      text-transform:uppercase;
      letter-spacing:0.05em;
    }
    th, td {
      padding:8px 10px;
      border-bottom:1px solid #222;
      vertical-align:top;
    }
    tbody tr:hover {
      background:#141414;
    }
    th:nth-child(1),
    td:nth-child(1) {
      width:60px;
      white-space:nowrap;
    }
    th:nth-child(2) { width:210px; }
    th:nth-child(3) { width:230px; }
    th:nth-child(4) { width:150px; }
    th:nth-child(5) { width:60px; text-align:right; }
    th:nth-child(6) { width:80px; text-align:right; }
    th:nth-child(7) { width:150px; }
    th:nth-child(8) { width:210px; }

    td.num { text-align:right; }

    .status-pill {
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:0.06em;
    }
    .st-pending   { background:#33240c; color:#f9d25a; }
    .st-confirmed { background:#123222; color:#7de3a3; }
    .st-paid      { background:#10314a; color:#7dd3fc; }
    .st-on_the_way{ background:#2a2340; color:#c4b5fd; }
    .st-arrived   { background:#1f2933; color:#fbbf24; }
    .st-completed { background:#0f2f24; color:#6ee7b7; }
    .st-cancelled { background:#3b0f16; color:#fecaca; }

    .actions {
      display:flex;
      flex-wrap:wrap;
      gap:4px;
    }
    .btn-sm {
      font-size:10px;
      padding:3px 6px;
      border-radius:999px;
      border:1px solid #333;
      background:#111;
      color:#eee;
      cursor:pointer;
    }
    .btn-sm.route { border-color:#444; }
    .btn-sm.confirm { border-color:#2563eb; color:#bfdbfe; }
    .btn-sm.paid { border-color:#16a34a; color:#bbf7d0; }
    .btn-sm.onway { border-color:#a855f7; color:#e9d5ff; }
    .btn-sm.arrived { border-color:#f97316; color:#fed7aa; }
    .btn-sm.completed { border-color:#22c55e; color:#bbf7d0; }
    .btn-sm.cancel { border-color:#ef4444; color:#fecaca; }

    .msg {
      margin-top:10px;
      font-size:11px;
      color:#9ca3af;
    }

    @media (max-width:900px) {
      table, thead, tbody, th, td, tr { display:block; }
      thead { display:none; }
      tr { border-bottom:1px solid #222; padding:8px 0; }
      td { border:none; padding:3px 0; }
      td::before {
        content: attr(data-label);
        display:block;
        font-size:10px;
        text-transform:uppercase;
        color:#6b7280;
        margin-bottom:1px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand">JK2424 ADMIN</div>
        <div class="sub" id="summaryText">Loading bookings…</div>
      </div>
      <div class="badge" id="todayInfo"></div>
    </header>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="confirmed">Confirmed</button>
      <button class="filter-btn" data-filter="paid">Paid</button>
      <button class="filter-btn" data-filter="on_the_way">On the way</button>
      <button class="filter-btn" data-filter="arrived">Arrived</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="cancelled">Cancelled</button>
    </div>

    <table>
      <thead>
        <tr>
          <th># / Created</th>
          <th>Client</th>
          <th>Trip</th>
          <th>Date &amp; Time</th>
          <th>Miles</th>
          <th>Total</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="msg" id="msgArea"></div>
  </div>

  <script>
    const rowsEl = document.getElementById('rows');
    const msgEl = document.getElementById('msgArea');
    const summaryText = document.getElementById('summaryText');
    const todayInfo = document.getElementById('todayInfo');
    const filterButtons = document.querySelectorAll('.filter-btn');
    let allBookings = [];
    let currentFilter = 'all';

    function formatDateTime(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day   = String(d.getDate()).padStart(2, '0');
      const year  = d.getFullYear();
      let hrs = d.getHours();
      const mins = String(d.getMinutes()).padStart(2, '0');
      const ampm = hrs >= 12 ? 'PM' : 'AM';
      hrs = hrs % 12;
      if (hrs === 0) hrs = 12;
      return `${month}/${day}/${year} · ${String(hrs).padStart(2,'0')}:${mins} ${ampm}`;
    }

    function statusClass(st) {
      return 'status-pill st-' + st;
    }

    function statusLabel(st) {
      switch (st) {
        case 'pending': return 'Pending';
        case 'confirmed': return 'Confirmed';
        case 'paid': return 'Paid';
        case 'on_the_way': return 'On the way';
        case 'arrived': return 'Arrived';
        case 'completed': return 'Completed';
        case 'cancelled': return 'Cancelled';
        default: return st;
      }
    }

    function render() {
      let list = allBookings.slice();
      if (currentFilter !== 'all') {
        list = list.filter(b => b.status === currentFilter);
      }
      rowsEl.innerHTML = '';

      if (!list.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 8;
        td.textContent = 'No bookings for this filter.';
        td.style.textAlign = 'center';
        td.style.padding = '20px 0';
        tr.appendChild(td);
        rowsEl.appendChild(tr);
        return;
      }

      list.forEach((b, idx) => {
        const tr = document.createElement('tr');

        const milesNum = Number(b.miles ?? 0);
        const totalNum = Number(b.total ?? 0);

        const created = b.created_at ? new Date(b.created_at) : null;
        const createdStr = created && !Number.isNaN(created.getTime())
          ? created.toLocaleString(undefined, { month:'2-digit', day:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
          : '';

        const tdIndex = document.createElement('td');
        tdIndex.setAttribute('data-label', '# / Created');
        tdIndex.innerHTML = `#${b.id}<br/><span style="color:#9ca3af;">${createdStr}</span>`;
        tr.appendChild(tdIndex);

        const tdClient = document.createElement('td');
        tdClient.setAttribute('data-label', 'Client');
        tdClient.innerHTML = `
          <div style="font-weight:600;">${b.customer_name || '-'}</div>
          <div style="color:#9ca3af;">${b.customer_phone || ''}</div>
          <div style="color:#6b7280;">${b.customer_email || ''}</div>
        `;
        tr.appendChild(tdClient);

        const tdTrip = document.createElement('td');
        tdTrip.setAttribute('data-label', 'Trip');
        tdTrip.innerHTML = `
          <div><span style="color:#9ca3af;">Pickup:</span> ${b.pickup}</div>
          <div><span style="color:#9ca3af;">Drop-off:</span> ${b.dropoff}</div>
          ${b.stop ? `<div><span style="color:#9ca3af;">Extra stop:</span> ${b.stop}</div>` : ''}
        `;
        tr.appendChild(tdTrip);

        const tdDate = document.createElement('td');
        tdDate.setAttribute('data-label', 'Date & Time');
        tdDate.innerHTML = `${b.ride_date || ''} ${b.ride_time || ''}`.trim();
        tr.appendChild(tdDate);


        const tdMiles = document.createElement('td');
        tdMiles.className = 'num';
        tdMiles.setAttribute('data-label', 'Miles');
        tdMiles.textContent = milesNum ? milesNum.toFixed(2) : '-';
        tr.appendChild(tdMiles);

        const tdTotal = document.createElement('td');
        tdTotal.className = 'num';
        tdTotal.setAttribute('data-label', 'Total');
        tdTotal.textContent = totalNum ? '$' + totalNum.toFixed(2) : '-';
        tr.appendChild(tdTotal);

        const tdStatus = document.createElement('td');
        tdStatus.setAttribute('data-label', 'Status');
        const sp = document.createElement('span');
        sp.className = statusClass(b.status);
        sp.textContent = statusLabel(b.status);
        tdStatus.appendChild(sp);
        tr.appendChild(tdStatus);

        const tdActions = document.createElement('td');
        tdActions.className = 'actions';
        tdActions.setAttribute('data-label', 'Actions');

        const btnRoute = document.createElement('button');
        btnRoute.className = 'btn-sm route';
        btnRoute.textContent = 'Open route';
        btnRoute.onclick = () => {
          const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(b.pickup)}&destination=${encodeURIComponent(b.dropoff || '')}`;
          window.open(url, '_blank');
        };
        tdActions.appendChild(btnRoute);

        function addStatusButton(label, statusValue, cls) {
          const bt = document.createElement('button');
          bt.className = 'btn-sm ' + cls;
          bt.textContent = label;
          bt.onclick = () => updateStatus(b.id, statusValue);
          tdActions.appendChild(bt);
        }

        if (b.status === 'pending') {
          addStatusButton('Confirm', 'confirmed', 'confirm');
          addStatusButton('Cancel', 'cancelled', 'cancel');
        } else if (b.status === 'confirmed') {
          addStatusButton('Payment received', 'paid', 'paid');
          addStatusButton('Cancel', 'cancelled', 'cancel');
        } else if (b.status === 'paid') {
          addStatusButton('On the way', 'on_the_way', 'onway');
          addStatusButton('Cancel', 'cancelled', 'cancel');
        } else if (b.status === 'on_the_way') {
          addStatusButton('Arrived', 'arrived', 'arrived');
          addStatusButton('Cancel', 'cancelled', 'cancel');
        } else if (b.status === 'arrived') {
          addStatusButton('Completed', 'completed', 'completed');
          addStatusButton('Cancel', 'cancelled', 'cancel');
        }

        tr.appendChild(tdActions);
        rowsEl.appendChild(tr);
      });
    }

    async function loadBookings() {
      msgEl.textContent = '';
      try {
        const res = await fetch('/api/admin/bookings');
        const data = await res.json();
        if (!data.ok) {
          msgEl.textContent = 'Server error while loading.';
          console.error('Load error:', data);
          return;
        }
        allBookings = data.bookings || [];
        const total = allBookings.length;
        const today = new Date();
        const todayStr = today.toLocaleDateString(undefined, { month:'short', day:'2-digit', year:'numeric' });
        todayInfo.textContent = `${total} bookings loaded · Today: ${todayStr}`;
        summaryText.textContent = 'Use the filters above to see ride status.';
        render();
      } catch (err) {
        console.error(err);
        msgEl.textContent = 'Server error while loading.';
      }
    }

    async function updateStatus(id, newStatus) {
      msgEl.textContent = 'Updating status…';
      try {
        const res = await fetch(`/api/admin/bookings/${id}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        const data = await res.json();
        if (!data.ok) {
          msgEl.textContent = 'Could not update status.';
          console.error('Status error:', data);
          return;
        }
        const idx = allBookings.findIndex(b => b.id === id);
        if (idx !== -1) {
          allBookings[idx].status = newStatus;
        }
        msgEl.textContent = 'Status updated.';
        render();
      } catch (err) {
        console.error(err);
        msgEl.textContent = 'Server error while updating status.';
      }
    }

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    loadBookings();
  </script>
</body>
</html>
