<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo {
      text-align:center;
      margin-bottom:24px;
    }
    .logo-title {
      font-size:28px;
      letter-spacing:0.25em;
      font-weight:700;
      color:#f5d05c;
    }
    .logo-sub {
      margin-top:4px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#cccccc;
    }
    .box {
      background:#111;
      width:100%;
      max-width:500px;
      border-radius:10px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 0 0 1px #222;
    }
    label {
      display:block;
      font-size:12px;
      margin-bottom:6px;
      color:#ddd;
      letter-spacing:0.05em;
    }
    input, textarea, select {
      width:100%;
      padding:10px;
      border-radius:6px;
      border:1px solid #333;
      background:#000;
      color:#fff;
      margin-bottom:12px;
      font-size:14px;
    }
    button {
      width:100%;
      padding:12px;
      border-radius:6px;
      border:none;
      background:#f5d05c;
      color:#000;
      font-size:15px;
      font-weight:600;
      letter-spacing:0.05em;
      cursor:pointer;
      margin-top:6px;
    }
    button:hover { opacity:0.9; }

    .estimate-box {
      background:#151515;
      padding:14px;
      border-radius:8px;
      margin-top:10px;
      line-height:1.5;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="logo">
  <div class="logo-title">JK 2424</div>
  <div class="logo-sub">PRIVATE CHAUFFEUR SERVICE</div>
</div>

<!-- TRIP DETAILS -->
<div class="box">
  <h3 style="margin-bottom:12px;">Step 1 • Trip Details</h3>

  <label>Pickup Location</label>
  <input id="pickup" placeholder="Enter pickup address" />

  <label>Extra Stop (Optional)</label>
  <input id="extra_stop" placeholder="Enter extra stop address" />

  <label>Drop-off Location</label>
  <input id="dropoff" placeholder="Enter dropoff address" />

  <label>Date (MM/DD/YYYY)</label>
  <input id="date" type="text" placeholder="12/25/2025" />

  <label>Time (HH:MM)</label>
  <input id="time" type="text" placeholder="02:15" />

  <div style="display:flex; gap:10px; margin-top:12px;">
    <button id="amBtn">AM</button>
    <button id="pmBtn">PM</button>
  </div>

  <button id="calcPriceBtn" style="margin-top:14px;">CALCULATE PRICE</button>

  <div id="estimate" class="estimate-box" style="display:none;"></div>
</div>

<!-- PASSENGER DETAILS -->
<div class="box">
  <h3 style="margin-bottom:12px;">Step 2 • Passenger Details</h3>

  <div id="summary"></div>

  <label>Full Name</label>
  <input id="fullName" />

  <label>Mobile Phone</label>
  <input id="phone" />

  <label>Email (For Confirmation)</label>
  <input id="email" />

  <label>Notes</label>
  <textarea id="notes" placeholder="Optional notes..."></textarea>

  <button id="sendBtn">SEND RESERVATION REQUEST</button>

  <div id="msg" style="margin-top:10px; font-size:13px; color:#f5d05c;"></div>
</div>

<script>
// BACKEND ADRESI — DÜZELTILMIŞ HALI
const API_BASE = "https://jk2424-backend.onrender.com/api";

let ampm = "AM";
document.getElementById("amBtn").onclick = () => (ampm = "AM");
document.getElementById("pmBtn").onclick = () => (ampm = "PM");

// PRICE CALCULATION
document.getElementById("calcPriceBtn").onclick = async () => {
  const pickup = document.getElementById("pickup").value;
  const extra = document.getElementById("extra_stop").value;
  const dropoff = document.getElementById("dropoff").value;

  const url =
    API_BASE +
    `/calc-price?pickup=${encodeURIComponent(pickup)}&extra_stop=${encodeURIComponent(extra)}&dropoff=${encodeURIComponent(dropoff)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("estimate").style.display = "block";
    document.getElementById("estimate").innerHTML = `
      Distance: ${data.distance} miles<br>
      Base fare: $${data.baseFare}<br>
      Extra miles: $${data.extraMiles}<br>
      Night fee: $${data.nightFee}<br><br>
      <b>Estimated total: $${data.total}</b>
    `;

    document.getElementById("summary").innerHTML = `
      <b>Pickup:</b> ${pickup}<br>
      <b>Extra stop:</b> ${extra || "None"}<br>
      <b>Dropoff:</b> ${dropoff}<br>
    `;

  } catch (err) {
    alert("Price calculation failed.");
  }
};

// SEND RESERVATION — ARTIK ÇALIŞACAK
document.getElementById("sendBtn").onclick = async () => {
  const payload = {
    pickup: document.getElementById("pickup").value,
    extra_stop: document.getElementById("extra_stop").value,
    dropoff: document.getElementById("dropoff").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value + " " + ampm,
    fullName: document.getElementById("fullName").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    notes: document.getElementById("notes").value,
  };

  try {
    const res = await fetch(API_BASE + "/bookings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    if (!res.ok) throw new Error();

    document.getElementById("msg").innerText =
      "Your reservation has been submitted successfully.";

  } catch (err) {
    document.getElementById("msg").innerText =
      "Server error while sending reservation.";
  }
};
</script>

</body>
</html>
