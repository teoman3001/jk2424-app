<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo { text-align:center; margin-bottom:24px; }
    .logo-title {
      font-size:28px; letter-spacing:0.25em; font-weight:700; color:#f5d05c;
    }
    .logo-sub {
      margin-top:4px; font-size:12px; text-transform:uppercase;
      letter-spacing:0.12em; color:#cccccc;
    }
    .wrapper { width:100%; max-width:560px; }
    h1 { font-size:26px; margin-bottom:4px; }
    .lead { font-size:13px; line-height:1.5; color:#cccccc; margin-bottom:18px; }

    .card {
      background:#111; border-radius:14px; border:1px solid #333;
      padding:18px 18px 20px; margin-bottom:18px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .card-header-pill {
      display:inline-block; padding:5px 10px; border-radius:999px;
      border:1px solid #444; font-size:11px; letter-spacing:0.08em;
      text-transform:uppercase; color:#e2e2e2; margin-bottom:14px;
      background:linear-gradient(135deg, #181818, #101010);
    }

    label { display:block; font-size:11px; text-transform:uppercase;
      letter-spacing:0.12em; color:#aaaaaa; margin-bottom:4px;
    }
    input, textarea {
      width:100%; border-radius:8px; border:1px solid #444;
      background:#050505; color:#f5f5f5; padding:8px 10px; font-size:13px;
      outline:none; transition:border-color 0.15s, box-shadow 0.15s;
    }
    input::placeholder, textarea::placeholder { color:#555; }

    .row { display:flex; gap:10px; }
    .row > .col { flex:1; }

    .ampm-toggle { display:flex; gap:10px; margin:8px 0 10px; }
    .ampm-btn {
      flex:1; border-radius:999px; border:1px solid #444;
      background:#050505; color:#f5f5f5; padding:7px 0; cursor:pointer;
      transition:all 0.15s;
    }
    .ampm-btn.active {
      background:#f5d05c; color:#000; border-color:#f5d05c;
      font-weight:600; box-shadow:0 8px 18px rgba(245,208,92,0.35);
    }

    .primary-btn {
      width:100%; border-radius:999px; border:none;
      background:#f5d05c; color:#000; font-weight:600;
      letter-spacing:0.08em; padding:11px 0; cursor:pointer;
      margin-top:6px;
    }

    .estimate-title { font-weight:700; color:#f5d05c; margin-bottom:8px; font-size:14px; }
    .estimate-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
    .estimate-total { margin-top:8px; padding-top:8px; border-top:1px solid #333; display:flex; justify-content:space-between; font-size:15px; font-weight:600; }
    .estimate-total-value { color:#f5d05c; font-size:20px; }

    .step2 { display:none; }
    .step2.visible { display:block; }

    .msg { margin-top:8px; min-height:16px; font-size:12px; }
    .msg.error { color:#ff6b6b; }
    .msg.success { color:#4cd964; }

    .footer { margin-top:14px; text-align:center; font-size:11px; color:#777; }

    .pac-container {
      background:#000 !important; border:1px solid #444 !important; color:#f5d05c !important;
      border-radius:8px !important; box-shadow:0 10px 25px rgba(0,0,0,0.7) !important;
    }
    .pac-item { background:#000 !important; color:#f5d05c !important; border-top:1px solid #222 !important; }
    .pac-item:hover { background:#222 !important; }
    .pac-matched, .pac-item-query { color:#fff !important; font-weight:600; }
    .pac-icon { filter: invert(80%) sepia(60%) saturate(400%) hue-rotate(10deg) brightness(1.2); }
  </style>
</head>

<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">
    <h1>Book Your Ride</h1>
    <p class="lead">
      Fast, simple and premium. Enter your trip details to get a price estimate.
    </p>

    <!-- STEP 1 -->
    <div class="card">
      <div class="card-header-pill">Step 1 • Trip details</div>

      <label>Pickup location</label>
      <input id="pickup" type="text" />

      <label>Extra stop (optional)</label>
      <input id="stop" type="text" />

      <label>Drop-off location</label>
      <input id="dropoff" type="text" />

      <div class="row">
        <div class="col">
          <label>Date (MM/DD/YYYY)</label>
          <input id="rideDate" type="text" maxlength="10" />
        </div>
        <div class="col">
          <label>Time</label>
          <input id="rideTime" type="text" maxlength="5" />
        </div>
      </div>

      <label>AM / PM</label>
      <div class="ampm-toggle">
        <button id="amBtn" class="ampm-btn active">AM</button>
        <button id="pmBtn" class="ampm-btn">PM</button>
      </div>

      <button id="calcPriceBtn" class="primary-btn">CALCULATE PRICE</button>
      <div id="calcMsg" class="msg"></div>
    </div>

    <!-- ESTIMATE -->
    <div class="card" id="estimateCard">
      <div class="estimate-title">Estimate</div>
      <div id="estimateEmptyText">Enter trip details.</div>
      <div id="estimateDetails" style="display:none;">
        <div class="estimate-row"><span>Distance</span><span id="estDistance"></span></div>
        <div class="estimate-row"><span id="estBaseLabel"></span><span id="estBaseFare"></span></div>
        <div class="estimate-row"><span>Extra miles</span><span id="estExtraMiles"></span></div>
        <div class="estimate-row"><span>Night fare</span><span id="estNightFare"></span></div>
        <div class="estimate-total">
          <span>Estimated total</span>
          <span class="estimate-total-value" id="estTotal"></span>
        </div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="card step2" id="step2Card">
      <div class="card-header-pill">Step 2 • Passenger details</div>

      <div id="summaryPickup"></div>
      <div id="summaryDropoff"></div>
      <div id="summaryDateTime"></div>
      <div id="summaryTotal"></div>

      <label>Full name</label>
      <input id="fullName" type="text" />

      <label>Mobile phone</label>
      <input id="mobilePhone" type="tel" />

      <label>Email</label>
      <input id="email" type="email" />

      <label>Notes</label>
      <textarea id="notes" rows="2"></textarea>

      <button id="sendBookingBtn" class="primary-btn">SEND RESERVATION</button>
      <div id="bookingMsg" class="msg"></div>
    </div>

    <div class="footer">
      Need help? Call/text +1 (771) 217 31 11
    </div>
  </div>

<script>
let currentAmpm = "AM";
let lastQuote = null;

function autoFormatDate(input){
  let v = input.value.replace(/[^0-9]/g, "");
  if(v.length > 2 && v.length <= 4) v = v.slice(0,2)+"/"+v.slice(2);
  else if(v.length > 4) v = v.slice(0,2)+"/"+v.slice(2,4)+"/"+v.slice(4,8);
  input.value = v.slice(0,10);
}
function autoFormatTime(input){
  let v = input.value.replace(/[^0-9]/g, "");
  if(v.length > 2) v = v.slice(0,2)+":"+v.slice(2,4);
  input.value = v.slice(0,5);
}
document.getElementById("rideDate").oninput = e => autoFormatDate(e.target);
document.getElementById("rideTime").oninput = e => autoFormatTime(e.target);

document.getElementById("amBtn").onclick = () => {
  currentAmpm = "AM";
  amBtn.classList.add("active");
  pmBtn.classList.remove("active");
};
document.getElementById("pmBtn").onclick = () => {
  currentAmpm = "PM";
  pmBtn.classList.add("active");
  amBtn.classList.remove("active");
};

function parseTimeTo24h(timeStr){
  const [h, m] = timeStr.split(":").map(Number);
  if(isNaN(h) || isNaN(m)) return null;
  let hour = h;
  if(currentAmpm === "PM" && h !== 12) hour += 12;
  if(currentAmpm === "AM" && h === 12) hour = 0;
  return {h:hour, m};
}

function getNightInfo(timeStr){
  const t = parseTimeTo24h(timeStr);
  if(!t) return {isNight:false, multiplier:1, label:"No"};
  const mins = t.h*60 + t.m;
  const night = (mins >= 22*60 || mins < 5*60);
  return night
    ? {isNight:true, multiplier:1.25, label:"Yes ×1.25"}
    : {isNight:false, multiplier:1, label:"No"};
}

document.getElementById("calcPriceBtn").onclick = async () => {
  const pickup = pickup.value.trim();
  const stop = stop.value.trim();
  const dropoff = dropoff.value.trim();
  const date = rideDate.value.trim();
  const time = rideTime.value.trim();

  const msg = document.getElementById("calcMsg");
  msg.textContent = "";

  if(!pickup || !dropoff){ msg.textContent="Pickup and dropoff required."; msg.classList.add("error"); return; }
  if(!date || !time){ msg.textContent="Enter date & time."; msg.classList.add("error"); return; }

  msg.textContent="Calculating...";

  const res = await fetch(`/api/calc-price?pickup=${encodeURIComponent(pickup)}&stop=${encodeURIComponent(stop)}&dropoff=${encodeURIComponent(dropoff)}`);
  const data = await res.json();

  if(!data.miles){ msg.textContent="Distance error."; msg.classList.add("error"); return; }

  const miles = data.miles;
  const baseFare = data.pricing.baseFare;
  const included = data.pricing.includedMiles;
  const extraPrice = data.pricing.extraPerMile;
  const minFare = data.pricing.minimumFare;

  const extraMiles = Math.max(0, miles - included);
  let total = baseFare + extraMiles*extraPrice;

  const night = getNightInfo(time);
  total *= night.multiplier;
  if(total < minFare) total = minFare;

  estDistance.textContent = miles.toFixed(2)+" miles";
  estBaseLabel.textContent = `Base fare (up to ${included} miles)`;
  estBaseFare.textContent = "$"+baseFare.toFixed(2);
  estExtraMiles.textContent = `${extraMiles} × $${extraPrice} = $${(extraMiles*extraPrice).toFixed(2)}`;
  estNightFare.textContent = night.label;
  estTotal.textContent = "$"+total.toFixed(2);

  estimateEmptyText.style.display="none";
  estimateDetails.style.display="block";

  summaryPickup.textContent = "Pickup: "+pickup;
  summaryDropoff.textContent = "Dropoff: "+dropoff;
  summaryDateTime.textContent = "Date: "+date+" "+time+" "+currentAmpm;
  summaryTotal.textContent = "Total: $"+total.toFixed(2);

  step2Card.classList.add("visible");

  lastQuote = { pickup, stop, dropoff, date, time, ampm:currentAmpm, miles, total };
  msg.textContent = "";
};

document.getElementById("sendBookingBtn").onclick = async () => {
  if(!lastQuote){ bookingMsg.textContent="Please calculate first."; bookingMsg.classList.add("error"); return; }

  const payload = {
    pickup: lastQuote.pickup,
    stop: lastQuote.stop,
    dropoff: lastQuote.dropoff,
    rideDate: lastQuote.date,
    rideTime: lastQuote.time,
    ampm: lastQuote.ampm,
    miles: lastQuote.miles,
    total: lastQuote.total,
    customerName: fullName.value.trim(),
    customerPhone: mobilePhone.value.trim(),
    customerEmail: email.value.trim(),
    notes: notes.value.trim()
  };

  bookingMsg.textContent="Sending…";

  const res = await fetch("/api/bookings2", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(!res.ok){
    bookingMsg.textContent = data.message || "Server error.";
    bookingMsg.classList.add("error");
    return;
  }

  bookingMsg.textContent = "Reservation sent successfully!";
  bookingMsg.classList.add("success");
};
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places" async defer></script>
<script>
window.onload = () => {
  const opts = {
    componentRestrictions:{country:"us"},
    fields:["formatted_address","geometry","name","place_id"]
  };
  new google.maps.places.Autocomplete(document.getElementById("pickup"), opts);
  new google.maps.places.Autocomplete(document.getElementById("stop"), opts);
  new google.maps.places.Autocomplete(document.getElementById("dropoff"), opts);
};
</script>

</body>
</html>
