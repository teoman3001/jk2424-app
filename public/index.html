<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JK2424 • Private Chauffeur Service</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: #111;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      color: #f5d05c;
      margin-bottom: 10px;
      font-size: 18px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      background: #222;
      color: white;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #f5d05c;
      border: none;
      border-radius: 6px;
      margin-top: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #e6c34f;
    }

    .ampm-box {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .ampm-btn {
      width: 48%;
      background: #222;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #333;
    }

    .ampm-btn.active {
      background: #f5d05c;
      color: black;
      border-color: #f5d05c;
    }

    #step2 {
      display: none;
      margin-top: 25px;
    }

    .result-box {
      margin-top: 10px;
      background: #1a1a1a;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>

  <script src="index.js" defer></script>

  <script 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc=places&callback=initAutocomplete"
    async defer></script>

</head>
<body>

  <div class="container">

    <!-- STEP 1 -->
    <h2>Step 1 • Trip Details</h2>

    <input id="pickup" type="text" placeholder="Pickup Location">
    <input id="extra_stop" type="text" placeholder="Extra Stop (optional)">
    <input id="dropoff" type="text" placeholder="Drop-off Location">

    <input id="date" type="date">
    <input id="time" type="time">

    <div class="ampm-box">
      <div id="btnAM" class="ampm-btn active" onclick="selectAMPM('AM')">AM</div>
      <div id="btnPM" class="ampm-btn" onclick="selectAMPM('PM')">PM</div>
    </div>

    <button onclick="calculatePrice()">CALCULATE PRICE</button>

    <div class="result-box">
      <div>Price: <span id="result_price">–</span></div>
      <div>Distance: <span id="result_distance">–</span></div>
      <div>Estimated Duration: <span id="result_duration">–</span></div>
    </div>


    <!-- STEP 2 -->
    <div id="step2">

      <h2>Step 2 • Passenger Details</h2>

      <input id="fullname" type="text" placeholder="Full Name">
      <input id="phone" type="text" placeholder="Mobile Phone">
      <input id="email" type="text" placeholder="Email for Confirmation">
      <textarea id="notes" placeholder="Notes (optional)"></textarea>

      <button onclick="sendReservation()">SEND RESERVATION REQUEST</button>

    </div>

  </div>

</body>
</html>
