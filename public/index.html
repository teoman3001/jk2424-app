<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo {
      text-align:center;
      margin-bottom:24px;
    }
    .logo-title {
      font-size:28px;
      letter-spacing:0.25em;
      font-weight:700;
      color:#f5d05c;
    }
    .logo-sub {
      margin-top:4px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#cccccc;
    }
    .wrapper {
      width:100%;
      max-width:560px;
    }
    h1 {
      font-size:26px;
      margin-bottom:4px;
    }
    .lead {
      font-size:13px;
      line-height:1.5;
      color:#cccccc;
      margin-bottom:18px;
    }
    .card {
      background:#111;
      border-radius:14px;
      border:1px solid #333;
      padding:18px 18px 20px;
      margin-bottom:18px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .card-header-pill {
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid #444;
      font-size:11px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#e2e2e2;
      margin-bottom:14px;
      background:linear-gradient(135deg, #181818, #101010);
    }
    .field-group {
      margin-bottom:10px;
    }
    label {
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#aaaaaa;
      margin-bottom:4px;
    }
    input[type="text"],
    input[type="tel"],
    input[type="email"],
    textarea {
      width:100%;
      border-radius:8px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:8px 10px;
      font-size:13px;
      outline:none;
      transition:border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    input::placeholder,
    textarea::placeholder {
      color:#555;
    }
    input:focus,
    textarea:focus {
      border-color:#f5d05c;
      box-shadow:0 0 0 1px rgba(245,208,92,0.3);
      background:#080808;
    }
    .row {
      display:flex;
      gap:10px;
    }
    .row > .col {
      flex:1;
    }
    .ampm-toggle {
      display:flex;
      gap:10px;
      margin-top:4px;
      margin-bottom:10px;
    }
    .ampm-btn {
      flex:1;
      border-radius:999px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:7px 0;
      font-size:13px;
      cursor:pointer;
      transition:all 0.15s;
    }
    .ampm-btn.active {
      background:#f5d05c;
      border-color:#f5d05c;
      color:#000;
      font-weight:600;
      box-shadow:0 8px 18px rgba(245,208,92,0.35);
    }
    .primary-btn {
      width:100%;
      border-radius:999px;
      border:none;
      background:#f5d05c;
      color:#000;
      font-weight:600;
      letter-spacing:0.08em;
      text-transform:uppercase;
      font-size:13px;
      padding:11px 0;
      cursor:pointer;
      margin-top:6px;
      transition:transform 0.1s, box-shadow 0.1s, background 0.15s;
      box-shadow:0 14px 30px rgba(245,208,92,0.35);
    }
    .primary-btn[disabled] {
      opacity:0.6;
      cursor:default;
      box-shadow:none;
      transform:none;
    }
    .primary-btn:hover:not([disabled]) {
      transform:translateY(-1px);
      box-shadow:0 18px 36px rgba(245,208,92,0.45);
    }
    .primary-btn:active:not([disabled]) {
      transform:translateY(0);
      box-shadow:0 10px 22px rgba(245,208,92,0.3);
    }
    .estimate-title {
      font-weight:700;
      color:#f5d05c;
      margin-bottom:8px;
      font-size:14px;
    }
    .estimate-row {
      display:flex;
      justify-content:space-between;
      font-size:13px;
      margin-bottom:4px;
    }
    .estimate-row strong {
      font-weight:600;
    }
    .estimate-total {
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid #333;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:15px;
      font-weight:600;
    }
    .estimate-total-value {
      color:#f5d05c;
      font-size:20px;
      font-weight:700;
    }
    .note {
      margin-top:6px;
      font-size:11px;
      color:#888;
      line-height:1.4;
    }
    .maps-link {
      margin-top:6px;
      font-size:12px;
    }
    .maps-link a {
      color:#7fb4ff;
      text-decoration:none;
    }
    .maps-link a:hover {
      text-decoration:underline;
    }
    .muted {
      color:#aaa;
      font-size:11px;
      margin-top:4px;
    }
    .msg {
      margin-top:8px;
      font-size:12px;
      min-height:16px;
    }
    .msg.error { color:#ff6b6b; }
    .msg.success { color:#4cd964; }
    .step2 {
      display:none;
    }
    .step2.visible {
      display:block;
    }
    .trip-summary-line {
      font-size:12px;
      margin-bottom:2px;
    }
    .footer {
      margin-top:14px;
      text-align:center;
      font-size:11px;
      color:#777;
    }
    @media (max-width:600px) {
      body { padding:18px 8px 32px; }
      .card { padding:16px 14px 18px; }
    }

    /* Google Places autocomplete dropdown styling */
    .pac-container {
      background:#000 !important;
      border:1px solid #444 !important;
      color:#f5d05c !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
      border-radius:8px !important;
      box-shadow:0 10px 25px rgba(0,0,0,0.7) !important;
      z-index:9999 !important;
    }
    .pac-item {
      background:#000 !important;
      color:#f5d05c !important;
      padding:6px 10px !important;
      border-top:1px solid #222 !important;
    }
    .pac-item:hover {
      background:#222 !important;
    }
    .pac-matched {
      color:#ffffff !important;
      font-weight:600;
    }
    .pac-item-query {
      color:#ffffff !important;
    }
    .pac-icon {
      filter: invert(80%) sepia(60%) saturate(400%) hue-rotate(10deg) brightness(1.2);
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">
    <h1>Book Your Ride</h1>
    <p class="lead">
      Fast, simple and premium. Enter your trip details to see an instant estimate and
      submit your reservation request. Your driver will confirm availability and then
      send you Zelle payment details.
    </p>

    <!-- STEP 1: Trip details -->
    <div class="card">
      <div class="card-header-pill">Step 1 · Trip details</div>

      <div class="field-group">
        <label for="pickup">Pickup location</label>
        <input id="pickup" type="text" placeholder="Tysons, VA" />
      </div>

      <div class="field-group">
        <label for="stop">Extra stop (optional)</label>
        <input id="stop" type="text" placeholder="Optional extra stop address" />
      </div>

      <div class="field-group">
        <label for="dropoff">Drop-off location</label>
        <input id="dropoff" type="text" placeholder="Dulles Airport" />
      </div>

      <div class="row">
        <div class="col field-group">
          <label for="rideDate">Date (MM/DD/YYYY)</l
