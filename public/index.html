<script>
async function calculatePrice() {
    const pickup = document.getElementById("pickup").value.trim();
    const extra_stop = document.getElementById("extra_stop").value.trim();
    const dropoff = document.getElementById("dropoff").value.trim();
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const ampm = document.querySelector('input[name="ampm"]:checked')?.value || "AM";

    if (!pickup || !dropoff || !date || !time) {
        alert("Please fill in pickup, dropoff, date and time.");
        return;
    }

    const datetime = `${date} ${time} ${ampm}`;

    try {
        const params = new URLSearchParams({
            pickup,
            extra_stop,
            dropoff,
            datetime
        });

        // Backend’den fiyat hesaplama isteği
        const res = await fetch('/api/calc-price?' + params.toString());
        const data = await res.json();

        if (!data.ok) {
            alert("Calculation error.");
            return;
        }

        const miles = data.miles;
        const baseFare = data.baseFare;
        const includedMiles = data.includedMiles;
        const extraPerMile = data.extraPerMile;
        const nightMultiplier = data.nightMultiplier || 1.25;
        const minimumFare = data.minimumFare;

        // Gece mi?
        const isNight = data.isNight === true;

        let extraMiles = miles - includedMiles;
        if (extraMiles < 0) extraMiles = 0;

        let fare = baseFare + (extraMiles * extraPerMile);

        // GECE ÇARPANI UYGULA
        if (isNight) {
            fare = fare * nightMultiplier;
        }

        // Minimum ücreti uygula
        if (fare < minimumFare) {
            fare = minimumFare;
        }

        // Sonucu göster
        document.getElementById("miles_display").textContent = miles.toFixed(2);
        document.getElementById("fare_display").textContent = fare.toFixed(2);
        document.getElementById("night_status").textContent = isNight ? "Yes" : "No";

        document.getElementById("estimate_box").style.display = "block";

    } catch (err) {
        console.error(err);
        alert("Server error.");
    }
}
</script>
