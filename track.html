<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Trip Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex;
      justify-content:center;
      padding:24px 12px;
    }
    .container { width:100%; max-width:420px; }
    .logo { text-align:center; margin-bottom:20px; }
    .logo-title { font-size:26px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .card {
      background:#111;
      border:1px solid #333;
      border-radius:16px;
      padding:22px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .status-title { font-size:18px; font-weight:700; margin-bottom:6px; color:#f5d05c; }
    .status-desc { font-size:13px; color:#ccc; line-height:1.5; margin-bottom:16px; }
    .divider { height:1px; background:#333; margin:14px 0; }
    .line { font-size:13px; margin-bottom:8px; display: flex; justify-content: space-between; }
    .highlight { color:#f5d05c; font-weight:600; font-size: 16px; }
    .footer { margin-top:14px; font-size:11px; color:#888; text-align:center; }
    .loading-text { text-align:center; color:#aaa; font-size:13px; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-title">JK2424</div>
    </div>

    <div class="card" id="mainCard">
      <div id="loadingArea" class="loading-text">Loading trip status…</div>
      
      <div id="contentArea" style="display:none;">
        <div class="status-title" id="statusTitle">Status</div>
        <div class="status-desc" id="statusText">Please wait...</div>

        <div class="divider"></div>

        <div class="line"><strong>Route:</strong> <span id="tripRoute"></span></div>
        <div class="line"><strong>Date & Time:</strong> <span id="tripDate"></span></div>
        <div class="line"><strong>Total Price:</strong> <span id="tripPrice" class="highlight"></span></div>
      </div>
    </div>

    <div class="footer">
      JK2424 • Private Chauffeur Service
    </div>
  </div>

<script>
const BACKEND_BASE = "https://jk2424-backend.onrender.com";

// 1. URL'DEN ID ALMA VE KONTROL
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("id");

if (!bookingId) {
  document.body.innerHTML = "<div style='text-align:center; padding-top:50px;'><h2>Invalid booking link</h2><p>Booking ID not found.</p></div>";
  throw new Error("No booking ID in URL");
}

// Durum metinlerini yöneten yardımcı fonksiyon
function getStatusDetails(status) {
  const map = {
    "pending": { title: "Reservation Received", desc: "Waiting for driver confirmation." },
    "confirmed": { title: "Trip Confirmed", desc: "Confirmed! Payment details sent via text/email." },
    "paid": { title: "Payment Received", desc: "Payment verified. See you soon!" },
    "on_the_way": { title: "Driver on the Way", desc: "Your chauffeur is heading to your location." },
    "arrived": { title: "Driver Arrived", desc: "Your vehicle is outside and waiting." },
    "completed": { title: "Trip Completed", desc: "Thank you for choosing JK2424." }
  };
  return map[status] || { title: "Updating", desc: "Please wait..." };
}

// 2. POLLING FONKSİYONU (SADECE TEK ID İÇİN)
async function pollStatus() {
  try {
    // SADECE BU ID'YI SORGULA
    const res = await fetch(`${BACKEND_BASE}/bookings/${bookingId}`);
    const data = await res.json();

    if (!data.success || !data.booking) {
      console.error("Booking not found");
      return;
    }

    const booking = data.booking;
    
    // UI GÜNCELLEME
    document.getElementById("loadingArea").style.display = "none";
    document.getElementById("contentArea").style.display = "block";

    const details = getStatusDetails(booking.status);
    document.getElementById("statusTitle").innerText = details.title;
    document.getElementById("statusText").innerText = details.desc;

    // Bilgileri doldur
    document.getElementById("tripRoute").innerText = booking.pickup + " → " + booking.dropoff;
    document.getElementById("tripDate").innerText = booking.rideDate + " " + booking.rideTime + " " + booking.ampm;
    document.getElementById("tripPrice").innerText = "$" + booking.total;

    // Tamamlandıysa durdur
    if (booking.status === "completed") {
      clearInterval(pollingInterval);
    }
  } catch (err) {
    console.error("Polling error:", err);
  }
}

// 3. INTERVAL BAŞLATMA
const pollingInterval = setInterval(pollStatus, 5000);
pollStatus(); // İlk yüklemede hemen çalıştır

</script>
</body>
</html>
