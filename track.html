<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Live Trip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#000; color:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; display:flex; justify-content:center; padding:24px 12px; }
    .container { width:100%; max-width:420px; }
    .card { background:#111; border:1px solid #333; border-radius:18px; padding:22px; box-shadow:0 18px 40px rgba(0,0,0,0.5); }
    .status-title { font-size:18px; font-weight:700; margin-bottom:6px; color:#f5d05c; text-transform: uppercase; letter-spacing: 1px; }
    .status-desc { font-size:13px; color:#ccc; line-height:1.5; margin-bottom:16px; }
    #map { width:100%; height:260px; border-radius:14px; margin-top:16px; display:none; border:1px solid #444; }
    #etaBox { margin-top:10px; font-size:13px; color:#f5d05c; font-weight:600; display:none; text-align:center; padding:10px; border:1px solid #f5d05c44; border-radius:10px; background: rgba(245, 208, 92, 0.05); }
    .divider { height:1px; background:#333; margin:16px 0; }
    .line { font-size:13px; margin-bottom:12px; color:#aaa; line-height: 1.4; }
    .highlight { color:#f5d05c; font-weight:700; }
    .footer { margin-top:14px; font-size:11px; color:#666; text-align:center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="contentArea">
        <div class="status-title" id="statusTitle">Syncing...</div>
        <div class="status-desc" id="statusText">Connecting to JK2424 Network.</div>
        <div id="map"></div>
        <div id="etaBox">Calculating...</div>
        <div class="divider" id="tripDivider"></div>
        <div id="tripDetails">
          <div class="line"><strong>Pickup:</strong> <br><span id="tripPickup" style="color:#eee;">---</span></div>
          <div class="line"><strong>Drop-off:</strong> <br><span id="tripDropoff" style="color:#eee;">---</span></div>
          <div class="line"><strong>Total Price:</strong> <span id="tripPrice" class="highlight">---</span></div>
        </div>
      </div>
    </div>
    <div class="footer">JK2424 • Private Chauffeur Service</div>
  </div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=geometry" async defer></script>

<script>
const BACKEND_BASE = "https://jk2424-backend.onrender.com";
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("id");

let map, directionsService, directionsRenderer, driverMarker;
let routePath = [], routeIndex = 0, moveInterval = null, currentStatus = null;

// 1. MAP INITIALIZATION (v1.4 Kristal Stil)
function initMap(center) {
  if (map) return;
  document.getElementById("map").style.display = "block";
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 14, center: center, disableDefaultUI: true,
    styles: [
      { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
      { "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] },
      { "featureType": "road", "elementType": "geometry.fill", "stylers": [{ "color": "#2c2c2c" }] },
      { "featureType": "road", "elementType": "labels.text.fill", "stylers": [{ "color": "#f5d05c" }, { "weight": 0.1 }, { "fontSize": "8px" }] },
      { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#000000" }] }
    ]
  });
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers: true,
    polylineOptions: { strokeColor: "#f5d05c", strokeWeight: 4, strokeOpacity: 0.9 }
  });
  directionsRenderer.setMap(map);
}

// 2. ROTA YÜKLEME VE SİMÜLASYON
async function loadRoute(origin, destination, showEta = true) {
  directionsService.route({
    origin: origin, destination: destination,
    travelMode: "DRIVING", drivingOptions: { departureTime: new Date(), trafficModel: "bestguess" }
  }, (result, status) => {
    if (status !== "OK") return;
    directionsRenderer.setDirections(result);
    routePath = result.routes[0].overview_path;
    routeIndex = 0;
    
    if (!driverMarker) {
      driverMarker = new google.maps.Marker({
        position: routePath[0], map: map,
        icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 5, fillColor: "#f5d05c", fillOpacity: 1, strokeWeight: 1, strokeColor: "#000" }
      });
    }
    
    if (showEta) {
      document.getElementById("etaBox").style.display = "block";
      const leg = result.routes[0].legs[0];
      document.getElementById("etaBox").innerText = `🚗 Arrival: ${leg.duration_in_traffic?.text || leg.duration.text}`;
    }
    startDriverSimulation();
  });
}

function startDriverSimulation() {
  if (moveInterval) clearInterval(moveInterval);
  moveInterval = setInterval(() => {
    routeIndex++;
    if (routeIndex >= routePath.length) { clearInterval(moveInterval); return; }
    driverMarker.setPosition(routePath[routeIndex]);
    map.panTo(routePath[routeIndex]);
  }, 2000);
}

// 3. CENTRAL STATUS ROUTER
function routeByStatus(status, b) {
  if (status === currentStatus) return; // Aynı statüde tekrar işlem yapma
  currentStatus = status;

  const title = document.getElementById("statusTitle");
  const text = document.getElementById("statusText");

  switch (status) {
    case "on_the_way": //
      initMap({ lat: 38.9072, lng: -77.0369 });
      loadRoute(b.pickup, b.dropoff);
      title.innerText = "Driver on the Way";
      text.innerText = "Chauffeur is heading to pickup.";
      break;

    case "arrived": //
      if (moveInterval) clearInterval(moveInterval);
      document.getElementById("etaBox").style.display = "none";
      title.innerText = "Driver Arrived";
      text.innerText = "Vehicle is waiting outside.";
      title.style.color = "#4CAF50";
      break;

    case "in_progress": //
      document.getElementById("tripDetails").style.display = "none";
      document.getElementById("tripDivider").style.display = "none";
      loadRoute(b.pickup, b.dropoff, false);
      title.innerText = "Trip in Progress";
      text.innerText = "Enjoy your premium ride.";
      title.style.color = "#f5d05c";
      break;

    case "completed": //
      if (moveInterval) clearInterval(moveInterval);
      if (driverMarker) driverMarker.setMap(null);
      document.getElementById("map").style.display = "none";
      document.getElementById("etaBox").style.display = "none";
      document.getElementById("tripDetails").style.display = "block";
      title.innerText = "Trip Completed";
      text.innerText = "Thank you for choosing JK2424.";
      clearInterval(pollingInterval);
      break;
    
    case "cancelled":
        title.innerText = "Cancelled";
        text.innerText = "Reservation has been cancelled.";
        title.style.color = "#FF5252";
        break;
  }
}

// 4. POLLING ENGINE
async function pollStatus() {
  if (!bookingId) return;
  try {
    const res = await fetch(`${BACKEND_BASE}/bookings/${bookingId}`);
    const data = await res.json();
    if (data.success && data.booking) {
      const b = data.booking;
      routeByStatus(b.status, b);
      document.getElementById("tripPickup").innerText = b.pickup;
      document.getElementById("tripDropoff").innerText = b.dropoff;
      document.getElementById("tripPrice").innerText = "$" + Number(b.total).toFixed(2);
    }
  } catch (err) { console.warn("Sync..."); }
}

const pollingInterval = setInterval(pollStatus, 5000);
pollStatus();
</script>
</body>
</html>
