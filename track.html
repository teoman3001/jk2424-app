<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Trip Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex;
      justify-content:center;
      padding:24px 12px;
    }
    .container { width:100%; max-width:420px; }
    .logo { text-align:center; margin-bottom:20px; }
    .logo-title { font-size:26px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .card {
      background:#111;
      border:1px solid #333;
      border-radius:16px;
      padding:22px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .status-title { font-size:18px; font-weight:700; margin-bottom:6px; color:#f5d05c; }
    .status-desc { font-size:13px; color:#ccc; line-height:1.5; margin-bottom:16px; }
    .divider { height:1px; background:#333; margin:14px 0; }
    .line { font-size:13px; margin-bottom:10px; line-height: 1.4; }
    .highlight { color:#f5d05c; font-weight:600; font-size: 15px; }
    .footer { margin-top:14px; font-size:11px; color:#888; text-align:center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-title">JK2424</div>
    </div>

    <div class="card">
      <div id="contentArea">
        <div class="status-title" id="statusTitle">Reservation Received</div>
        <div class="status-desc" id="statusText">Waiting for driver confirmation.</div>

        <div class="divider"></div>

        <div class="line"><strong>Pickup:</strong> <br><span id="tripPickup">---</span></div>
        <div class="line"><strong>Drop-off:</strong> <br><span id="tripDropoff">---</span></div>
        <div class="line"><strong>Date & Time:</strong> <br><span id="tripDate">---</span></div>
        <div class="line"><strong>Total Price:</strong> <span id="tripPrice" class="highlight">---</span></div>
      </div>
    </div>

    <div class="footer">
      JK2424 • Private Chauffeur Service
    </div>
  </div>

<script>
const BACKEND_BASE = "https://jk2424-backend.onrender.com";
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("id");

// 1. ÖNCE LOCALSTORAGE'DAN YEDEK VERİYİ OKU (Hızlı yükleme için)
const lastQuoteStr = localStorage.getItem("jk2424_last_quote");
if (lastQuoteStr) {
  try {
    const q = JSON.parse(lastQuoteStr);
    document.getElementById("tripPickup").innerText = q.pickup || "---";
    document.getElementById("tripDropoff").innerText = q.dropoff || "---";
    document.getElementById("tripDate").innerText = `${q.rideDate} ${q.rideTime} ${q.ampm}`;
    document.getElementById("tripPrice").innerText = q.total ? "$" + q.total : "---";
  } catch (e) { console.error("Local data error", e); }
}

function getStatusDetails(status) {
  const map = {
    "pending": { title: "Reservation Received", desc: "Waiting for driver confirmation." },
    "confirmed": { title: "Trip Confirmed", desc: "Confirmed! Payment details sent via Zelle." },
    "paid": { title: "Payment Received", desc: "Payment verified. See you soon!" },
    "on_the_way": { title: "Driver on the Way", desc: "Your chauffeur is heading to your location." },
    "arrived": { title: "Driver Arrived", desc: "Your vehicle is outside and waiting." },
    "completed": { title: "Trip Completed", desc: "Thank you for choosing JK2424." }
  };
  return map[status] || { title: "Updating Status", desc: "Please wait..." };
}

// 2. BACKEND'DEN DURUMU KONTROL ET (Polling)
async function pollStatus() {
  if (!bookingId) return;

  try {
    const res = await fetch(`${BACKEND_BASE}/bookings/${bookingId}`);
    if (!res.ok) {
        // Backend'de bulunamazsa (reset olmuşsa) bile sessiz kal, localStorage verisi kalsın
        return; 
    }
    
    const data = await res.json();
    if (data.success && data.booking) {
      const b = data.booking;
      const details = getStatusDetails(b.status);
      
      // Sadece status ve varsa güncel fiyatı güncelle
      document.getElementById("statusTitle").innerText = details.title;
      document.getElementById("statusText").innerText = details.desc;
      
      // Eğer backend'de farklı bir fiyat varsa onu güncelle
      if (b.total) {
        document.getElementById("tripPrice").innerText = "$" + b.total;
      }
      
      if (b.status === "completed") clearInterval(pollingInterval);
    }
  } catch (err) {
    console.warn("Polling (Network) error, showing local data.");
  }
}

const pollingInterval = setInterval(pollStatus, 5000);
pollStatus();
</script>
</body>
</html>
