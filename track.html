<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Trip Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex;
      justify-content:center;
      padding:24px 12px;
    }
    .container {
      width:100%;
      max-width:420px;
    }
    .logo {
      text-align:center;
      margin-bottom:20px;
    }
    .logo-title {
      font-size:26px;
      letter-spacing:0.25em;
      font-weight:700;
      color:#f5d05c;
    }
    .card {
      background:#111;
      border:1px solid #333;
      border-radius:16px;
      padding:22px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .status-title {
      font-size:18px;
      font-weight:700;
      margin-bottom:6px;
    }
    .status-desc {
      font-size:13px;
      color:#ccc;
      line-height:1.5;
      margin-bottom:16px;
    }
    .divider {
      height:1px;
      background:#333;
      margin:14px 0;
    }
    .line {
      font-size:13px;
      margin-bottom:6px;
    }
    .highlight {
      color:#f5d05c;
      font-weight:600;
    }
    .footer {
      margin-top:14px;
      font-size:11px;
      color:#888;
      text-align:center;
    }
    .loading {
      text-align:center;
      color:#aaa;
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-title">JK2424</div>
    </div>

    <div class="card" id="card">
      <div class="loading">Loading trip status…</div>
    </div>

    <div class="footer">
      JK2424 • Private Chauffeur Service
    </div>
  </div>

<script>
const BACKEND_BASE = "https://jk2424-backend.onrender.com";
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("id");
const card = document.getElementById("card");

if (!bookingId) {
  card.innerHTML = "<div class='status-title'>Invalid link</div><div class='status-desc'>Booking ID not found.</div>";
}

function renderStatus(booking) {
  let title = "";
  let desc = "";

  switch (booking.status) {
    case "pending":
      title = "Reservation received";
      desc = "Your request has been received and is awaiting confirmation.";
      break;
    case "confirmed":
      title = "Trip confirmed";
      desc = "Your trip is confirmed. Payment instructions have been sent.";
      break;
    case "paid":
      title = "Payment received";
      desc = "Payment confirmed. Preparing for your trip.";
      break;
    case "on_the_way":
      title = "Driver on the way";
      desc = "Your chauffeur is on the way to your pickup location.";
      break;
    case "arrived":
      title = "Driver arrived";
      desc = "Your vehicle has arrived and is waiting for you.";
      break;
    case "completed":
      title = "Trip completed";
      desc = "Thank you for riding with JK2424.";
      break;
    default:
      title = "Updating status";
      desc = "Please wait…";
  }

  card.innerHTML = `
    <div class="status-title">${title}</div>
    <div class="status-desc">${desc}</div>

    <div class="divider"></div>

    <div class="line"><strong>Pickup:</strong> ${booking.pickup}</div>
    <div class="line"><strong>Drop-off:</strong> ${booking.dropoff}</div>
    <div class="line"><strong>Date:</strong> ${booking.rideDate}</div>
    <div class="line"><strong>Time:</strong> ${booking.rideTime} ${booking.ampm}</div>
    <div class="line highlight">Total: $${booking.total}</div>
  `;
}

async function fetchStatus() {
  try {
    const res = await fetch(`${BACKEND_BASE}/bookings/${bookingId}`);
    const data = await res.json();

    if (data.success && data.booking) {
      renderStatus(data.booking);
      if (data.booking.status === "completed") {
        clearInterval(polling);
      }
    }
  } catch (err) {
    console.error("Status fetch error", err);
  }
}

fetchStatus();
const polling = setInterval(fetchStatus, 5000);
</script>
</body>
</html>
