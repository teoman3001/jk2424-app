<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Live Trip Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#000; color:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; display:flex; justify-content:center; padding:24px 12px; }
    .container { width:100%; max-width:420px; }
    .card { background:#111; border:1px solid #333; border-radius:16px; padding:22px; box-shadow:0 18px 40px rgba(0,0,0,0.5); }
    .status-title { font-size:18px; font-weight:700; margin-bottom:6px; color:#f5d05c; }
    .status-desc { font-size:13px; color:#ccc; line-height:1.5; margin-bottom:16px; }
    
    /* 🗺️ MAP & ETA STYLES */
    #map { width:100%; height:260px; border-radius:14px; margin-top:16px; display:none; border:1px solid #444; }
    #etaBox { margin-top:10px; font-size:13px; color:#f5d05c; font-weight:600; display:none; text-align:center; padding:8px; border:1px solid #f5d05c33; border-radius:8px; }
    
    .divider { height:1px; background:#333; margin:16px 0; }
    .line { font-size:13px; margin-bottom:10px; color:#aaa; }
    .highlight { color:#f5d05c; font-weight:600; }
    .footer { margin-top:14px; font-size:11px; color:#888; text-align:center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div id="contentArea">
        <div class="status-title" id="statusTitle">Syncing...</div>
        <div class="status-desc" id="statusText">Connecting to JK2424 Network.</div>

        <div id="map"></div>
        <div id="etaBox">Calculating live traffic ETA...</div>

        <div class="divider"></div>
        <div class="line"><strong>Pickup:</strong> <br><span id="tripPickup">---</span></div>
        <div class="line"><strong>Drop-off:</strong> <br><span id="tripDropoff">---</span></div>
        <div class="line"><strong>Status:</strong> <span id="tripStatus" class="highlight">---</span></div>
        <div class="line"><strong>Total Price:</strong> <span id="tripPrice" class="highlight">---</span></div>
      </div>
    </div>
    <div class="footer">JK2424 • Private Chauffeur Service</div>
  </div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=geometry" async defer></script>

<script>
const BACKEND_BASE = "https://jk2424-backend.onrender.com";
const params = new URLSearchParams(window.location.search);
const bookingId = params.get("id");

// Map Değişkenleri
let map, directionsService, directionsRenderer, driverMarker;
let routePath = [];
let routeIndex = 0;
let moveInterval = null;
let isMapInitialized = false;

// 1. HARİTA BAŞLATMA
function initMap(center) {
  if (isMapInitialized) return;
  
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: center,
    disableDefaultUI: true,
    styles: [
      { elementType: "geometry", stylers: [{ color: "#111111" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#f5d05c" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#222222" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#000000" }] }
    ]
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers: true,
    polylineOptions: { strokeColor: "#f5d05c", strokeWeight: 5, strokeOpacity: 0.8 }
  });

  directionsRenderer.setMap(map);
  isMapInitialized = true;
}

// 2. ON_THE_WAY EKRANI VE SİMÜLASYON
function renderOnTheWay(booking) {
  const mapEl = document.getElementById("map");
  const etaEl = document.getElementById("etaBox");
  
  if (mapEl.style.display === "block") return; // Zaten çalışıyorsa durma

  mapEl.style.display = "block";
  etaEl.style.display = "block";

  initMap({ lat: 38.9072, lng: -77.0369 });

  directionsService.route({
      origin: booking.pickup,
      destination: booking.dropoff,
      travelMode: "DRIVING",
      drivingOptions: { departureTime: new Date(), trafficModel: "bestguess" }
    }, (result, status) => {
      if (status !== "OK") return;

      directionsRenderer.setDirections(result);
      routePath = result.routes[0].overview_path;
      routeIndex = 0;

      // 🚗 Sürücü Marker'ı (Ok simgesi)
      driverMarker = new google.maps.Marker({
        position: routePath[0],
        map: map,
        icon: {
          path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
          scale: 6,
          fillColor: "#f5d05c",
          fillOpacity: 1,
          strokeWeight: 2,
          strokeColor: "#000",
          rotation: 0
        }
      });

      startDriverSimulation();
      updateETA(result);
    }
  );
}

function startDriverSimulation() {
  if (moveInterval) clearInterval(moveInterval);

  moveInterval = setInterval(() => {
    routeIndex++;
    if (routeIndex >= routePath.length) {
      clearInterval(moveInterval);
      return;
    }
    
    const nextPos = routePath[routeIndex];
    driverMarker.setPosition(nextPos);
    map.panTo(nextPos);
  }, 1500); 
}

function updateETA(result) {
  const leg = result.routes[0].legs[0];
  const etaText = leg.duration_in_traffic ? leg.duration_in_traffic.text : leg.duration.text;
  document.getElementById("etaBox").innerText = `Estimated arrival: ${etaText} (live traffic)`;
}

// 3. POLLING (Statü Takibi)
async function pollStatus() {
  if (!bookingId) return;
  try {
    const res = await fetch(`${BACKEND_BASE}/bookings/${bookingId}`);
    const data = await res.json();
    if (data.success && data.booking) {
      const b = data.booking;
      
      document.getElementById("statusTitle").innerText = b.status.toUpperCase().replace('_', ' ');
      document.getElementById("tripStatus").innerText = b.status;
      document.getElementById("tripPickup").innerText = b.pickup;
      document.getElementById("tripDropoff").innerText = b.dropoff;
      document.getElementById("tripPrice").innerText = "$" + Number(b.total).toFixed(2);

      // 🚨 ON THE WAY KONTROLÜ
      if (b.status === "on_the_way") {
        renderOnTheWay(b);
      } else {
        document.getElementById("map").style.display = "none";
        document.getElementById("etaBox").style.display = "none";
        if (moveInterval) clearInterval(moveInterval);
      }

      if (b.status === "completed" || b.status === "cancelled") clearInterval(pollingInterval);
    }
  } catch (err) { console.warn("Polling error"); }
}

const pollingInterval = setInterval(pollStatus, 5000);
pollStatus();
</script>
</body>
</html>
