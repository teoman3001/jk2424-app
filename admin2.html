<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 · Admin Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050505;
      --card: #141414;
      --accent: #d2aa3b;
      --accent-soft: #3b3115;
      --text: #f5f5f5;
      --muted: #9a9a9a;
      --danger: #d9534f;
      --success: #4bb543;
      --border: #2b2b2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #222 0, #050505 55%);
      color: var(--text);
    }

    .shell {
      max-width: 1200px;
      margin: 24px auto 40px;
      padding: 0 16px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 18px;
    }

    .brand {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px;
      display: inline-flex;
      gap: 4px;
      background: rgba(0, 0, 0, 0.4);
    }

    .pill button {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
    }

    .pill button.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    .pill button:hover:not(.active) {
      background: rgba(210, 170, 59, 0.16);
      color: var(--text);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tag.pending { background: #3b3115; color: #f8e9b0; }
    .tag.confirmed { background: #12321c; color: #7adf9a; }
    .tag.paid { background: #0f243a; color: #7bc4ff; }
    .tag.on_the_way { background: #1c2738; color: #b0c5ff; }
    .tag.arrived { background: #42210b; color: #ffcf9a; }
    .tag.completed { background: #113028; color: #97f5d5; }
    .tag.cancelled { background: #3b1313; color: #ffb4b4; }

    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(0,0,0,0.4));
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      padding: 16px 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: top;
    }

    th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 500;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .small {
      font-size: 11px;
      color: var(--muted);
    }

    .btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(0,0,0,0.5);
      color: var(--text);
      cursor: pointer;
      margin: 1px 0;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .btn.danger {
      border-color: var(--danger);
      color: #ffd5d5;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .status-col {
      min-width: 90px;
    }

    .money {
      font-variant-numeric: tabular-nums;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 4px;
      background: var(--accent);
    }

    .footer-note {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
      td { border: none; padding: 4px 0; }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--muted);
        margin-bottom: 2px;
      }
      .status-col { min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <div class="brand"><span>JK2424</span> ADMIN</div>
        <div class="subtitle">Today’s rides and reservation requests.</div>
      </div>
      <div class="subtitle" id="summaryText"></div>
    </header>

    <div class="toolbar">
      <div class="pill" id="statusFilter">
        <button data-status="all" class="active">All</button>
        <button data-status="pending">Pending</button>
        <button data-status="confirmed">Confirmed</button>
        <button data-status="paid">Paid</button>
        <button data-status="on_the_way">On the way</button>
        <button data-status="arrived">Arrived</button>
        <button data-status="completed">Completed</button>
        <button data-status="cancelled">Cancelled</button>
      </div>
    </div>

    <div class="card">
      <table id="bookingsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Client</th>
            <th>Trip</th>
            <th>Date &amp; time</th>
            <th>Miles</th>
            <th>Total</th>
            <th class="status-col">Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- rows injected by JS -->
        </tbody>
      </table>

      <div class="footer-note" id="footerNote"></div>
    </div>
  </div>

  <script>
    const state = {
      allBookings: [],
      filter: 'all',
    };

    function formatMoney(v) {
      if (v == null) return '—';
      return '$' + Number(v).toFixed(2);
    }

    function formatDate(d) {
      if (!d) return '—';
      // d is ISO date (YYYY-MM-DD)
      const [yyyy, mm, dd] = d.split('-');
      return mm + '/' + dd + '/' + yyyy;
    }

    function buildMapsUrl(b) {
      const params = new URLSearchParams();
      params.set('api', '1');
      params.set('origin', b.pickup);
      params.set('destination', b.dropoff);
      if (b.stop) {
        params.set('waypoints', b.stop);
      }
      return 'https://www.google.com/maps/dir/?' + params.toString();
    }

    function render() {
      const tbody = document.querySelector('#bookingsTable tbody');
      tbody.innerHTML = '';

      const filtered = state.allBookings.filter(b => {
        if (state.filter === 'all') return true;
        return b.status === state.filter;
      });

      filtered.forEach((b, idx) => {
        const tr = document.createElement('tr');

        const created = new Date(b.created_at);

        tr.innerHTML = `
          <td data-label="#">
            <div class="small">#${b.id}</div>
            <div class="small">${created.toLocaleString()}</div>
          </td>
          <td data-label="Client">
            <div>${b.customer_name || '—'}</div>
            <div class="small">${b.customer_phone || ''}</div>
            <div class="small">${b.customer_email || ''}</div>
          </td>
          <td data-label="Trip">
            <div>${b.pickup} → ${b.dropoff}</div>
            <div class="small">${b.stop ? 'Via: ' + b.stop : ''}</div>
          </td>
          <td data-label="Date & time">
            <div>${formatDate(b.ride_date)}</div>
            <div class="small">${b.ride_time || ''} ${b.ampm || ''}</div>
          </td>
          <td data-label="Miles" class="money">${b.miles != null ? Number(b.miles).toFixed(2) : '—'}</td>
          <td data-label="Total" class="money">${formatMoney(b.total)}</td>
          <td data-label="Status" class="status-col">
            <span class="tag ${b.status}">${(b.status || '').replace(/_/g,' ')}</span>
          </td>
          <td data-label="Actions">
            <button class="btn primary" data-action="maps">Open route</button><br/>
            <button class="btn" data-action="confirm">Confirm</button>
            <button class="btn" data-action="paid">Payment received</button><br/>
            <button class="btn" data-action="on_the_way">On the way</button>
            <button class="btn" data-action="arrived">Arrived</button><br/>
            <button class="btn" data-action="completed">Completed</button>
            <button class="btn danger" data-action="cancelled">Cancel</button>
          </td>
        `;

        tr.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => handleActionClick(b, btn.dataset.action));
        });

        tbody.appendChild(tr);
      });

      const summary = document.getElementById('summaryText');
      if (state.allBookings.length === 0) {
        summary.textContent = 'No bookings yet.';
      } else {
        const today = new Date().toLocaleDateString();
        summary.textContent = `${state.allBookings.length} bookings loaded · Today: ${today}`;
      }

      const footer = document.getElementById('footerNote');
      footer.textContent = 'Statuses: pending → confirmed → paid → on the way → arrived → completed (or cancelled).';
    }

    async function handleActionClick(booking, action) {
      if (action === 'maps') {
        window.open(buildMapsUrl(booking), '_blank');
        return;
      }

      const status = action;
      if (!confirm(`Change booking #${booking.id} status to "${status.replace(/_/g,' ')}"?`)) {
        return;
      }

      try {
        const res = await fetch(`/api/admin/bookings/${booking.id}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          alert('Status update failed: ' + (data.message || res.status));
          return;
        }
        booking.status = status;
        render();
      } catch (err) {
        console.error(err);
        alert('Network error while updating status.');
      }
    }

    async function loadBookings() {
      try {
        const res = await fetch('/api/admin/bookings');
        const data = await res.json();
        if (!res.ok || !data.ok) {
          document.getElementById('summaryText').textContent = 'Error loading bookings.';
          return;
        }
        state.allBookings = data.bookings || [];
        render();
      } catch (err) {
        console.error(err);
        document.getElementById('summaryText').textContent = 'Network error.';
      }
    }

    document.getElementById('statusFilter').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      const value = e.target.dataset.status;
      if (!value) return;
      state.filter = value;
      document.querySelectorAll('#statusFilter button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === value);
      });
      render();
    });

    loadBookings();
  </script>
</body>
</html>
