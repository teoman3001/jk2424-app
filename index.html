<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo { text-align:center; margin-bottom:24px; }
    .logo-title { font-size:28px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .logo-sub { margin-top:4px; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#ccc; }
    .wrapper { width:100%; max-width:560px; }
    h1 { font-size:26px; margin-bottom:6px; }
    .lead { font-size:13px; color:#ccc; margin-bottom:18px; line-height:1.5; }

    .card {
      background:#111;
      border-radius:14px;
      border:1px solid #333;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 18px 40px rgba(0,0,0,.5);
    }

    label { font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:.12em; margin-bottom:4px; display:block; }
    input, textarea {
      width:100%; background:#050505; color:#fff;
      border:1px solid #444; border-radius:8px;
      padding:8px 10px; font-size:13px;
    }

    .row { display:flex; gap:10px; }
    .row .col { flex:1; }

    .ampm-toggle { display:flex; gap:10px; margin:8px 0 10px; }
    .ampm-btn {
      flex:1; padding:7px 0; border-radius:999px;
      border:1px solid #444; background:#050505; color:#fff;
      cursor:pointer;
    }
    .ampm-btn.active { background:#f5d05c; color:#000; font-weight:600; }

    .primary-btn {
      width:100%; margin-top:10px;
      border:none; border-radius:999px;
      background:#f5d05c; color:#000;
      font-weight:600; padding:11px 0;
      cursor:pointer;
    }

    .msg { font-size:12px; margin-top:8px; min-height:16px; }
    .msg.error { color:#ff6b6b; }
    .msg.success { color:#4cd964; }

    .step2 { display:none; }
    .step2.visible { display:block; }

    .estimate-total { font-size:18px; font-weight:700; color:#f5d05c; margin-top:10px; }

    .footer { margin-top:14px; text-align:center; font-size:11px; color:#777; }

    .pac-container {
      background:#000!important; border:1px solid #444!important;
      color:#f5d05c!important; border-radius:8px!important;
      z-index:9999!important;
    }
  </style>
</head>

<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">
    <h1>Book Your Ride</h1>
    <p class="lead">Enter trip details to get an instant estimate.</p>

    <!-- STEP 1 -->
    <div class="card">
      <label>Pickup</label>
      <input id="pickup" type="text">

      <label>Extra stop (optional)</label>
      <input id="stop" type="text">

      <label>Drop-off</label>
      <input id="dropoff" type="text">

      <div class="row">
        <div class="col">
          <label>Date</label>
          <input id="rideDate" placeholder="MM/DD/YYYY">
        </div>
        <div class="col">
          <label>Time</label>
          <input id="rideTime" placeholder="HH:MM">
        </div>
      </div>

      <div class="ampm-toggle">
        <button id="amBtn" class="ampm-btn active">AM</button>
        <button id="pmBtn" class="ampm-btn">PM</button>
      </div>

      <button id="calcPriceBtn" class="primary-btn">Calculate Price</button>
      <div id="calcMsg" class="msg"></div>
    </div>

    <!-- ESTIMATE -->
    <div class="card">
      <div class="estimate-total" id="estTotal">$0.00</div>
    </div>

    <!-- STEP 2 -->
    <div class="card step2" id="step2Card">
      <strong>Passenger details</strong><br><br>

      <input id="fullName" placeholder="Full name">
      <input id="mobilePhone" placeholder="Phone">
      <input id="email" placeholder="Email">

      <button id="sendBookingBtn" class="primary-btn">Send Reservation</button>
      <div id="bookingMsg" class="msg"></div>
    </div>

    <div class="footer">Call / text: +1 (771) 217 31 11</div>
  </div>

<script>
const BACKEND = 'https://jk2424-backend.onrender.com';

let ampm = 'AM';
let lastQuote = null;

amBtn.onclick = () => { ampm='AM'; amBtn.classList.add('active'); pmBtn.classList.remove('active'); };
pmBtn.onclick = () => { ampm='PM'; pmBtn.classList.add('active'); amBtn.classList.remove('active'); };

calcPriceBtn.onclick = async () => {
  calcMsg.textContent = '';
  step2Card.classList.remove('visible');

  const pickup = pickup.value.trim();
  const stop = stop.value.trim();
  const dropoff = dropoff.value.trim();

  if (!pickup || !dropoff) {
    calcMsg.textContent = 'Pickup and drop-off required';
    calcMsg.className = 'msg error';
    return;
  }

  try {
    const res = await fetch(
      `${BACKEND}/calc?pickup=${encodeURIComponent(pickup)}&stop=${encodeURIComponent(stop)}&dropoff=${encodeURIComponent(dropoff)}`
    );
    const data = await res.json();

    if (!data.success) throw new Error();

    estTotal.textContent = '$' + data.price.toFixed(2);
    step2Card.classList.add('visible');

    lastQuote = { pickup, stop, dropoff, total: data.price };
  } catch {
    calcMsg.textContent = 'Server error';
    calcMsg.className = 'msg error';
  }
};

sendBookingBtn.onclick = async () => {
  if (!lastQuote) return;

  bookingMsg.textContent = 'Sending...';

  try {
    const res = await fetch(`${BACKEND}/bookings2`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        ...lastQuote,
        name: fullName.value,
        phone: mobilePhone.value,
        email: email.value
      })
    });

    if (!res.ok) throw new Error();

    bookingMsg.textContent = 'Reservation received';
    bookingMsg.className = 'msg success';
  } catch {
    bookingMsg.textContent = 'Booking error';
    bookingMsg.className = 'msg error';
  }
};
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places" async defer></script>
</body>
</html>
