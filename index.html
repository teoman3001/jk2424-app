<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teoman Deveci • VIP Private Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* TEOMAN DEVECI ULTIMATE LUXURY THEME - RESTORED */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
    body, html { height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; color: #fff; }

    /* GERÇEK GOOGLE MAPS ARKAPLANI */
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* GOOGLE AUTOCOMPLETE TASARIMI (SARI İKON - BEYAZ YAZI) */
    .pac-container { 
        background-color: #000 !important; 
        border: 1px solid #333 !important; 
        border-radius: 0 0 10px 10px !important; 
        box-shadow: 0 10px 40px rgba(0,0,0,1) !important; 
        font-family: 'Segoe UI', sans-serif !important;
    }
    .pac-item { 
        border-top: 1px solid #222 !important; 
        padding: 15px !important; 
        cursor: pointer !important; 
        color: #fff !important; /* Alt metin beyaz */
    }
    .pac-item:hover, .pac-item-selected { background-color: #1a1a1a !important; }
    
    /* İkonu Sarı Yapma (Filter yöntemi ile) */
    .pac-icon { 
        filter: invert(79%) sepia(66%) saturate(632%) hue-rotate(352deg) brightness(101%) contrast(93%); 
    }
    
    /* Başlık (Yer İsmi) Beyaz */
    .pac-item-query { 
        color: #fff !important; 
        font-weight: 700 !important; 
        font-size: 15px !important; 
    }

    /* ÜST MENU */
    .top-nav { position: absolute; top: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-circle { width: 45px; height: 45px; background: #f5d05c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .logo-pill { background: rgba(0,0,0,0.9); border: 1.5px solid #f5d05c; padding: 8px 20px; border-radius: 30px; color: #fff; font-weight: 800; letter-spacing: 1px; font-size: 13px; text-transform: uppercase; }

    /* SHEET VE FORM */
    .bottom-sheet { 
        position: fixed; bottom: -120%; left: 0; right: 0; 
        background: #0a0a0a; border-top-left-radius: 30px; border-top-right-radius: 30px; 
        z-index: 100; padding: 25px; transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); 
        border-top: 1px solid #333; height: 85vh; overflow-y: auto; 
        box-shadow: 0 -10px 50px rgba(0,0,0,0.9);
    }
    .bottom-sheet.active { bottom: 0; }
    
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
    .sheet-title { color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
    .close-btn { font-size: 24px; color: #666; cursor: pointer; padding: 5px; }

    /* INPUTLAR */
    .fld { margin-bottom: 15px; position: relative; }
    .fld label { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 6px; font-weight: 800; letter-spacing: 0.5px; }
    .inp-box { 
        width: 100%; background: #111; border: 1px solid #333; color: #fff; 
        padding: 16px; border-radius: 12px; font-size: 15px; transition: 0.3s;
    }
    .inp-box:focus { border-color: #f5d05c; background: #000; }
    
    /* BUTONLAR */
    .primary-btn { 
        width: 100%; background: #f5d05c; color: #000; border: none; 
        padding: 18px; border-radius: 12px; font-weight: 900; font-size: 15px; 
        text-transform: uppercase; cursor: pointer; margin-top: 15px; 
    }
    .secondary-btn {
        width: 100%; background: transparent; border: 1px solid #333; color: #888;
        padding: 15px; border-radius: 12px; font-weight: 700; font-size: 13px;
        cursor: pointer; margin-top: 10px;
    }
    
    /* ANA EKRAN BUTONU */
    .action-area { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; z-index: 5; }
    .book-btn { background: #f5d05c; color: #000; border: none; padding: 18px 40px; border-radius: 40px; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

    /* STEP 2 - ARAÇ KARTI */
    .car-card {
        background: linear-gradient(145deg, #151515, #0a0a0a);
        border: 1px solid #333; border-radius: 16px; padding: 20px;
        margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
    }
    .car-icon-circle {
        width: 60px; height: 60px; background: #000; border-radius: 50%;
        border: 1px solid #333; display: flex; align-items: center; justify-content: center;
        font-size: 24px; color: #fff;
    }
    .car-details h3 { font-size: 16px; margin-bottom: 4px; font-weight: 800; }
    .car-details p { font-size: 12px; color: #888; }
    .plate-box { display: inline-block; border: 1px solid #555; padding: 2px 6px; border-radius: 4px; color: #fff; font-family: monospace; margin-left: 5px; background: #222; }

    /* FİYAT ALANI */
    .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #ccc; }
    .price-total { border-top: 1px solid #222; padding-top: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .big-price { font-size: 28px; color: #f5d05c; font-weight: 900; }

    /* GİZLEME CLASS'I */
    .hidden { display: none !important; }

    /* YÜKLENİYOR ANİMASYONU */
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.3); border-radius: 50%; border-top-color: #000; animation: spin 1s ease-in-out infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-circle">☰</div>
    <div class="logo-pill">TEOMAN DEVECI</div>
  </div>

  <div class="action-area" id="mainActionArea">
    <button class="book-btn" onclick="openSheet()">🚗 VIP YOLCULUK PLANLA</button>
  </div>

  <div class="bottom-sheet" id="bookingSheet">
    
    <div id="step1">
        <div class="sheet-header">
            <span class="sheet-title">Yolculuk Detayları</span>
            <span class="close-btn" onclick="closeSheet()">✕</span>
        </div>

        <div class="fld">
            <label>Nereden (Alış Noktası)</label>
            <input type="text" id="pickup" class="inp-box" placeholder="Konum arayın...">
        </div>

        <div class="fld">
            <label>Nereye (Varış Noktası)</label>
            <input type="text" id="dropoff" class="inp-box" placeholder="Gidilecek yer...">
        </div>

        <div style="display:flex; gap:10px;">
            <div class="fld" style="flex:1;">
                <label>Tarih</label>
                <input type="date" id="rideDate" class="inp-box" value="2025-12-25">
            </div>
            <div class="fld" style="flex:1;">
                <label>Saat</label>
                <input type="time" id="rideTime" class="inp-box" value="10:00">
            </div>
        </div>

        <button class="primary-btn" id="calcBtn" onclick="calculateAndContinue()">
            FİYATI HESAPLA & DEVAM ET
        </button>
    </div>

    <div id="step2" class="hidden">
        <div class="sheet-header">
            <span class="sheet-title">Araç ve Onay</span>
            <span class="close-btn" onclick="closeSheet()">✕</span>
        </div>

        <div class="car-card">
            <div class="car-icon-circle">🚘</div>
            <div class="car-details">
                <h3>Mercedes-Benz EQS 450+</h3>
                <p>Siyah • Luxury Sedan <span class="plate-box">JK 24 24</span></p>
                <div style="color:#f5d05c; font-size:11px; margin-top:5px; font-weight:700;">Şoför: Teoman Deveci</div>
            </div>
        </div>

        <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #333; margin-bottom:20px;">
            <div class="price-row"><span>Mesafe</span><span id="dispMiles">-- mil</span></div>
            <div class="price-row"><span>Baz Ücret</span><span>$65.00</span></div>
            <div class="price-row"><span>Ekstra Mil Ücreti</span><span id="dispExtra">--</span></div>
            <div class="price-total">
                <span style="font-weight:700; color:#fff;">TOPLAM TAHMİNİ</span>
                <span class="big-price" id="dispTotal">--</span>
            </div>
        </div>

        <div class="fld">
            <label>Ad Soyad</label>
            <input type="text" id="custName" class="inp-box" placeholder="İsminiz">
        </div>

        <button class="primary-btn" onclick="finishBooking()">REZERVASYONU ONAYLA</button>
        <button class="secondary-btn" onclick="backToStep1()">❮ Düzenle</button>
    </div>

  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  
  <script>
    // === HARİTA VE AUTOCOMPLETE AYARLARI ===
    let map;
    function initMap() {
        // Harita Başlangıcı
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 38.9072, lng: -77.0369 }, // Washington DC / Tysons area
            zoom: 13,
            disableDefaultUI: true, // Temiz görünüm
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#0d0d0d" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#4d4d4d" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1a1a1a" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#000000" }] }
            ]
        });

        // Autocomplete Ayarları
        const options = { componentRestrictions: { country: 'us' } };
        const pickupInput = document.getElementById('pickup');
        const dropoffInput = document.getElementById('dropoff');

        new google.maps.places.Autocomplete(pickupInput, options);
        new google.maps.places.Autocomplete(dropoffInput, options);
    }

    // Sayfa Yüklendiğinde Haritayı Başlat
    window.onload = initMap;

    // === SAYFA İŞLEMLERİ ===
    const sheet = document.getElementById('bookingSheet');
    const mainBtn = document.getElementById('mainActionArea');

    function openSheet() {
        sheet.classList.add('active');
        mainBtn.style.display = 'none';
    }

    function closeSheet() {
        sheet.classList.remove('active');
        mainBtn.style.display = 'flex';
        setTimeout(() => backToStep1(), 500); // Kapanınca sıfırla
    }

    function calculateAndContinue() {
        const p = document.getElementById('pickup').value;
        const d = document.getElementById('dropoff').value;
        const btn = document.getElementById('calcBtn');

        if(!p || !d) {
            alert("Lütfen nereden nereye gideceğinizi seçin.");
            return;
        }

        // Buton animasyonu
        const originalText = btn.innerText;
        btn.innerHTML = '<span class="spinner"></span> HESAPLANIYOR...';
        
        // Simüle edilmiş backend isteği (Gerçekte server.js'e soracak)
        // Şimdilik görsel geçişi yapıyoruz:
        setTimeout(() => {
            // Rastgele fiyat simülasyonu
            const miles = Math.floor(Math.random() * 15) + 5;
            const total = 65 + (miles > 10 ? (miles-10)*3 : 0);
            
            document.getElementById('dispMiles').innerText = miles + " mil";
            document.getElementById('dispExtra').innerText = miles > 10 ? `$${((miles-10)*3).toFixed(2)}` : "$0.00";
            document.getElementById('dispTotal').innerText = "$" + total.toFixed(2);

            // Ekrana geç
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            
            // Butonu düzelt
            btn.innerText = originalText;
        }, 1000);
    }

    function backToStep1() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
    }

    function finishBooking() {
        const name = document.getElementById('custName').value;
        if(!name) { alert("Lütfen isminizi giriniz."); return; }

        alert("Teşekkürler " + name + "! Rezervasyon talebin Teoman Deveci'ye iletildi.");
        closeSheet();
    }
  </script>
</body>
</html>
