<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo-container">
    <span class="logo-title">JK2424</span>
    <span class="logo-sub">PRIVATE CHAUFFEUR SERVICE</span>
  </div>

  <div class="wrapper">
    <header>
      <div class="back-btn" id="headerBack" onclick="goBack()">❮</div>
      <div class="menu-btn" onclick="checkLastBooking()">☰</div>
    </header>

    <div id="sectionStep1">
      <h2 style="font-size: 24px; margin-bottom: 20px;">Book Your Ride</h2>
      <div class="card">
        <div class="step-pill">Step 1 · Trip Details</div>
        <input id="pickup" type="text" placeholder="Pickup Location" />
        <input id="stop" type="text" placeholder="Extra Stop (Optional)" />
        <input id="dropoff" type="text" placeholder="Drop-off Location" />
        <div style="display:flex; gap:10px;">
          <input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" />
          <input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" />
        </div>
        <div class="toggle-row">
          <button id="amBtn" class="t-btn active">AM</button>
          <button id="pmBtn" class="t-btn">PM</button>
        </div>
        <button id="calcBtn" class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
      </div>
    </div>

    <div id="estimateResultArea" class="hidden">
      <div class="estimate-details-card">
        <div class="est-title">Estimate Details</div>
        <div class="est-row"><span>Total Distance:</span><span id="resDist">--</span></div>
        <div class="est-row"><span>Base Fare (inc. miles):</span><span id="resBase">--</span></div>
        <div class="est-row"><span>Extra Miles Cost:</span><span id="resExtra">--</span></div>
        <div class="est-row"><span>Night Rate Applied:</span><span id="resNight">--</span></div>
        <div class="est-total-line">
          <span class="est-total-label">Estimated total</span>
          <span class="est-total-val" id="resTotal">--</span>
        </div>
      </div>
    </div>

    <div id="sectionStep2" class="hidden">
      <h2 style="font-size: 24px; margin-bottom: 20px;">Passenger Info</h2>
      <div class="card">
        <div class="step-pill">Step 2 · Passenger Details</div>
        <div class="field" style="background:#050505; padding:15px; border-radius:12px; border:1px dashed #333; margin-bottom:15px;">
           <div id="sumTripInfo" style="font-size:12px; color:#aaa; line-height:1.4;"></div>
        </div>
        <input id="fullName" type="text" placeholder="Full Name" />
        <input id="phone" type="tel" placeholder="Mobile Phone" />
        <button id="bookBtn" class="primary-btn" onclick="sendBooking()">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script src="app.js"></script>
</body>
</html>
