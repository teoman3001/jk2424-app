<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="back-btn" id="headerBack" onclick="goBack()">❮</div>
    <div class="header-logo">JK2424</div>
    <div class="menu-btn" onclick="checkLastBooking()">☰</div>
  </header>

  <div class="app-container">
    <div id="sectionStep1">
      <div class="card">
        <div class="step-title">Step 1 · Trip Details</div>
        <div class="field"><label>Pickup</label><input id="pickup" type="text" placeholder="Where from?" /></div>
        <div class="field"><label>Extra Stop</label><input id="stop" type="text" placeholder="Add a stop" /></div>
        <div class="field"><label>Drop-off</label><input id="dropoff" type="text" placeholder="Where to?" /></div>
        <div style="display:flex; gap:10px;">
          <div class="field" style="flex:1;"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" /></div>
          <div class="field" style="flex:1;"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" /></div>
        </div>
        <label>Time Period</label>
        <div class="toggle-row">
          <button id="amBtn" class="t-btn active">AM</button>
          <button id="pmBtn" class="t-btn">PM</button>
        </div>
        <button id="calcBtn" class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
      </div>
    </div>

    <div id="sectionStep2" class="hidden">
      <div class="card">
        <div class="step-title">Step 2 · Passenger</div>
        <div class="summary-box">
          <div id="sumRoute" style="font-size: 12px; color: #aaa;"></div>
          <div id="sumTotal" class="sum-val"></div>
        </div>
        <div class="field"><label>Full Name</label><input id="fullName" type="text" /></div>
        <div class="field"><label>Phone</label><input id="phone" type="tel" /></div>
        <div class="field"><label>Email</label><input id="email" type="email" /></div>
        <div class="field"><label>Notes</label><textarea id="notes" rows="2" style="width:100%; background:#080808; border:1px solid #333; color:#fff; border-radius:12px; padding:10px;"></textarea></div>
        <button id="bookBtn" class="primary-btn" onclick="sendBooking()">Confirm Reservation</button>
      </div>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script src="app.js"></script>
</body>
</html>
