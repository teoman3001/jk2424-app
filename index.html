<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium Chauffeur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo-container">
    <span class="logo-title">JK2424</span>
    <span class="logo-sub">PRIVATE CHAUFFEUR SERVICE</span>
  </div>

  <div class="wrapper">
    <header>
      <div class="back-btn" id="headerBack" onclick="goBack()">❮</div>
      <div class="menu-btn" onclick="checkLastBooking()">☰</div>
    </header>

    <div id="sectionStep1">
      <h2 style="font-size: 24px; margin-bottom: 5px;">Book Your Ride</h2>
      <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Premium service at your fingertips. Enter trip details.</p>
      
      <div class="card">
        <div class="step-pill">Step 1 · Trip Details</div>
        <div class="field"><label>Pickup Location</label><input id="pickup" type="text" placeholder="Tysons, VA" autocomplete="off" /></div>
        <div class="field"><label>Extra Stop (Optional)</label><input id="stop" type="text" placeholder="Optional extra stop" autocomplete="off" /></div>
        <div class="field"><label>Drop-off Location</label><input id="dropoff" type="text" placeholder="Dulles Airport" autocomplete="off" /></div>
        <div style="display:flex; gap:10px;">
          <div class="field" style="flex:1;"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" /></div>
          <div class="field" style="flex:1;"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" /></div>
        </div>
        <label>AM / PM</label>
        <div class="toggle-row">
          <button id="amBtn" class="t-btn active">AM</button>
          <button id="pmBtn" class="t-btn">PM</button>
        </div>
        <button id="calcBtn" class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
      </div>
    </div>

    <div id="sectionStep2" class="hidden">
      <h2 style="font-size: 24px; margin-bottom: 5px;">Passenger Info</h2>
      <div class="card">
        <div class="step-pill">Step 2 · Passenger Details</div>
        <div class="summary-box">
          <div id="sumRoute" style="font-size:13px; color:#ccc; line-height:1.4;"></div>
          <div id="sumTime" style="font-size:13px; color:#ccc; margin-top:5px;"></div>
          <span id="sumTotal" class="sum-total"></span>
        </div>
        <div class="field"><label>Full Name</label><input id="fullName" type="text" placeholder="John Doe" /></div>
        <div class="field"><label>Mobile Phone</label><input id="phone" type="tel" placeholder="+1..." /></div>
        <div class="field"><label>Email</label><input id="email" type="email" placeholder="name@example.com" /></div>
        <div class="field"><label>Notes</label><textarea id="notes" rows="2" placeholder="Gate codes, luggage..."></textarea></div>
        <button id="bookBtn" class="primary-btn" onclick="sendBooking()">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script src="app.js"></script>
</body>
</html>
