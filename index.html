<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium EQS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-circle" onclick="checkLastBooking()">☰</div>
    <div class="logo-pill">JK2424</div>
  </div>

  <div class="action-area">
    <button class="main-book-btn" onclick="openSheet()">🚗 BOOK LUXURY RIDE</button>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="handle"></div>
    
    <div id="step1">
      <h2 style="color:#fff; margin-bottom:20px; font-size:18px;">Trip Details</h2>
      <div class="fld"><label>Pickup</label><input id="pickup" type="text" placeholder="Pickup location" /></div>
      <div class="fld"><label>Extra Stop</label><input id="stop" type="text" placeholder="Optional stop" /></div>
      <div class="fld"><label>Drop-off</label><input id="dropoff" type="text" placeholder="Drop-off location" /></div>
      <div style="display:flex; gap:10px;">
        <div class="fld" style="flex:1;"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" /></div>
        <div class="fld" style="flex:1;"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" /></div>
      </div>
      <div class="toggle-row">
        <button id="amBtn" class="t-btn active">AM</button>
        <button id="pmBtn" class="t-btn">PM</button>
      </div>
      <button class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
    </div>

    <div id="step2" style="display:none;">
      <h2 style="color:#fff; margin-bottom:15px; font-size:18px;">Confirm Booking</h2>
      <div class="est-card">
        <div id="resDist" style="color:#aaa; font-size:13px;"></div>
        <div id="resTotal" class="est-total"></div>
      </div>
      <div class="fld"><label>Full Name</label><input id="fullName" type="text" placeholder="Enter your name" /></div>
      <div class="fld"><label>Phone</label><input id="phone" type="tel" placeholder="Enter phone" /></div>
      <div class="fld"><label>Email</label><input id="email" type="email" placeholder="Enter email" /></div>
      <div class="fld"><label>Notes</label><textarea id="notes" rows="2" style="width:100%; background:#151515; border:1px solid #222; border-radius:12px; color:#fff; padding:15px; outline:none;"></textarea></div>
      <button class="primary-btn" onclick="sendBooking()">Confirm Reservation</button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script src="app.js"></script>
</body>
</html>
