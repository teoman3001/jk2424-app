<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#000; color:#f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display:flex; flex-direction:column; align-items:center; padding:24px 12px 48px; }
    .logo { text-align:center; margin-bottom:24px; }
    .logo-title { font-size:28px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .logo-sub { margin-top:4px; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#cccccc; }
    .wrapper { width:100%; max-width:560px; }
    .card { background:#111; border-radius:14px; border:1px solid #333; padding:18px 18px 20px; margin-bottom:18px; box-shadow:0 18px 40px rgba(0,0,0,0.5); }
    .card-header-pill { display:inline-block; padding:5px 10px; border-radius:999px; border:1px solid #444; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#e2e2e2; margin-bottom:14px; background:linear-gradient(135deg, #181818, #101010); }
    .field-group { margin-bottom:10px; }
    label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#aaaaaa; margin-bottom:4px; }
    input[type="text"], input[type="tel"], input[type="email"], textarea { width:100%; border-radius:8px; border:1px solid #444; background:#050505; color:#f5f5f5; padding:8px 10px; font-size:13px; outline:none; transition:0.15s; }
    input:focus { border-color:#f5d05c; background:#080808; }
    .row { display:flex; gap:10px; }
    .row > .col { flex:1; }
    .ampm-toggle { display:flex; gap:10px; margin-top:4px; margin-bottom:10px; }
    .ampm-btn { flex:1; border-radius:999px; border:1px solid #444; background:#050505; color:#f5f5f5; padding:7px 0; font-size:13px; cursor:pointer; }
    .ampm-btn.active { background:#f5d05c; border-color:#f5d05c; color:#000; font-weight:600; box-shadow:0 8px 18px rgba(245,208,92,0.35); }
    .primary-btn { width:100%; border-radius:999px; border:none; background:#f5d05c; color:#000; font-weight:600; text-transform:uppercase; font-size:13px; padding:11px 0; cursor:pointer; margin-top:6px; box-shadow:0 14px 30px rgba(245,208,92,0.35); }
    .primary-btn:disabled { background:#444; color:#888; cursor:not-allowed; }
    .estimate-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
    .estimate-total { margin-top:8px; padding-top:8px; border-top:1px solid #333; display:flex; justify-content:space-between; align-items:center; }
    .estimate-total-value { color:#f5d05c; font-size:20px; font-weight:700; }
    .step2 { display:none; }
    .step2.visible { display:block; }
    .pac-container { background:#000 !important; border:1px solid #444 !important; }
    .pac-item { color:#f5d05c !important; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">
    <div style="margin-bottom: 20px; text-align: right;">
      <button onclick="checkLastBooking()" style="background: none; border: 1px solid #f5d05c; color: #f5d05c; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold;">
        📍 TRACK ACTIVE RIDE
      </button>
    </div>

    <div class="card">
      <div class="card-header-pill">Step 1 · Trip details</div>
      <div class="field-group"><label>Pickup location</label><input id="pickup" type="text" placeholder="Tysons, VA" /></div>
      <div class="field-group"><label>Extra stop (optional)</label><input id="stop" type="text" placeholder="Optional extra stop" /></div>
      <div class="field-group"><label>Drop-off location</label><input id="dropoff" type="text" placeholder="Dulles Airport" /></div>
      <div class="row">
        <div class="col field-group"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" /></div>
        <div class="col field-group"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" /></div>
      </div>
      <div class="ampm-toggle">
        <button id="amBtn" class="ampm-btn active">AM</button>
        <button id="pmBtn" class="ampm-btn">PM</button>
      </div>
      <button id="calcPriceBtn" class="primary-btn">Calculate Price</button>
    </div>

    <div class="card" id="estimateCard">
      <div id="estimateEmptyText" style="color:#aaa; font-size:11px;">Enter details for estimate.</div>
      <div id="estimateDetails" style="display:none;">
        <div class="estimate-row"><span>Distance:</span><strong id="estDistance">--</strong></div>
        <div class="estimate-row"><span>Night Rate:</span><strong id="estNight">--</strong></div>
        <div class="estimate-total"><span>Total</span><span class="estimate-total-value" id="estTotal">$0.00</span></div>
      </div>
    </div>

    <div class="card step2" id="step2Card">
      <div class="card-header-pill">Step 2 · Passenger details</div>
      <div class="field-group"><label>Full name</label><input id="fullName" type="text" /></div>
      <div class="field-group"><label>Phone</label><input id="mobilePhone" type="tel" /></div>
      <div class="field-group"><label>Email</label><input id="email" type="email" /></div>
      <div class="field-group"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
      <button id="sendBookingBtn" class="primary-btn">Send Reservation</button>
    </div>
  </div>

  <script>
    const BACKEND_BASE = 'https://jk2424-backend.onrender.com';
    let currentAmpm = 'AM';
    let lastQuote = null;

    function checkLastBooking() {
      const lastId = localStorage.getItem("jk2424_booking_id");
      if (lastId) window.location.href = "track.html?id=" + lastId;
      else alert("No active booking found.");
    }

    document.getElementById('amBtn').onclick = () => { currentAmpm = 'AM'; document.getElementById('amBtn').classList.add('active'); document.getElementById('pmBtn').classList.remove('active'); };
    document.getElementById('pmBtn').onclick = () => { currentAmpm = 'PM'; document.getElementById('pmBtn').classList.add('active'); document.getElementById('amBtn').classList.remove('active'); };

    document.getElementById('rideDate').oninput = (e) => {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
      if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5,9);
      e.target.value = v.slice(0,10);
    };

    document.getElementById('calcPriceBtn').onclick = async function() {
      const pickup = document.getElementById('pickup').value;
      const dropoff = document.getElementById('dropoff').value;
      const time = document.getElementById('rideTime').value;
      if (!pickup || !dropoff || time.length < 5) return alert("Complete Step 1");

      try {
        this.innerText = "Calculating..."; this.disabled = true;
        const [h] = time.split(':'); let hr = parseInt(h);
        if (currentAmpm === 'PM' && hr !== 12) hr += 12;
        if (currentAmpm === 'AM' && hr === 12) hr = 0;
        const isNight = (hr >= 22 || hr < 5);

        const res = await fetch(`${BACKEND_BASE}/calc?pickup=${encodeURIComponent(pickup)}&dropoff=${encodeURIComponent(dropoff)}&stop=${encodeURIComponent(document.getElementById('stop').value)}&isNight=${isNight}`);
        const data = await res.json();
        if (data.success) {
          const p = data.pricing;
          document.getElementById('estimateEmptyText').style.display = 'none';
          document.getElementById('estimateDetails').style.display = 'block';
          document.getElementById('estDistance').innerText = p.miles + " mi";
          document.getElementById('estNight').innerText = p.nightApplied ? "Yes" : "No";
          document.getElementById('estTotal').innerText = "$" + p.total.toFixed(2);
          document.getElementById('step2Card').classList.add('visible');
          lastQuote = { pickup, stop: document.getElementById('stop').value, dropoff, rideDate: document.getElementById('rideDate').value, rideTime: time, ampm: currentAmpm, miles: p.miles, total: p.total };
        }
      } catch (e) { alert("Error."); } finally { this.innerText = "Calculate Price"; this.disabled = false; }
    };

    document.getElementById('sendBookingBtn').onclick = async function() {
      const name = document.getElementById('fullName').value;
      const phone = document.getElementById('mobilePhone').value;
      if (!name || !phone) return alert("Missing info.");
      try {
        this.innerText = "Sending..."; this.disabled = true;
        const res = await fetch(`${BACKEND_BASE}/bookings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...lastQuote, customerName: name, customerPhone: phone, customerEmail: document.getElementById('email').value, notes: document.getElementById('notes').value })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem("jk2424_booking_id", data.booking.id);
          window.location.href = "track.html?id=" + data.booking.id;
        }
      } catch (e) { alert("Error."); }
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places" async defer></script>
  <script>
    window.onload = () => {
      const opt = { componentRestrictions: { country: 'us' } };
      new google.maps.places.Autocomplete(document.getElementById('pickup'), opt);
      new google.maps.places.Autocomplete(document.getElementById('stop'), opt);
      new google.maps.places.Autocomplete(document.getElementById('dropoff'), opt);
    };
  </script>
</body>
</html>
