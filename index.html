<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo { text-align:center; margin-bottom:24px; }
    .logo-title { font-size:28px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .logo-sub { margin-top:4px; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#cccccc; }
    .wrapper { width:100%; max-width:560px; }
    h1 { font-size:26px; margin-bottom:4px; }
    .lead { font-size:13px; line-height:1.5; color:#cccccc; margin-bottom:18px; }
    .card {
      background:#111;
      border-radius:14px;
      border:1px solid #333;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .card-header-pill {
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid #444;
      font-size:11px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#e2e2e2;
      margin-bottom:14px;
    }
    .field-group { margin-bottom:10px; }
    label {
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#aaaaaa;
      margin-bottom:4px;
    }
    input, textarea {
      width:100%;
      border-radius:8px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:8px 10px;
      font-size:13px;
    }
    .primary-btn {
      width:100%;
      border-radius:999px;
      border:none;
      background:#f5d05c;
      color:#000;
      font-weight:600;
      padding:11px 0;
      cursor:pointer;
      margin-top:6px;
    }
    .step2 { display:none; }
    .step2.visible { display:block; }

    /* STATUS BOX */
    .status-box {
      margin-top:12px;
      padding:12px;
      border-radius:10px;
      background:#0b0b0b;
      color:#f5d05c;
      font-weight:600;
      text-align:center;
      border:1px solid #333;
    }
    .hidden { display:none; }
  </style>
</head>

<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">

    <div class="card">
      <div class="card-header-pill">Step 1 · Trip details</div>
      <input id="pickup" placeholder="Pickup location" />
      <input id="stop" placeholder="Extra stop (optional)" />
      <input id="dropoff" placeholder="Drop-off location" />
      <button id="calcPriceBtn" class="primary-btn">Calculate Price</button>
    </div>

    <div class="card step2" id="step2Card">
      <div class="card-header-pill">Step 2 · Passenger</div>
      <input id="fullName" placeholder="Full name" />
      <input id="mobilePhone" placeholder="Phone" />
      <input id="email" placeholder="Email" />
      <textarea id="notes" placeholder="Notes"></textarea>
      <button id="sendBookingBtn" class="primary-btn">Send reservation</button>

      <!-- STATUS -->
      <div id="statusBox" class="status-box hidden">
        Status: pending
      </div>
    </div>

  </div>

  <script>
    const BACKEND_BASE = "https://jk2424-backend.onrender.com";
    const step2Card = document.getElementById("step2Card");
    const statusBox = document.getElementById("statusBox");

    document.getElementById("calcPriceBtn").onclick = () => {
      step2Card.classList.add("visible");
    };

    document.getElementById("sendBookingBtn").onclick = async () => {
      const payload = {
        pickup: pickup.value,
        stop: stop.value,
        dropoff: dropoff.value,
        customerName: fullName.value,
        customerPhone: mobilePhone.value,
        customerEmail: email.value,
        notes: notes.value
      };

      const res = await fetch(BACKEND_BASE + "/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!data.success) return alert("Booking failed");

      localStorage.setItem("jk2424_booking_id", data.bookingId);
      statusBox.classList.remove("hidden");
      startPolling(data.bookingId);
    };

    async function startPolling(id) {
      setInterval(async () => {
        const r = await fetch(BACKEND_BASE + "/bookings/" + id);
        const d = await r.json();
        if (d.success) statusBox.innerText = "Status: " + d.booking.status;
      }, 5000);
    }

    const saved = localStorage.getItem("jk2424_booking_id");
    if (saved) {
      statusBox.classList.remove("hidden");
      startPolling(saved);
    }
  </script>
</body>
</html>
