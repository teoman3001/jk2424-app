<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • VIP Private Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* ANA TASARIM VE RENKLER */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body, html { height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }

    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* ÜST NAVİGASYON VE MENÜ */
    .top-nav { position: absolute; top: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-circle { width: 45px; height: 45px; background: #f5d05c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .logo-pill { background: rgba(0,0,0,0.9); border: 1.5px solid #f5d05c; padding: 8px 20px; border-radius: 30px; color: #fff; font-weight: 800; letter-spacing: 2px; font-size: 13px; }

    /* YAN MENÜ TASARIMI */
    .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #0a0a0a; z-index: 300; transition: 0.4s; padding: 60px 25px; border-right: 1px solid #222; }
    .side-menu.open { left: 0; }
    .menu-item { color: #fff; font-size: 16px; font-weight: 600; padding: 15px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .menu-item:hover { color: #f5d05c; }

    /* REZERVASYON PANELİ */
    .bottom-sheet { 
        position: fixed; bottom: -110%; left: 0; right: 0; background: #0a0a0a; 
        border-top-left-radius: 30px; border-top-right-radius: 30px; 
        z-index: 100; padding: 25px; transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        border-top: 1px solid #222; height: 85vh; overflow-y: auto;
    }
    .bottom-sheet.active { bottom: 0; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .close-x { font-size: 22px; color: #555; cursor: pointer; padding: 5px; }

    /* FORM ELEMANLARI */
    .fld { margin-bottom: 15px; }
    label { display: block; font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 6px; font-weight: 800; }
    input, textarea { width: 100%; background: #050505; border: 1px solid #222; color: #fff; padding: 14px; border-radius: 12px; font-size: 14px; outline: none; }
    input:focus { border-color: #f5d05c; }
    .primary-btn { width: 100%; background: #f5d05c; color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; }

    /* FİYAT DETAY KARTI */
    .est-card { background: #050505; border: 1px solid #222; border-radius: 18px; padding: 20px; margin-bottom: 20px; }
    .est-row { display: flex; justify-content: space-between; font-size: 13px; color: #ddd; margin-bottom: 7px; }
    .total-val { font-size: 24px; color: #f5d05c; font-weight: 900; }

    /* BAŞARI BİLDİRİM PENCERESİ (3-5 SANİYELİK) */
    #successToast { 
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        background: rgba(10, 10, 10, 0.95); border: 1.5px solid #f5d05c; 
        padding: 30px; border-radius: 25px; z-index: 500; width: 85%; 
        text-align: center; display: none; backdrop-filter: blur(10px);
    }
    #successToast h3 { color: #f5d05c; margin-bottom: 10px; font-size: 18px; }
    #successToast p { color: #fff; font-size: 14px; line-height: 1.5; }

    .action-area { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; z-index: 5; }
    .book-btn { background: #f5d05c; color: #000; border: none; padding: 18px 40px; border-radius: 40px; font-weight: 900; font-size: 15px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

    /* GOOGLE AUTOCOMPLETE */
    .pac-container { background-color: #0a0a0a !important; border: 1px solid #222 !important; border-radius: 12px !important; z-index: 9999 !important; }
    .pac-item { color: #f5d05c !important; border-top: 1px solid #222 !important; padding: 12px !important; }
    .pac-item-query { color: #fff !important; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-circle" onclick="toggleMenu(true)">☰</div>
    <div class="logo-pill">JK2424</div>
  </div>

  <div id="sideMenu" class="side-menu">
    <div class="close-x" style="text-align:right;" onclick="toggleMenu(false)">✕</div>
    <div class="menu-item" onclick="alert('Profile Settings coming soon')">👤 My Profile</div>
    <div class="menu-item" onclick="openTrips()">🚗 My Trips (Yolculuklarım)</div>
    <div class="menu-item" onclick="alert('Support connected')">💬 Support</div>
  </div>

  <div class="action-area">
    <button class="book-btn" onclick="openSheet()">🚗 BOOK LUXURY RIDE</button>
  </div>

  <div id="successToast">
    <h3>Talebiniz İletilmiştir</h3>
    <p>Müsaitlik kontrol edilip şoförünüz en hızlı şekilde size dönüş yapacaktır.</p>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="sheet-header">
      <h2 id="sheetTitle" style="color:#fff; font-size:16px; font-weight:900;">Step 1 · Trip Details</h2>
      <div class="close-x" onclick="closeSheet()">✕</div>
    </div>
    
    <div id="step1">
      <div class="fld"><label>Pickup Location</label><input id="pickup" type="text" placeholder="Pickup location" /></div>
      <div class="fld"><label>Extra Stop</label><input id="stop" type="text" placeholder="Optional stop" /></div>
      <div class="fld"><label>Drop-off Location</label><input id="dropoff" type="text" placeholder="Drop-off location" /></div>
      <div style="display:flex; gap:10px;">
        <div class="fld" style="flex:1;"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" oninput="formatDate(this)" /></div>
        <div class="fld" style="flex:1;"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" oninput="formatTime(this)" /></div>
      </div>
      <button class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
    </div>

    <div id="step2" class="hidden">
      <div class="est-card">
        <div class="est-row"><span>Distance:</span><span id="resDist">--</span></div>
        <div class="est-row"><span>Base Fare:</span><span>$65.00</span></div>
        <div class="est-row"><span>Extra Miles:</span><span id="resExtra">--</span></div>
        <div class="est-total-line" style="margin-top:10px; border-top:1px solid #222; padding-top:10px; display:flex; justify-content:space-between;">
          <span style="color:#fff; font-weight:800;">Estimated total</span>
          <span id="resTotal" class="total-val">--</span>
        </div>
      </div>
      <div class="fld"><label>Ride Notes (Optional)</label><textarea id="notes" rows="3" placeholder="Luggage, child seat..."></textarea></div>
      <button class="primary-btn" id="confirmBtn" onclick="sendBooking()">Confirm Booking</button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script>
    const BACKEND = 'https://jk2424-backend.onrender.com';
    let lastQuote = null;

    // OTOMATİK FORMATLAYICILAR
    function formatDate(i) { let v = i.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2); if(v.length>5) v=v.slice(0,5)+'/'+v.slice(5,9); i.value = v; }
    function formatTime(i) { let v = i.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+':'+v.slice(2,4); i.value = v; }

    // MENÜ FONKSİYONLARI
    function toggleMenu(open) { document.getElementById('sideMenu').classList.toggle('open', open); }
    
    function openTrips() {
        const trips = JSON.parse(localStorage.getItem('jk_trips') || '[]');
        if(trips.length === 0) alert("Henüz bir yolculuğunuz bulunmuyor.");
        else alert(trips.length + " aktif yolculuk talebiniz inceleniyor.");
    }

    // MAP BAŞLATMA
    function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 38.9072, lng: -77.0369 }, zoom: 12, disableDefaultUI: true,
            styles: [{ "elementType": "geometry", "stylers": [{ "color": "#0d0d0d" }] }, { "elementType": "labels.text.fill", "stylers": [{ "color": "#4d4d4d" }] }]
        });
        const opt = { componentRestrictions: { country: 'us' } };
        new google.maps.places.Autocomplete(document.getElementById('pickup'), opt);
        new google.maps.places.Autocomplete(document.getElementById('dropoff'), opt);
    }

    function openSheet() { document.getElementById('sheet').classList.add('active'); }
    function closeSheet() { document.getElementById('sheet').classList.remove('active'); }

    async function calculatePrice() {
        const p = document.getElementById('pickup').value;
        const d = document.getElementById('dropoff').value;
        if(!p || !d) return alert("Locations required.");
        
        const res = await fetch(`${BACKEND}/calc?pickup=${encodeURIComponent(p)}&dropoff=${encodeURIComponent(d)}`);
        const data = await res.json();
        if(data.success) {
            lastQuote = data.pricing;
            document.getElementById('resDist').innerText = data.pricing.miles + " miles";
            document.getElementById('resTotal').innerText = "$" + data.pricing.total.toFixed(2);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }
    }

    async function sendBooking() {
        const btn = document.getElementById('confirmBtn');
        const user = JSON.parse(localStorage.getItem('jk_user') || '{"name":"Guest"}');
        
        btn.innerText = "Processing..."; btn.disabled = true;

        try {
            const res = await fetch(`${BACKEND}/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    ...lastQuote, 
                    pickup: document.getElementById('pickup').value,
                    dropoff: document.getElementById('dropoff').value,
                    customerName: user.name,
                    notes: document.getElementById('notes').value 
                })
            });

            if(res.ok) {
                // 1. Paneli kapat
                closeSheet();
                
                // 2. LocalStorage'a (My Trips) kaydet
                const trips = JSON.parse(localStorage.getItem('jk_trips') || '[]');
                trips.push({ date: new Date().toLocaleDateString(), status: 'Pending', total: lastQuote.total });
                localStorage.setItem('jk_trips', JSON.stringify(trips));

                // 3. Başarı toast mesajını göster (4 saniye)
                const toast = document.getElementById('successToast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 4000);
            }
        } catch(e) { alert("Sistem yoğun, lütfen tekrar deneyin."); }
        finally { btn.innerText = "Confirm Booking"; btn.disabled = false; }
    }

    window.onload = initMap;
  </script>
</body>
</html>
