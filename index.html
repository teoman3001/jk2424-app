<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium Private Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* JK2424 SIGNATURE LUXURY STYLE - PERFECTION SAVED */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body, html { height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* UI ELEMENTS */
    .top-nav { position: absolute; top: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-circle { width: 45px; height: 45px; background: #f5d05c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .logo-pill { background: rgba(0,0,0,0.9); border: 1.5px solid #f5d05c; padding: 8px 20px; border-radius: 30px; color: #fff; font-weight: 800; letter-spacing: 2px; font-size: 13px; }

    /* SIDE MENU & TABS */
    .side-menu { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #0a0a0a; z-index: 300; transition: 0.4s; padding: 50px 20px; border-right: 1px solid #222; overflow-y: auto; }
    .side-menu.open { left: 0; }
    .tab-header { display: flex; gap: 10px; margin: 20px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .tab-link { color: #666; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .tab-link.active { color: #f5d05c; }

    /* TRIP CARDS */
    .trip-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; }
    .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: 800; text-transform: uppercase; position: absolute; top: 15px; right: 15px; }
    .status-pending { background: #333; color: #fff; }
    .status-approved { background: #f5d05c; color: #000; }
    .status-active { background: #28a745; color: #fff; }

    /* BOTTOM SHEET & BUTTONS */
    .bottom-sheet { position: fixed; bottom: -110%; left: 0; right: 0; background: #0a0a0a; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 100; padding: 25px; transition: 0.5s; height: 85vh; overflow-y: auto; border-top: 1px solid #222; }
    .bottom-sheet.active { bottom: 0; }
    .t-btn { flex: 1; padding: 18px; border-radius: 12px; border: 1px solid #222; background: #050505; color: #fff; font-weight: 800; cursor: pointer; font-size: 15px; }
    .t-btn.active { background: #f5d05c; color: #000; border-color: #f5d05c; }
    .primary-btn { width: 100%; background: #f5d05c; color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 15px; text-transform: uppercase; cursor: pointer; }

    /* TOAST MESSAGE */
    #statusToast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,10,10,0.98); border: 2px solid #f5d05c; padding: 35px; border-radius: 25px; z-index: 500; width: 85%; text-align: center; display: none; backdrop-filter: blur(10px); color: #fff; }

    /* GOOGLE AUTOCOMPLETE FIX */
    .pac-container { background-color: #0a0a0a !important; border: 1px solid #222 !important; border-radius: 12px !important; z-index: 9999 !important; }
    .pac-item { color: #f5d05c !important; border-top: 1px solid #222 !important; padding: 12px !important; }
    .pac-item-query { color: #fff !important; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-circle" onclick="toggleMenu(true)">☰</div>
    <div class="logo-pill">JK2424</div>
  </div>

  <div id="sideMenu" class="side-menu">
    <div onclick="toggleMenu(false)" style="text-align:right; color:#555; cursor:pointer;">CLOSE ✕</div>
    <h2 style="color:#fff; margin:20px 0 10px; font-weight:900;">MY TRIPS</h2>
    
    <div class="tab-header">
      <div id="tabPending" class="tab-link active" onclick="switchTab('pending')">Pending</div>
      <div id="tabUpcoming" class="tab-link" onclick="switchTab('upcoming')">Upcoming</div>
      <div id="tabPast" class="tab-link" onclick="switchTab('past')">Past</div>
    </div>

    <div id="tripList">
      </div>
  </div>

  <div class="action-area" style="position: absolute; bottom: 65px; width: 100%; display: flex; justify-content: center; z-index: 5;">
    <button id="mainBookBtn" class="primary-btn" style="width: auto; padding: 20px 45px; border-radius: 40px;" onclick="handleBookingStart()">🚗 BOOK LUXURY RIDE</button>
  </div>

  <div id="statusToast">
    <h3 id="toastTitle">Request Sent</h3>
    <p id="toastMsg" style="margin-top:10px;">Our team is reviewing your request. We will notify you once approved for payment.</p>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="sheet-header" style="display:flex; justify-content:space-between; align-items:center;">
      <h2 id="sheetTitle" style="color:#fff; font-size:18px; font-weight:900;">Step 1 · Trip Details</h2>
      <div onclick="closeSheet()" style="color:#555; cursor:pointer; font-size:24px;">✕</div>
    </div>
    
    <div id="step1">
      <div style="margin:20px 0;">
        <label style="color:#666; font-size:10px; font-weight:800;">PICKUP</label>
        <input id="pickup" type="text" placeholder="Where from?" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-top:5px;" />
      </div>
      <div style="margin:15px 0;">
        <label style="color:#666; font-size:10px; font-weight:800;">DROP-OFF</label>
        <input id="dropoff" type="text" placeholder="Where to?" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-top:5px;" />
      </div>
      <div style="display:flex; gap:12px; margin-bottom:15px;">
        <div style="flex:1;"><label style="color:#666; font-size:10px;">DATE</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" oninput="formatDate(this)" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px;" /></div>
        <div style="flex:1;"><label style="color:#666; font-size:10px;">TIME</label><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" oninput="formatTime(this)" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px;" /></div>
      </div>
      <div class="toggle-row">
        <button id="amBtn" class="t-btn active" onclick="setAmpm('AM')">AM</button>
        <button id="pmBtn" class="t-btn" onclick="setAmpm('PM')">PM</button>
      </div>
      <button class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
    </div>

    <div id="step2" class="hidden">
      <div id="priceDetails" style="margin:20px 0; background:#080808; border:1px solid #222; padding:20px; border-radius:15px;"></div>
      <textarea id="notes" rows="3" placeholder="Notes (optional)" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:15px; border-radius:12px; margin-bottom:15px;"></textarea>
      <button class="primary-btn" onclick="sendBooking()">Confirm Booking</button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script>
    const BACKEND = 'https://jk2424-backend.onrender.com';
    let currentAmpm = 'AM';
    let currentTrips = [];

    // HARİTA AYARLARI
    function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 38.9072, lng: -77.0369 }, zoom: 12, disableDefaultUI: true,
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#0d0d0d" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#4d4d4d" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1a1a1a" }] }
            ]
        });
        const opt = { componentRestrictions: { country: 'us' } };
        new google.maps.places.Autocomplete(document.getElementById('pickup'), opt);
        new google.maps.places.Autocomplete(document.getElementById('dropoff'), opt);
    }

    // MULTI-REQUEST PREVENTION
    function handleBookingStart() {
        const hasPending = currentTrips.some(t => t.status === 'Pending' || t.status === 'Approved');
        if(hasPending) {
            alert("You already have an active request. Please check 'My Trips' to complete it before starting a new one.");
            toggleMenu(true);
        } else {
            openSheet();
        }
    }

    // TRIP LIST MANAGEMENT
    function switchTab(type) {
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
        renderTrips(type);
    }

    function renderTrips(type) {
        const list = document.getElementById('tripList');
        list.innerHTML = "";
        const filtered = currentTrips.filter(t => t.viewGroup === type);
        
        filtered.forEach(t => {
            const card = document.createElement('div');
            card.className = "trip-card";
            card.innerHTML = `
                <div class="status-badge status-${t.status.toLowerCase()}">${t.status}</div>
                <div style="font-size:12px; color:#f5d05c; font-weight:800;">${t.date} @ ${t.time} ${t.ampm}</div>
                <div style="font-size:13px; color:#fff; margin-top:5px;">To: ${t.dropoff.split(',')[0]}</div>
                <div style="font-size:14px; font-weight:900; color:#fff; margin-top:10px;">$${t.total}</div>
                ${t.status === 'Approved' ? '<button class="primary-btn" style="padding:10px; font-size:11px; margin-top:10px;" onclick="openPayment()">PAY NOW</button>' : ''}
            `;
            list.innerHTML += card.outerHTML;
        });
    }

    async function sendBooking() {
        // Mocking trip addition for front-end flow
        const newTrip = {
            id: Date.now(),
            date: document.getElementById('rideDate').value,
            time: document.getElementById('rideTime').value,
            ampm: currentAmpm,
            dropoff: document.getElementById('dropoff').value,
            total: "128.04", // This would come from calculatePrice logic
            status: "Pending",
            viewGroup: "pending"
        };
        currentTrips.push(newTrip);
        closeSheet();
        showToast("Request Sent", "Our team is reviewing your request. Please check 'My Trips' for updates.");
        renderTrips('pending');
    }

    function showToast(title, msg) {
        const t = document.getElementById('statusToast');
        document.getElementById('toastTitle').innerText = title;
        document.getElementById('toastMsg').innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 4500);
    }

    window.onload = initMap;
    function toggleMenu(o) { document.getElementById('sideMenu').classList.toggle('open', o); if(o) renderTrips('pending'); }
    function openSheet() { document.getElementById('sheet').classList.add('active'); }
    function closeSheet() { document.getElementById('sheet').classList.remove('active'); }
    function formatDate(i) { let v = i.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2); if(v.length>5) v=v.slice(0,5)+'/'+v.slice(5,9); i.value = v; }
    function formatTime(i) { let v = i.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+':'+v.slice(2,4); i.value = v; }
    function setAmpm(v) { currentAmpm = v; document.getElementById('amBtn').classList.toggle('active', v==='AM'); document.getElementById('pmBtn').classList.toggle('active', v==='PM'); }
  </script>
</body>
</html>
