<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* MERCEDES EQS BLACK & SILVER DESIGN */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body, html { height: 100%; width: 100%; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }

    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #111; }

    /* BİLDİRİM ROZETLİ MENÜ */
    .top-nav { position: absolute; top: 50px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-wrapper { position: relative; }
    .menu-circle { width: 50px; height: 50px; background: #f5d05c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; cursor: pointer; }
    .notification-badge { position: absolute; top: -2px; right: -2px; background: #ff3b30; color: #fff; font-size: 10px; font-weight: 800; padding: 4px 7px; border-radius: 10px; border: 2px solid #000; display: none; }
    .logo-pill { background: rgba(0,0,0,0.85); border: 1.5px solid #c0c0c0; padding: 10px 25px; border-radius: 30px; color: #fff; font-weight: 900; letter-spacing: 2px; font-size: 14px; }

    .action-area { position: absolute; bottom: 85px; width: 100%; display: flex; justify-content: center; z-index: 5; }
    .book-btn { background: #f5d05c; color: #000; border: none; padding: 20px 45px; border-radius: 40px; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }

    /* EQS BOTTOM SHEET */
    .bottom-sheet { 
        position: fixed; bottom: -110%; left: 0; right: 0; background: #0c0c0c; 
        border-top-left-radius: 35px; border-top-right-radius: 35px; 
        z-index: 100; padding: 25px; transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        border-top: 1px solid #333; max-height: 95vh; overflow-y: auto;
    }
    .bottom-sheet.active { bottom: 0; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .close-x { font-size: 24px; color: #666; cursor: pointer; padding: 5px; }

    .fld { margin-bottom: 18px; }
    label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
    input, textarea { width: 100%; background: #151515; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 14px; font-size: 14px; outline: none; }
    
    .t-btn { flex: 1; padding: 16px; border-radius: 14px; border: 1px solid #222; background: #111; color: #fff; font-weight: 700; cursor: pointer; }
    .t-btn.active { background: #f5d05c; color: #000; border-color: #f5d05c; }

    .primary-btn { width: 100%; background: #f5d05c; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; }
    .secondary-btn { width: 100%; background: transparent; color: #888; border: 1px solid #333; padding: 15px; border-radius: 15px; font-size: 13px; margin-top: 10px; cursor: pointer; }

    .est-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #f5d05c; }
    .est-total { font-size: 28px; color: #f5d05c; font-weight: 900; margin-top: 10px; display: block; }
    
    /* MODAL FOR FIRST-TIME INFO */
    #profileModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 100%; max-width: 400px; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-wrapper" onclick="toggleMenu()">
      <div class="menu-circle">☰</div>
      <div id="notifBadge" class="notification-badge">1</div>
    </div>
    <div class="logo-pill">JK2424</div>
  </div>

  <div class="action-area">
    <button class="book-btn" onclick="openSheet()">🚗 BOOK LUXURY RIDE</button>
  </div>

  <div id="profileModal">
    <div class="modal-content">
      <h2 style="color:#fff; margin-bottom:15px;">Welcome to JK2424</h2>
      <p style="color:#888; font-size:13px; margin-bottom:20px;">Please enter your details to continue. You only need to do this once.</p>
      <input id="profName" type="text" placeholder="Full Name" style="margin-bottom:10px;">
      <input id="profPhone" type="tel" placeholder="Mobile Phone" style="margin-bottom:10px;">
      <input id="profEmail" type="email" placeholder="Email Address" style="margin-bottom:20px;">
      <button class="primary-btn" onclick="saveProfile()">Save & Continue</button>
    </div>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="sheet-header">
      <h2 id="sheetTitle" style="color:#fff; font-size:18px; font-weight:900;">Step 1 · Trip Details</h2>
      <div class="close-x" onclick="closeSheet()">✕</div>
    </div>
    
    <div id="step1">
      <div class="fld"><label>Pickup Location</label><input id="pickup" type="text" placeholder="Tysons Corner, VA" /></div>
      <div class="fld"><label>Extra Stop</label><input id="stop" type="text" placeholder="Add a stop (optional)" /></div>
      <div class="fld"><label>Drop-off Location</label><input id="dropoff" type="text" placeholder="Dulles Airport (IAD)" /></div>
      <div style="display:flex; gap:10px;">
        <div class="fld" style="flex:1;"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" /></div>
        <div class="fld" style="flex:1;"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" /></div>
      </div>
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="amBtn" class="t-btn active" onclick="setAmpm('AM')">AM</button>
        <button id="pmBtn" class="t-btn" onclick="setAmpm('PM')">PM</button>
      </div>
      <button class="primary-btn" id="calcBtn" onclick="calculatePrice()">Calculate Price</button>
    </div>

    <div id="step2" class="hidden">
      <div class="est-card">
        <div id="resDist" style="color:#aaa; font-size:13px;"></div>
        <span id="resTotal" class="est-total">--</span>
      </div>
      <div class="fld">
        <label>Ride Notes</label>
        <textarea id="notes" rows="4" placeholder="Gate codes, luggage count, or special requests..."></textarea>
      </div>
      <button class="primary-btn" onclick="sendBooking()">Confirm Reservation</button>
      <button class="secondary-btn" onclick="toggleStep(1)">❮ Back to Details</button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script>
    const BACKEND = 'https://jk2424-backend.onrender.com';
    let currentAmpm = 'AM';
    let lastQuote = null;

    // PROFILE MANAGEMENT
    window.addEventListener('load', () => {
        initMap();
        if(!localStorage.getItem('jk_user')) {
            document.getElementById('profileModal').style.display = 'flex';
        }
    });

    function saveProfile() {
        const user = {
            name: document.getElementById('profName').value,
            phone: document.getElementById('profPhone').value,
            email: document.getElementById('profEmail').value
        };
        if(!user.name || !user.phone) return alert("Name and Phone are mandatory.");
        localStorage.setItem('jk_user', JSON.stringify(user));
        document.getElementById('profileModal').style.display = 'none';
    }

    function initMap() {
        new google.maps.Map(document.getElementById("map"), {
            center: { lat: 38.9072, lng: -77.0369 }, zoom: 12, disableDefaultUI: true,
            styles: [{ "elementType": "geometry", "stylers": [{ "color": "#212121" }] }, { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] }]
        });
        const opt = { componentRestrictions: { country: 'us' } };
        new google.maps.places.Autocomplete(document.getElementById('pickup'), opt);
        new google.maps.places.Autocomplete(document.getElementById('stop'), opt);
        new google.maps.places.Autocomplete(document.getElementById('dropoff'), opt);
    }

    function openSheet() { document.getElementById('sheet').classList.add('active'); }
    function closeSheet() { document.getElementById('sheet').classList.remove('active'); }
    function toggleStep(s) {
        document.getElementById('step1').classList.toggle('hidden', s === 2);
        document.getElementById('step2').classList.toggle('hidden', s === 1);
        document.getElementById('sheetTitle').innerText = s === 1 ? "Step 1 · Trip Details" : "Step 2 · Price Confirmation";
    }

    function setAmpm(val) {
        currentAmpm = val;
        document.getElementById('amBtn').classList.toggle('active', val === 'AM');
        document.getElementById('pmBtn').classList.toggle('active', val === 'PM');
    }

    async function calculatePrice() {
        const p = document.getElementById('pickup').value;
        const d = document.getElementById('dropoff').value;
        if(!p || !d) return alert("Enter locations.");
        try {
            const res = await fetch(`${BACKEND}/calc?pickup=${encodeURIComponent(p)}&dropoff=${encodeURIComponent(d)}&isNight=${currentAmpm==='PM'}`);
            const data = await res.json();
            if(data.success) {
                lastQuote = { ...data.pricing, pickup:p, dropoff:d, ampm:currentAmpm };
                document.getElementById('resDist').innerText = data.pricing.miles + " miles total distance";
                document.getElementById('resTotal').innerText = "$" + data.pricing.total.toFixed(2);
                toggleStep(2);
            }
        } catch (e) { alert("Error connecting server."); }
    }

    async function sendBooking() {
        const user = JSON.parse(localStorage.getItem('jk_user'));
        try {
            const res = await fetch(`${BACKEND}/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    ...lastQuote, 
                    customerName: user.name,
                    customerPhone: user.phone,
                    customerEmail: user.email,
                    notes: document.getElementById('notes').value
                })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('jk2424_booking_id', data.booking.id);
                alert("Reservation Sent! You can track it in 'My Trips'.");
                closeSheet();
                // Bildirim Badge Simülasyonu
                document.getElementById('notifBadge').style.display = 'block';
            }
        } catch (e) { alert("Booking failed."); }
    }
  </script>
</body>
</html>
