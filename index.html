<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo { text-align:center; margin-bottom:24px; }
    .logo-title { font-size:28px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .logo-sub { margin-top:4px; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#cccccc; }
    .wrapper { width:100%; max-width:560px; }
    h1 { font-size:26px; margin-bottom:4px; }
    .lead { font-size:13px; line-height:1.5; color:#cccccc; margin-bottom:18px; }
    .card {
      background:#111;
      border-radius:14px;
      border:1px solid #333;
      padding:18px 18px 20px;
      margin-bottom:18px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .card-header-pill {
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid #444;
      font-size:11px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#e2e2e2;
      margin-bottom:14px;
      background:linear-gradient(135deg, #181818, #101010);
    }
    .field-group { margin-bottom:10px; }
    label {
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#aaaaaa;
      margin-bottom:4px;
    }
    input, textarea {
      width:100%;
      border-radius:8px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:8px 10px;
      font-size:13px;
      outline:none;
    }
    .row { display:flex; gap:10px; }
    .row > .col { flex:1; }
    .ampm-toggle { display:flex; gap:10px; margin:10px 0; }
    .ampm-btn {
      flex:1;
      border-radius:999px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:7px 0;
      cursor:pointer;
    }
    .ampm-btn.active {
      background:#f5d05c;
      color:#000;
      font-weight:600;
    }
    .primary-btn {
      width:100%;
      border-radius:999px;
      border:none;
      background:#f5d05c;
      color:#000;
      font-weight:600;
      text-transform:uppercase;
      padding:11px 0;
      cursor:pointer;
      margin-top:6px;
    }
    .msg { margin-top:8px; font-size:12px; min-height:16px; }
    .msg.error { color:#ff6b6b; }
    .msg.success { color:#4cd964; }
    .step2 { display:none; }
    .step2.visible { display:block; }
  </style>
</head>

<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">

    <h1>Book Your Ride</h1>
    <p class="lead">
      Enter trip details to get an instant estimate and send your reservation request.
    </p>

    <div class="card">
      <div class="card-header-pill">Step 1 · Trip details</div>

      <div class="field-group">
        <label>Pickup</label>
        <input id="pickup" />
      </div>

      <div class="field-group">
        <label>Extra stop</label>
        <input id="stop" />
      </div>

      <div class="field-group">
        <label>Drop-off</label>
        <input id="dropoff" />
      </div>

      <div class="row">
        <div class="col field-group">
          <label>Date</label>
          <input id="rideDate" />
        </div>
        <div class="col field-group">
          <label>Time</label>
          <input id="rideTime" />
        </div>
      </div>

      <div class="ampm-toggle">
        <button id="amBtn" class="ampm-btn active">AM</button>
        <button id="pmBtn" class="ampm-btn">PM</button>
      </div>

      <button id="calcPriceBtn" class="primary-btn">Calculate Price</button>
      <div id="calcMsg" class="msg"></div>
    </div>

    <div class="card step2" id="step2Card">
      <div class="card-header-pill">Step 2 · Passenger</div>

      <input id="fullName" placeholder="Full name" />
      <input id="mobilePhone" placeholder="Phone" />
      <input id="email" placeholder="Email" />
      <textarea id="notes" placeholder="Notes"></textarea>

      <button id="sendBookingBtn" class="primary-btn">
        Send reservation request
      </button>
      <div id="bookingMsg" class="msg"></div>
    </div>

  </div>

  <script>
    const BACKEND_BASE = 'https://jk2424-backend.onrender.com';

    let currentAmpm = 'AM';
    amBtn.onclick = () => { currentAmpm = 'AM'; amBtn.classList.add('active'); pmBtn.classList.remove('active'); };
    pmBtn.onclick = () => { currentAmpm = 'PM'; pmBtn.classList.add('active'); amBtn.classList.remove('active'); };

    let lastQuote = null;

    calcPriceBtn.onclick = async () => {
      const pickup = pickup.value.trim();
      const dropoff = dropoff.value.trim();
      if (!pickup || !dropoff) {
        calcMsg.textContent = 'Pickup and drop-off required';
        calcMsg.className = 'msg error';
        return;
      }

      const res = await fetch(
        BACKEND_BASE + '/calc?pickup=' + encodeURIComponent(pickup) +
        '&dropoff=' + encodeURIComponent(dropoff)
      );

      const data = await res.json();
      lastQuote = { pickup, dropoff, total: data.total || 0 };
      step2Card.classList.add('visible');
      calcMsg.textContent = '';
    };

    sendBookingBtn.onclick = async () => {
      if (!lastQuote) return;

      const payload = {
        ...lastQuote,
        customerName: fullName.value,
        customerPhone: mobilePhone.value,
        customerEmail: email.value,
        notes: notes.value
      };

      const res = await fetch(BACKEND_BASE + '/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        bookingMsg.textContent = 'Reservation received';
        bookingMsg.className = 'msg success';
      } else {
        bookingMsg.textContent = 'Server error';
        bookingMsg.className = 'msg error';
      }
    };
  </script>
</body>
</html>
