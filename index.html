<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>JK2424 • Luxury Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* JK2424 SIGNATURE DESIGN - 2025-12-25 Version [cite: 2025-12-25] */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
    #map { position: absolute; inset: 0; z-index: 1; }
    .top-nav { position: absolute; top: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .logo-pill { background: rgba(0,0,0,0.9); border: 1.5px solid #f5d05c; padding: 8px 20px; border-radius: 30px; font-weight: 800; font-size: 13px; }
    
    /* Durum Göstergesi (Menü Altında) */
    .status-indicator { position: absolute; top: 100px; left: 20px; background: rgba(0,0,0,0.8); border: 1px solid #f5d05c; padding: 10px 15px; border-radius: 15px; font-size: 12px; z-index: 100; display: none; }

    .bottom-sheet { position: fixed; bottom: -110%; left: 0; right: 0; background: #0a0a0a; border-radius: 35px 35px 0 0; z-index: 100; padding: 25px; transition: 0.6s; height: 85vh; border-top: 1px solid #222; }
    .bottom-sheet.active { bottom: 0; }
    .primary-btn { width: 100%; background: #f5d05c; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    .t-btn { flex: 1; padding: 18px; border-radius: 12px; border: 1px solid #333; background: #050505; color: #fff; font-weight: 800; cursor: pointer; }
    .t-btn.active { background: #f5d05c; color: #000; border-color: #f5d05c; }
    input { width: 100%; background: #050505; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 12px; margin-top: 5px; outline: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="top-nav"><div class="logo-pill">JK2424</div></div>
  <div id="rideStatus" class="status-indicator">STATUS: AWAITING APPROVAL</div>
  
  <div style="position: absolute; bottom: 65px; width: 100%; display: flex; justify-content: center; z-index: 5;"><button class="primary-btn" style="width: auto; padding: 20px 45px; border-radius: 40px;" id="startBtn" onclick="openSheet()">🚗 BOOK LUXURY RIDE</button></div>

  <div class="bottom-sheet" id="sheet">
    <div id="step1">
      <h2 style="margin-bottom:20px;">Step 1 · Trip Details</h2>
      <input id="pickup" type="text" placeholder="Pickup location" />
      <input id="stop" type="text" placeholder="Extra Stop (Optional)" />
      <input id="dropoff" type="text" placeholder="Destination" />
      <div style="display:flex; gap:10px; margin-top:10px;"><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" /><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" /></div>
      <div style="display:flex; gap:10px; margin:20px 0;"><button id="amBtn" class="t-btn active" onclick="setAmpm('AM')">AM</button><button id="pmBtn" class="t-btn" onclick="setAmpm('PM')">PM</button></div>
      <button class="primary-btn" onclick="sendBooking()">Confirm Booking</button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script>
    const BACKEND = 'https://jk2424-backend.onrender.com';
    let currentAmpm = 'AM', activeId = null;

    function openSheet() { document.getElementById('sheet').classList.add('active'); }

    async function sendBooking() {
      const payload = { pickup: document.getElementById('pickup').value, stop: document.getElementById('stop').value, dropoff: document.getElementById('dropoff').value, ampm:currentAmpm };
      const res = await fetch(`${BACKEND}/bookings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const data = await res.json();
      if(data.success) {
          activeId = data.booking.id;
          document.getElementById('sheet').classList.remove('active');
          document.getElementById('rideStatus').style.display = 'block';
          document.getElementById('startBtn').style.display = 'none';
          startMonitoring();
      }
    }

    function startMonitoring() {
      setInterval(async () => {
        const res = await fetch(`${BACKEND}/booking-status/${activeId}`);
        const data = await res.json();
        const statusEl = document.getElementById('rideStatus');
        if(data.status === 'Approved') {
           statusEl.innerHTML = "STATUS: <span style='color:#f5d05c'>APPROVED - AWAITING PAYMENT</span>";
        }
      }, 5000);
    }
    
    function setAmpm(v) { currentAmpm = v; document.getElementById('amBtn').classList.toggle('active', v==='AM'); document.getElementById('pmBtn').classList.toggle('active', v==='PM'); }
    function initMap() { new google.maps.Map(document.getElementById("map"), { center: { lat: 38.9072, lng: -77.0369 }, zoom: 12, disableDefaultUI: true, styles: [{ "elementType": "geometry", "stylers": [{ "color": "#0d0d0d" }] }] }); }
    window.onload = initMap;
  </script>
</body>
</html>
