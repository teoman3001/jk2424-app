<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium Journey Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* JK2424 LUXURY SIGNATURE */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body, html { height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* UI ELEMENTS */
    .top-nav { position: absolute; top: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-circle { width: 45px; height: 45px; background: #f5d05c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #000; cursor: pointer; }
    .logo-pill { background: rgba(0,0,0,0.9); border: 1.5px solid #f5d05c; padding: 8px 20px; border-radius: 30px; color: #fff; font-weight: 800; letter-spacing: 2px; font-size: 13px; }

    /* SIDE MENU & TRIP CARDS */
    .side-menu { position: fixed; top: 0; left: -100%; width: 320px; height: 100%; background: #0a0a0a; z-index: 300; transition: 0.4s; padding: 50px 20px; border-right: 1px solid #222; overflow-y: auto; }
    .side-menu.open { left: 0; }
    .tab-header { display: flex; gap: 15px; margin: 25px 0 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
    .tab-link { color: #555; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
    .tab-link.active { color: #f5d05c; }

    .trip-card { background: #050505; border: 1px solid #222; border-radius: 18px; padding: 20px; margin-bottom: 15px; position: relative; }
    .status-badge { position: absolute; top: 15px; right: 15px; font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: 900; }
    .status-pending { background: #222; color: #fff; }
    .status-approved { background: #f5d05c; color: #000; }
    .status-confirmed { background: #28a745; color: #fff; }

    /* BOTTOM PANELS */
    .bottom-sheet { position: fixed; bottom: -110%; left: 0; right: 0; background: #0a0a0a; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 100; padding: 25px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); height: 85vh; border-top: 1px solid #222; overflow-y: auto; }
    .bottom-sheet.active { bottom: 0; }
    .payment-sheet { position: fixed; bottom: -110%; left: 0; right: 0; background: #0a0a0a; border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 400; padding: 30px; transition: 0.5s; border-top: 1.5px solid #f5d05c; height: 75vh; }
    .payment-sheet.active { bottom: 0; }

    /* BUTTONS */
    .primary-btn { width: 100%; background: #f5d05c; color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; }
    .t-btn { flex: 1; padding: 18px; border-radius: 12px; border: 1px solid #222; background: #050505; color: #fff; font-weight: 800; cursor: pointer; }
    .t-btn.active { background: #f5d05c; color: #000; border-color: #f5d05c; }

    /* PAC AUTOCOMPLETE FIX */
    .pac-container { background-color: #0a0a0a !important; border: 1px solid #222 !important; border-radius: 12px !important; z-index: 9999 !important; }
    .pac-item { color: #f5d05c !important; border-top: 1px solid #222 !important; padding: 12px !important; }
    .pac-item-query { color: #fff !important; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-circle" onclick="toggleMenu(true)">☰</div>
    <div class="logo-pill">JK2424</div>
  </div>

  <div id="sideMenu" class="side-menu">
    <div onclick="toggleMenu(false)" style="text-align:right; color:#555; cursor:pointer;">CLOSE ✕</div>
    <h2 style="color:#fff; margin:20px 0; font-weight:900; font-size:24px;">MY TRIPS</h2>
    
    <div class="tab-header">
      <div id="tabPending" class="tab-link active" onclick="switchTab('pending')">Pending</div>
      <div id="tabUpcoming" class="tab-link" onclick="switchTab('upcoming')">Upcoming</div>
      <div id="tabPast" class="tab-link" onclick="switchTab('past')">Past</div>
    </div>

    <div id="tripList">
        </div>
  </div>

  <div style="position: absolute; bottom: 65px; width: 100%; display: flex; justify-content: center; z-index: 5;">
    <button class="primary-btn" style="width: auto; padding: 20px 45px; border-radius: 40px;" onclick="handleNewBooking()">🚗 BOOK LUXURY RIDE</button>
  </div>

  <div id="paymentPortal" class="payment-sheet">
    <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
        <h2 style="color:#fff; font-weight:900;">SECURE PAYMENT</h2>
        <div onclick="togglePayment(false)" style="color:#555; cursor:pointer;">✕</div>
    </div>
    <p style="color:#888; font-size:12px; margin-bottom:20px;">Your ride is approved! Please complete the Zelle transfer to secure your booking.</p>
    
    <div style="background:#111; border:1px solid #222; padding:20px; border-radius:15px; margin-bottom:20px;">
        <label style="font-size:10px; color:#f5d05c; font-weight:800;">TRANSFER TO ZELLE</label>
        <div style="color:#fff; font-weight:900; font-size:16px; margin:5px 0;">jk2424vip@email.com</div>
        <div style="color:#666; font-size:12px;">JK2424 LUXURY LLC</div>
        <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#888;">Total Amount:</span>
            <span id="payAmount" style="color:#f5d05c; font-size:24px; font-weight:900;">$0.00</span>
        </div>
    </div>

    <button class="primary-btn" onclick="confirmPaymentAction()">I'VE SENT THE PAYMENT</button>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="sheet-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 id="sheetTitle" style="color:#fff; font-size:18px; font-weight:900;">Step 1 · Details</h2>
        <div onclick="closeSheet()" style="color:#555; cursor:pointer;">✕</div>
    </div>

    <div id="step1">
        <div style="margin-bottom:15px;">
            <label style="color:#666; font-size:10px; font-weight:800;">PICKUP</label>
            <input id="pickup" type="text" placeholder="Pickup Address" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-top:5px;" />
        </div>
        <div style="margin-bottom:15px;">
            <label style="color:#666; font-size:10px; font-weight:800;">DROP-OFF</label>
            <input id="dropoff" type="text" placeholder="Destination" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-top:5px;" />
        </div>
        <div style="display:flex; gap:12px; margin-bottom:20px;">
            <div style="flex:1;"><label style="color:#666; font-size:10px;">DATE</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" oninput="formatDate(this)" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-top:5px;" /></div>
            <div style="flex:1;"><label style="color:#666; font-size:10px;">TIME</label><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" oninput="formatTime(this)" style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-top:5px;" /></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <button id="amBtn" class="t-btn active" onclick="setAmpm('AM')">AM</button>
            <button id="pmBtn" class="t-btn" onclick="setAmpm('PM')">PM</button>
        </div>
        <button class="primary-btn" onclick="processStep1()">Calculate Price</button>
    </div>

    <div id="step2" class="hidden">
        <div id="quoteDisplay" style="background:#080808; border:1px solid #222; padding:22px; border-radius:20px; margin-bottom:25px;"></div>
        <textarea id="notes" rows="3" placeholder="Luggage info, Gate codes..." style="width:100%; background:#050505; border:1px solid #222; color:#fff; padding:16px; border-radius:12px; margin-bottom:20px;"></textarea>
        <button class="primary-btn" onclick="finalizeBooking()">Confirm Booking</button>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script>
    let currentTrips = []; // Müşterinin yerel trip verisi
    let currentAmpm = 'AM';

    function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 38.9072, lng: -77.0369 }, zoom: 12, disableDefaultUI: true,
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#0d0d0d" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#4d4d4d" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1a1a1a" }] }
            ]
        });
        const opt = { componentRestrictions: { country: 'us' } };
        new google.maps.places.Autocomplete(document.getElementById('pickup'), opt);
        new google.maps.places.Autocomplete(document.getElementById('dropoff'), opt);
    }

    // FLOW LOGIC
    function handleNewBooking() {
        const hasActive = currentTrips.some(t => t.viewGroup === 'pending');
        if(hasActive) {
            alert("You have an active request. Please complete it before creating a new one.");
            toggleMenu(true);
        } else {
            openSheet();
        }
    }

    function processStep1() {
        // Price calculation logic stays here
        document.getElementById('quoteDisplay').innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:13px; color:#888;"><span>Distance</span><span style="color:#fff;">12.4 miles</span></div>
            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #222; padding-top:15px; margin-top:10px;">
                <span style="font-weight:900; color:#fff;">ESTIMATED TOTAL</span>
                <span style="color:#f5d05c; font-size:24px; font-weight:900;">$84.50</span>
            </div>
        `;
        toggleStep(2);
    }

    function finalizeBooking() {
        const trip = {
            id: Date.now(),
            pickup: document.getElementById('pickup').value,
            dropoff: document.getElementById('dropoff').value,
            date: document.getElementById('rideDate').value,
            time: document.getElementById('rideTime').value,
            ampm: currentAmpm,
            total: "84.50",
            status: "Pending", // Senden onay bekliyor
            viewGroup: "pending"
        };
        currentTrips.push(trip);
        closeSheet();
        toggleMenu(true);
        renderTrips('pending');
    }

    function renderTrips(group) {
        const list = document.getElementById('tripList');
        list.innerHTML = "";
        const filtered = currentTrips.filter(t => t.viewGroup === group);

        if(filtered.length === 0) {
            list.innerHTML = `<p style="color:#444; text-align:center; margin-top:40px; font-size:13px;">No ${group} trips found.</p>`;
            return;
        }

        filtered.forEach(t => {
            const card = document.createElement('div');
            card.className = "trip-card";
            card.innerHTML = `
                <div class="status-badge status-${t.status.toLowerCase()}">${t.status}</div>
                <div style="font-size:11px; color:#f5d05c; font-weight:800; margin-bottom:5px;">${t.date} | ${t.time} ${t.ampm}</div>
                <div style="color:#fff; font-size:13px; font-weight:700;">To: ${t.dropoff.split(',')[0]}</div>
                <div style="color:#fff; font-size:18px; font-weight:900; margin-top:10px;">$${t.total}</div>
                ${t.status === 'Approved' ? `<button class="primary-btn" style="padding:12px; margin-top:12px; font-size:12px;" onclick="openPaymentPortal('${t.total}')">PAY NOW</button>` : ''}
            `;
            list.innerHTML += card.outerHTML;
        });
    }

    function openPaymentPortal(amount) {
        document.getElementById('payAmount').innerText = "$" + amount;
        document.getElementById('paymentPortal').classList.add('active');
    }

    function confirmPaymentAction() {
        // Müşteri "Ödedim" dediğinde statü değişir (Mockup)
        const trip = currentTrips.find(t => t.viewGroup === 'pending');
        if(trip) {
            trip.status = "Payment Verifying";
            alert("Payment notification sent to admin. Your booking will be confirmed shortly.");
        }
        togglePayment(false);
        renderTrips('pending');
    }

    // UTILS
    function toggleMenu(o) { document.getElementById('sideMenu').classList.toggle('open', o); if(o) renderTrips('pending'); }
    function switchTab(g) { 
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab' + g.charAt(0).toUpperCase() + g.slice(1)).classList.add('active');
        renderTrips(g);
    }
    function openSheet() { document.getElementById('sheet').classList.add('active'); toggleStep(1); }
    function closeSheet() { document.getElementById('sheet').classList.remove('active'); }
    function toggleStep(s) { 
        document.getElementById('step1').style.display = s===1 ? 'block' : 'none';
        document.getElementById('step2').classList.toggle('hidden', s===1);
        document.getElementById('sheetTitle').innerText = s===1 ? "Step 1 · Details" : "Step 2 · Confirmation";
    }
    function togglePayment(o) { document.getElementById('paymentPortal').classList.toggle('active', o); }
    function setAmpm(v) { currentAmpm = v; document.getElementById('amBtn').classList.toggle('active', v==='AM'); document.getElementById('pmBtn').classList.toggle('active', v==='PM'); }
    function formatDate(i) { let v = i.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2); if(v.length>5) v=v.slice(0,5)+'/'+v.slice(5,9); i.value = v; }
    function formatTime(i) { let v = i.value.replace(/\D/g, ''); if(v.length>2) v=v.slice(0,2)+':'+v.slice(2,4); i.value = v; }
    window.onload = initMap;
  </script>
</body>
</html>
