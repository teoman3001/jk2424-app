<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • EQS Black</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="map"></div>

  <div class="top-nav">
    <div class="menu-btn" onclick="checkLastBooking()">☰</div>
    <div class="brand-pill">JK2424</div>
  </div>

  <div class="main-btn-container">
    <button class="book-trigger" onclick="toggleSheet(true)">
      Book Luxury Ride
    </button>
  </div>

  <div class="bottom-sheet" id="sheet">
    <div class="handle"></div>
    
    <div id="step1">
      <h3 style="color:#fff; margin-bottom:20px; font-weight:800;">Trip Details</h3>
      <div class="input-field"><label>Pickup</label><input id="pickup" type="text" placeholder="Where from?" /></div>
      <div class="input-field"><label>Extra Stop</label><input id="stop" type="text" placeholder="Add stop (optional)" /></div>
      <div class="input-field"><label>Drop-off</label><input id="dropoff" type="text" placeholder="Where to?" /></div>
      <div style="display:flex; gap:10px;">
        <div class="input-field" style="flex:1;"><label>Date</label><input id="rideDate" type="text" placeholder="MM/DD/YYYY" /></div>
        <div class="input-field" style="flex:1;"><label>Time</label><input id="rideTime" type="text" placeholder="HH:MM" /></div>
      </div>
      <div class="ampm-row">
        <button id="amBtn" class="t-btn active">AM</button>
        <button id="pmBtn" class="t-btn">PM</button>
      </div>
      <button class="book-trigger" style="width:100%; margin-top:20px;" onclick="calculatePrice()">Calculate Price</button>
    </div>

    <div id="step2" style="display:none;">
      <h3 style="color:#fff; margin-bottom:15px; font-weight:800;">Confirm Booking</h3>
      <div class="est-card">
        <div id="resDist" class="est-line"></div>
        <div id="resExtra" class="est-line" style="color:#666; font-size:11px;"></div>
        <span id="resTotal" class="est-total"></span>
      </div>
      <input id="fullName" type="text" placeholder="Full Name" />
      <input id="phone" type="tel" placeholder="Mobile Phone" />
      <input id="email" type="email" placeholder="Email Address" />
      <textarea id="notes" rows="2" placeholder="Notes for your chauffeur..."></textarea>
      <button class="book-trigger" style="width:100%;" onclick="sendBooking()">Confirm Reservation</button>
      <p onclick="toggleStep(1)" style="color:#888; text-align:center; font-size:12px; margin-top:15px; cursor:pointer;">❮ Edit trip details</p>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script src="app.js"></script>
</body>
</html>
