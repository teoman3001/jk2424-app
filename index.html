<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>JK2424 • Luxury Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
    #map { position: absolute; inset: 0; z-index: 1; }
    .top-nav { position: absolute; top: 40px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-circle { width: 45px; height: 45px; background: #f5d05c; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; cursor: pointer; }
    .logo-pill { background: rgba(0,0,0,0.9); border: 1.5px solid #f5d05c; padding: 8px 20px; border-radius: 30px; font-weight: 800; font-size: 13px; }
    .full-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
    .state-card { background: #0a0a0a; border: 1.5px solid #f5d05c; padding: 35px 25px; border-radius: 30px; width: 100%; max-width: 400px; }
    .bottom-sheet { position: fixed; bottom: -110%; left: 0; right: 0; background: #0a0a0a; border-radius: 35px 35px 0 0; z-index: 100; padding: 25px; transition: 0.6s; height: 85vh; border-top: 1px solid #222; overflow-y: auto; }
    .bottom-sheet.active { bottom: 0; }
    .primary-btn { width: 100%; background: #f5d05c; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    .t-btn { flex: 1; padding: 18px; border-radius: 12px; border: 1px solid #333; background: #050505; color: #fff; font-weight: 800; cursor: pointer; }
    .t-btn.active { background: #f5d05c; color: #000; border-color: #f5d05c; }
    input, textarea { width: 100%; background: #050505; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 12px; margin-top: 5px; outline: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="top-nav"><div class="menu-circle" onclick="toggleMenu(true)">☰</div><div class="logo-pill">JK2424</div></div>
  <div style="position: absolute; bottom: 65px; width: 100%; display: flex; justify-content: center; z-index: 5;"><button class="primary-btn" style="width: auto; padding: 20px 45px; border-radius: 40px;" onclick="handleStart()">🚗 BOOK LUXURY RIDE</button></div>

  <div id="screenPending" class="full-overlay"><div class="state-card"><h2>REQUEST SENT</h2><p>Awaiting chauffeur approval...</p></div></div>
  <div id="screenApprovedNotify" class="full-overlay"><div class="state-card"><h2>TRIP APPROVED</h2><button class="primary-btn" onclick="showPaymentSelection()">PAY NOW</button></div></div>
  <div id="screenZelleDetails" class="full-overlay"><div class="state-card"><h2>ZELLE PAYMENT</h2><div style="background:#080808; padding:20px; border:1px dashed #444; border-radius:15px; margin:20px 0; text-align:left;"><div style="font-weight:900;">jk2424vip@email.com</div><div style="margin-top:10px;">Total: <span id="finalPay">$0.00</span></div></div><button class="primary-btn" onclick="notifyZelleSent()">I HAVE SENT THE ZELLE</button></div></div>
  <div id="screenProcessing" class="full-overlay"><div class="state-card"><h2>REPORTED</h2><p>Returning to home...</p></div></div>

  <div class="bottom-sheet" id="sheet">
    <div id="step1">
      <h2 style="margin-bottom:20px;">Step 1 · Details</h2>
      <input id="pickup" type="text" placeholder="Pickup location" />
      <input id="stop" type="text" placeholder="Extra Stop (Optional)" />
      <input id="dropoff" type="text" placeholder="Destination" />
      <div style="display:flex; gap:10px;"><input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" /><input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" /></div>
      <div style="display:flex; gap:10px; margin:20px 0;"><button id="amBtn" class="t-btn active" onclick="setAmpm('AM')">AM</button><button id="pmBtn" class="t-btn" onclick="setAmpm('PM')">PM</button></div>
      <button class="primary-btn" onclick="calculatePrice()">Calculate Price</button>
    </div>
    <div id="step2" class="hidden"><div id="quoteDisplay" style="margin-bottom:20px;"></div><textarea id="notes" rows="3" placeholder="Luggage, Gate codes..."></textarea><button class="primary-btn" onclick="sendBooking()">Confirm Booking</button></div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places"></script>
  <script>
    const BACKEND = 'https://jk2424-backend.onrender.com';
    let currentAmpm = 'AM', activeId = null, lastQuote = null, statusLocked = false;

    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), { center: { lat: 38.9072, lng: -77.0369 }, zoom: 12, disableDefaultUI: true, styles: [{ "elementType": "geometry", "stylers": [{ "color": "#0d0d0d" }] }, { "elementType": "labels.text.fill", "stylers": [{ "color": "#4d4d4d" }] }, { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1a1a1a" }] }] });
      const opt = { componentRestrictions: { country: 'us' } };
      new google.maps.places.Autocomplete(document.getElementById('pickup'), opt);
      new google.maps.places.Autocomplete(document.getElementById('stop'), opt);
      new google.maps.places.Autocomplete(document.getElementById('dropoff'), opt);
    }
    async function calculatePrice() {
      const p = document.getElementById('pickup').value, d = document.getElementById('dropoff').value;
      if(!p || !d) return alert("Select locations.");
      try {
        const res = await fetch(`${BACKEND}/calc?pickup=${encodeURIComponent(p)}&dropoff=${encodeURIComponent(d)}&isNight=${currentAmpm==='PM'}`);
        const data = await res.json();
        if(data.success) {
          lastQuote = data.pricing;
          document.getElementById('quoteDisplay').innerHTML = `<div style="background:#080808; border:1px solid #222; padding:20px; border-radius:15px;"><div style="display:flex; justify-content:space-between;"><span>Distance:</span><span>${data.pricing.miles} mi</span></div><div style="display:flex; justify-content:space-between; margin-top:15px; border-top:1px solid #222; padding-top:15px;"><span>TOTAL:</span><span style="color:#f5d05c; font-weight:900;">$${data.pricing.total.toFixed(2)}</span></div></div>`;
          document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');
        }
      } catch (e) { alert("Server starting..."); }
    }
    async function sendBooking() {
      const res = await fetch(`${BACKEND}/bookings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...lastQuote, pickup: document.getElementById('pickup').value, stop: document.getElementById('stop').value, dropoff: document.getElementById('dropoff').value, ampm:currentAmpm, customerName: "Client", notes: document.getElementById('notes').value }) });
      const data = await res.json();
      if(data.success) { activeId = data.booking.id; statusLocked = true; document.getElementById('sheet').classList.remove('active'); hideAllScreens(); document.getElementById('screenPending').style.display='flex'; startStatusCheck(activeId); }
    }
    function startStatusCheck(id) {
      setInterval(async () => {
        const res = await fetch(`${BACKEND}/booking-status/${id}`);
        const data = await res.json();
        if(data.status === 'Approved') { hideAllScreens(); document.getElementById('finalPay').innerText = "$" + data.total.toFixed(2); document.getElementById('screenApprovedNotify').style.display = 'flex'; }
      }, 5000);
    }
    function showPaymentSelection() { hideAllScreens(); document.getElementById('screenZelleDetails').style.display = 'flex'; }
    async function notifyZelleSent() {
      await fetch(`${BACKEND}/update-booking`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: activeId, status: 'PaymentSent' }) });
      hideAllScreens(); document.getElementById('screenProcessing').style.display = 'flex'; setTimeout(() => { location.reload(); }, 4000);
    }
    function hideAllScreens() { document.querySelectorAll('.full-overlay').forEach(el => el.style.display='none'); }
    function handleStart() { if(statusLocked) alert("Pending request."); else document.getElementById('sheet').classList.add('active'); }
    function setAmpm(v) { currentAmpm = v; document.getElementById('amBtn').classList.toggle('active', v==='AM'); document.getElementById('pmBtn').classList.toggle('active', v==='PM'); }
    function toggleMenu() { alert("Journeys locked."); }
    window.onload = initMap;
  </script>
</body>
</html>
