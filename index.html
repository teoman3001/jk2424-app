<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Premium App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="back-btn" id="headerBack" onclick="goBack()">❮</div>
    <div class="header-logo">JK2424</div>
    <div class="menu-btn" onclick="checkLastBooking()">☰</div>
  </header>

  <div class="app-container">
    <div id="sectionStep1">
      <div class="card">
        <div class="step-title">Step 1 · Trip Details</div>
        <div class="field"><label>Pickup</label><input id="pickup" type="text" /></div>
        <div class="field"><label>Extra Stop</label><input id="stop" type="text" /></div>
        <div class="field"><label>Drop-off</label><input id="dropoff" type="text" /></div>
        <div style="display:flex; gap:10px;">
          <input id="rideDate" type="text" placeholder="Date" style="flex:1" />
          <input id="rideTime" type="text" placeholder="Time" style="flex:1" />
        </div>
        <button id="calcBtn" class="primary-btn" onclick="calculatePrice()">Calculate</button>
      </div>
    </div>

    <div id="sectionStep2" class="hidden">
      <div class="card">
        <div class="step-title">Step 2 · Passenger</div>
        <div class="summary-box">
          <div id="sumRoute"></div>
          <div id="sumTotal" class="sum-val"></div>
        </div>
        <input id="fullName" type="text" placeholder="Name" />
        <input id="phone" type="tel" placeholder="Phone" />
        <button id="bookBtn" class="primary-btn" onclick="sendBooking()">Confirm</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&libraries=places" async defer></script>
</body>
</html>
