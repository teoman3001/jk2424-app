<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JK2424 • Private Chauffeur Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:#000;
      color:#f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 12px 48px;
    }
    .logo { text-align:center; margin-bottom:24px; }
    .logo-title { font-size:28px; letter-spacing:0.25em; font-weight:700; color:#f5d05c; }
    .logo-sub { margin-top:4px; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:#cccccc; }
    .wrapper { width:100%; max-width:560px; }
    h1 { font-size:26px; margin-bottom:4px; }
    .lead { font-size:13px; line-height:1.5; color:#cccccc; margin-bottom:18px; }
    .card {
      background:#111;
      border-radius:14px;
      border:1px solid #333;
      padding:18px 18px 20px;
      margin-bottom:18px;
      box-shadow:0 18px 40px rgba(0,0,0,0.5);
    }
    .card-header-pill {
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid #444;
      font-size:11px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#e2e2e2;
      margin-bottom:14px;
      background:linear-gradient(135deg, #181818, #101010);
    }
    .field-group { margin-bottom:10px; }
    label {
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.12em;
      color:#aaaaaa;
      margin-bottom:4px;
    }
    input[type="text"], input[type="tel"], input[type="email"], textarea {
      width:100%;
      border-radius:8px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:8px 10px;
      font-size:13px;
      outline:none;
      transition:border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    input::placeholder, textarea::placeholder { color:#555; }
    input:focus, textarea:focus {
      border-color:#f5d05c;
      box-shadow:0 0 0 1px rgba(245,208,92,0.3);
      background:#080808;
    }
    .row { display:flex; gap:10px; }
    .row > .col { flex:1; }
    .ampm-toggle { display:flex; gap:10px; margin-top:4px; margin-bottom:10px; }
    .ampm-btn {
      flex:1;
      border-radius:999px;
      border:1px solid #444;
      background:#050505;
      color:#f5f5f5;
      padding:7px 0;
      font-size:13px;
      cursor:pointer;
      transition:all 0.15s;
    }
    .ampm-btn.active {
      background:#f5d05c;
      border-color:#f5d05c;
      color:#000;
      font-weight:600;
      box-shadow:0 8px 18px rgba(245,208,92,0.35);
    }
    .primary-btn {
      width:100%;
      border-radius:999px;
      border:none;
      background:#f5d05c;
      color:#000;
      font-weight:600;
      letter-spacing:0.08em;
      text-transform:uppercase;
      font-size:13px;
      padding:11px 0;
      cursor:pointer;
      margin-top:6px;
      transition:transform 0.1s, box-shadow 0.1s, background 0.15s;
      box-shadow:0 14px 30px rgba(245,208,92,0.35);
    }
    .primary-btn[disabled] { opacity:0.6; cursor:default; box-shadow:none; transform:none; }
    .primary-btn:hover:not([disabled]) { transform:translateY(-1px); box-shadow:0 18px 36px rgba(245,208,92,0.45); }
    .primary-btn:active:not([disabled]) { transform:translateY(0); box-shadow:0 10px 22px rgba(245,208,92,0.3); }

    .estimate-title { font-weight:700; color:#f5d05c; margin-bottom:8px; font-size:14px; }
    .estimate-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
    .estimate-total {
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid #333;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:15px;
      font-weight:600;
    }
    .estimate-total-value { color:#f5d05c; font-size:20px; font-weight:700; }
    .msg { margin-top:8px; font-size:12px; min-height:16px; }
    .msg.error { color:#ff6b6b; }
    .step2 { display:none; }
    .step2.visible { display:block; }
    .trip-summary-line { font-size:12px; margin-bottom:2px; }
    .footer { margin-top:14px; text-align:center; font-size:11px; color:#777; }
    @media (max-width:600px) { body { padding:18px 8px 32px; } .card { padding:16px 14px 18px; } }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-title">JK2424</div>
    <div class="logo-sub">Private Chauffeur Service</div>
  </div>

  <div class="wrapper">
    <h1>Book Your Ride</h1>
    <p class="lead">Premium service at your fingertips. Enter trip details for an instant estimate.</p>

    <div class="card">
      <div class="card-header-pill">Step 1 · Trip details</div>
      <div class="field-group">
        <label for="pickup">Pickup location</label>
        <input id="pickup" type="text" placeholder="Tysons, VA" />
      </div>
      <div class="field-group">
        <label for="stop">Extra stop (optional)</label>
        <input id="stop" type="text" placeholder="Optional extra stop" />
      </div>
      <div class="field-group">
        <label for="dropoff">Drop-off location</label>
        <input id="dropoff" type="text" placeholder="Dulles Airport" />
      </div>
      <div class="row">
        <div class="col field-group">
          <label for="rideDate">Date</label>
          <input id="rideDate" type="text" placeholder="MM/DD/YYYY" maxlength="10" />
        </div>
        <div class="col field-group">
          <label for="rideTime">Time</label>
          <input id="rideTime" type="text" placeholder="HH:MM" maxlength="5" />
        </div>
      </div>
      <label>AM / PM</label>
      <div class="ampm-toggle">
        <button id="amBtn" class="ampm-btn active" type="button">AM</button>
        <button id="pmBtn" class="ampm-btn" type="button">PM</button>
      </div>
      <button id="calcPriceBtn" class="primary-btn" type="button">Calculate Price</button>
      <div id="calcMsg" class="msg"></div>
    </div>

    <div class="card" id="estimateCard">
      <div class="estimate-title">Estimate</div>
      <div id="estimateEmptyText" style="color:#aaa; font-size:11px;">Enter details and tap “CALCULATE PRICE”.</div>
      <div id="estimateDetails" style="display:none;">
        <div class="estimate-row"><span>Distance:</span><span><strong id="estDistance">–</strong></span></div>
        <div class="estimate-total"><span>Estimated total</span><span class="estimate-total-value" id="estTotal">$0.00</span></div>
      </div>
    </div>

    <div class="card step2" id="step2Card">
      <div class="card-header-pill">Step 2 · Passenger details</div>
      <div class="trip-summary-line" id="summaryPickup"></div>
      <div class="trip-summary-line" id="summaryDropoff"></div>
      <div class="trip-summary-line" id="summaryDateTime"></div>
      <div class="trip-summary-line" id="summaryTotal"></div>
      <div style="height:12px;"></div>
      <div class="field-group">
        <label for="fullName">Full name</label>
        <input id="fullName" type="text" placeholder="John Doe" />
      </div>
      <div class="field-group">
        <label for="mobilePhone">Mobile phone</label>
        <input id="mobilePhone" type="tel" placeholder="+1 771 217 3111" />
      </div>
      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@example.com" />
      </div>
      <div class="field-group">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="2" placeholder="Gate codes, luggage details..."></textarea>
      </div>
      <button id="sendBookingBtn" class="primary-btn" type="button">Send reservation request</button>
      <div id="bookingMsg" class="msg"></div>
    </div>
  </div>

  <script>
    const BACKEND_BASE = 'https://jk2424-backend.onrender.com';

    function autoFormatDate(input) {
      let v = input.value.replace(/[^0-9]/g, '');
      if (v.length > 2 && v.length <= 4) v = v.slice(0, 2) + '/' + v.slice(2);
      else if (v.length > 4) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4, 8);
      input.value = v.slice(0, 10);
    }
    function autoFormatTime(input) {
      let v = input.value.replace(/[^0-9]/g, '');
      if (v.length > 2) v = v.slice(0, 2) + ':' + v.slice(2, 4);
      input.value = v.slice(0, 5);
    }
    document.getElementById('rideDate').addEventListener('input', function() { autoFormatDate(this); });
    document.getElementById('rideTime').addEventListener('input', function() { autoFormatTime(this); });

    let currentAmpm = 'AM';
    document.getElementById('amBtn').addEventListener('click', function() { 
        currentAmpm = 'AM'; this.classList.add('active'); document.getElementById('pmBtn').classList.remove('active'); 
    });
    document.getElementById('pmBtn').addEventListener('click', function() { 
        currentAmpm = 'PM'; this.classList.add('active'); document.getElementById('amBtn').classList.remove('active'); 
    });

    let lastQuote = null;

    document.getElementById('calcPriceBtn').addEventListener('click', async () => {
      const pickup = document.getElementById('pickup').value.trim();
      const dropoff = document.getElementById('dropoff').value.trim();
      const rideDate = document.getElementById('rideDate').value.trim();
      const rideTime = document.getElementById('rideTime').value.trim();

      if(!pickup || !dropoff || !rideDate || !rideTime) { alert("Please complete Step 1"); return; }

      try {
        const res = await fetch(`${BACKEND_BASE}/calc?pickup=${encodeURIComponent(pickup)}&dropoff=${encodeURIComponent(dropoff)}`);
        const data = await res.json();
        
        if(data.success) {
          // ✅ ADIM 2.1 — FRONTEND HESAPLAMA MANTIĞI
          const miles = Number(data.miles);
          const baseFare = 65;
          const includedMiles = 15;
          const extraPerMile = 2;
          const extraMiles = Math.max(0, miles - includedMiles);
          const totalPrice = baseFare + (extraMiles * extraPerMile);

          document.getElementById('estimateEmptyText').style.display = 'none';
          document.getElementById('estimateDetails').style.display = 'block';
          document.getElementById('estDistance').innerText = miles + " miles";
          document.getElementById('estTotal').innerText = "$" + totalPrice.toFixed(2);
          
          document.getElementById('summaryPickup').innerText = "From: " + pickup;
          document.getElementById('summaryDropoff').innerText = "To: " + dropoff;
          document.getElementById('summaryDateTime').innerText = `At: ${rideDate} ${rideTime} ${currentAmpm}`;
          document.getElementById('summaryTotal').innerText = "Price: $" + totalPrice.toFixed(2);
          
          document.getElementById('step2Card').classList.add('visible');
          
          // ✅ lastQuote'a hesaplanan totalPrice'ı atıyoruz
          lastQuote = { pickup, dropoff, rideDate, rideTime, ampm: currentAmpm, total: totalPrice.toFixed(2), miles: miles };
        }
      } catch (e) { alert("Calc error"); }
    });

    document.getElementById('sendBookingBtn').addEventListener('click', async () => {
      const name = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('mobilePhone').value.trim();
      const email = document.getElementById('email').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if(!name || !phone || !email) { alert("Missing info"); return; }

      localStorage.setItem("jk2424_last_quote", JSON.stringify({
        ...lastQuote, customerName: name, customerPhone: phone, customerEmail: email, notes: notes
      }));

      try {
        const res = await fetch(`${BACKEND_BASE}/bookings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...lastQuote, customerName: name, customerPhone: phone, customerEmail: email, notes })
        });
        const data = await res.json();

        if (data.success && data.booking && data.booking.id) {
          localStorage.setItem("jk2424_booking_id", data.booking.id);
          window.location.href = "track.html?id=" + data.booking.id;
        } else {
          alert("Booking failed at server.");
        }
      } catch (e) { alert("Network error."); }
    });
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAbHskisKfYgRuNTcVm6pTnFy_iDlWf0bc&libraries=places" async defer></script>
  <script>
    function initAutocomplete() {
      const options = { componentRestrictions: { country: 'us' } };
      ['pickup', 'stop', 'dropoff'].forEach(id => {
        const el = document.getElementById(id);
        if (el) new google.maps.places.Autocomplete(el, options);
      });
    }
    window.onload = () => { setTimeout(initAutocomplete, 500); };
  </script>
</body>
</html>
