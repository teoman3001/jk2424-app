<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JK2424 • Admin Center</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; color:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif; }
  header { position:sticky; top:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); padding:16px; border-bottom:1px solid #333; z-index:100; display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:18px; letter-spacing:.2em; color:#f5d05c; font-weight:700; }
  
  .wrap { padding:12px; max-width:800px; margin:0 auto; }
  
  /* Pricing Section */
  .section-title { font-size:14px; color:#f5d05c; text-transform:uppercase; margin:20px 0 10px; letter-spacing:0.1em; border-bottom:1px solid #222; padding-bottom:5px; }
  .pricing-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px; background:#111; padding:15px; border-radius:12px; border:1px solid #333; margin-bottom:20px; }
  .input-group label { display:block; font-size:10px; color:#aaa; margin-bottom:4px; text-transform:uppercase; }
  .input-group input { width:100%; background:#050505; border:1px solid #444; color:#fff; padding:8px; border-radius:6px; outline:none; }
  .save-btn { background:#f5d05c; color:#000; border:none; padding:12px; border-radius:8px; font-weight:700; width:100%; cursor:pointer; margin-top:10px; }

  /* Booking Cards */
  .card { background:#111; border:1px solid #333; border-radius:16px; padding:16px; margin-bottom:14px; position:relative; }
  .route-info { font-size:14px; line-height:1.4; margin-bottom:10px; }
  .route-info strong { color:#f5d05c; }
  .map-link { display:inline-block; color:#aaa; font-size:11px; text-decoration:none; margin-bottom:10px; border:1px solid #333; padding:4px 8px; border-radius:5px; }
  .map-link:hover { background:#f5d05c; color:#000; }
  
  .customer-line { font-size:13px; margin-bottom:10px; color:#ccc; }
  .customer-line b { color:#fff; }
  
  .meta-row { display:flex; justify-content:space-between; font-size:12px; color:#888; border-top:1px solid #222; padding-top:10px; }
  .price-tag { color:#f5d05c; font-weight:700; font-size:16px; }

  .status-select { width:100%; padding:10px; background:#050505; border:1px solid #444; color:#fff; border-radius:8px; margin-top:10px; }
  .empty { text-align:center; padding:40px; color:#555; }
</style>
</head>
<body>

<header>
  <h1>JK2424 ADMIN</h1>
  <div id="syncStatus" style="font-size:10px; color:#555;">v1.4 STABLE</div>
</header>

<div class="wrap">
  <div class="section-title">Pricing Engine Settings</div>
  <div class="pricing-grid">
    <div class="input-group">
      <label>Base Fare ($)</label>
      <input type="number" id="baseFare" step="1">
    </div>
    <div class="input-group">
      <label>Included Miles</label>
      <input type="number" id="includedMiles" step="1">
    </div>
    <div class="input-group">
      <label>Extra Per Mile ($)</label>
      <input type="number" id="extraPerMile" step="0.5">
    </div>
    <div class="input-group">
      <label>Night Multiplier</label>
      <input type="number" id="nightMultiplier" step="0.05">
    </div>
    <button class="save-btn" onclick="savePricing()">UPDATE PRICING RULES</button>
  </div>

  <div class="section-title">Active Reservations</div>
  <div id="bookingList"></div>
</div>

<script>
const API_BASE = 'https://jk2424-backend.onrender.com';
const STATUS_OPTIONS = ['pending', 'confirmed', 'paid', 'on_the_way', 'arrived', 'completed', 'cancelled'];

// 1. PRICING YÜKLE
async function loadPricing() {
  try {
    const res = await fetch(`${API_BASE}/pricing`);
    const data = await res.json();
    if (data.success) {
      const s = data.pricingSettings;
      document.getElementById('baseFare').value = s.baseFare;
      document.getElementById('includedMiles').value = s.includedMiles;
      document.getElementById('extraPerMile').value = s.extraPerMile;
      document.getElementById('nightMultiplier').value = s.nightMultiplier;
    }
  } catch (e) { console.error("Pricing load error"); }
}

// 2. PRICING KAYDET
async function savePricing() {
  const payload = {
    baseFare: Number(document.getElementById('baseFare').value),
    includedMiles: Number(document.getElementById('includedMiles').value),
    extraPerMile: Number(document.getElementById('extraPerMile').value),
    nightMultiplier: Number(document.getElementById('nightMultiplier').value),
    minimumFare: Number(document.getElementById('baseFare').value)
  };

  try {
    const res = await fetch(`${API_BASE}/pricing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) alert("Pricing updated successfully!");
  } catch (e) { alert("Save failed!"); }
}

// 3. REZERVASYONLARI YÜKLE
async function loadBookings() {
  try {
    const res = await fetch(`${API_BASE}/bookings`);
    const data = await res.json();
    const container = document.getElementById('bookingList');
    
    if (!data.bookings || data.bookings.length === 0) {
      container.innerHTML = '<div class="empty">No bookings found.</div>';
      return;
    }

    container.innerHTML = data.bookings.map(b => `
      <div class="card">
        <div class="route-info">
          <strong>${b.pickup}</strong><br>
          ${b.stop ? `<small style="color:#666">→ STOP: ${b.stop}</small><br>` : ''}
          <strong>→ ${b.dropoff}</strong>
        </div>
        
        <a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(b.pickup)}&destination=${encodeURIComponent(b.dropoff)}${b.stop ? `&waypoints=${encodeURIComponent(b.stop)}` : ''}" 
           target="_blank" class="map-link">📍 View Route</a>

        <div class="customer-line">
          👤 <b>${b.customerName}</b> | <a href="tel:${b.customerPhone}" style="color:#f5d05c; text-decoration:none;">${b.customerPhone}</a>
        </div>

        <div class="meta-row">
          <span>${b.rideDate} @ ${b.rideTime} ${b.ampm}</span>
          <span class="price-tag">$${Number(b.total).toFixed(2)}</span>
        </div>

        <select class="status-select" onchange="updateStatus('${b.id}', this.value)">
          ${STATUS_OPTIONS.map(opt => `<option value="${opt}" ${opt === b.status ? 'selected' : ''}>${opt.toUpperCase()}</option>`).join('')}
        </select>
      </div>
    `).join('');
  } catch (e) { console.error("Bookings load error"); }
}

// 4. DURUM GÜNCELLE
async function updateStatus(id, newStatus) {
  try {
    await fetch(`${API_BASE}/bookings/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    loadBookings();
  } catch (e) { alert("Status update failed"); }
}

// INIT
loadPricing();
loadBookings();
setInterval(loadBookings, 20000); // 20 saniyede bir yeni sipariş kontrolü
</script>
</body>
</html>
