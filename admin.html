<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JK2424 • Admin</title>
<style>
  body{margin:0;background:#000;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto}
  header{position:sticky;top:0;background:#000;padding:14px;border-bottom:1px solid #222}
  h1{margin:0;font-size:18px;letter-spacing:.18em;color:#f5d05c}
  .wrap{padding:12px}
  .card{background:#111;border:1px solid #333;border-radius:14px;padding:12px;margin-bottom:10px}
  .row{font-size:13px;margin-bottom:4px}
  .muted{color:#aaa;font-size:11px}
  .status{margin-top:8px}
  select{width:100%;padding:10px;border-radius:10px;border:1px solid #444;background:#050505;color:#f5f5f5}
  .btn{width:100%;padding:12px;border-radius:999px;border:none;background:#f5d05c;color:#000;font-weight:700;margin-top:10px}
  .empty{padding:20px;color:#888;text-align:center}
</style>
</head>
<body>
<header><h1>ADMIN</h1></header>
<div class="wrap" id="list"></div>

<script>
const API = 'https://jk2424-backend.onrender.com';
const list = document.getElementById('list');
const STATUSES = ["pending","confirmed","paid","on_the_way","arrived","in_progress","completed"];

async function load(){
  list.innerHTML = '<div class="empty">Loading…</div>';
  const r = await fetch(API+'/bookings');
  const d = await r.json();
  if(!d.bookings || !d.bookings.length){
    list.innerHTML = '<div class="empty">No bookings</div>'; return;
  }
  list.innerHTML='';
  d.bookings.forEach(b=>{
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <div class="row"><strong>${b.pickup}</strong> → ${b.dropoff}</div>
      <div class="row muted">${b.rideDate} ${b.rideTime} ${b.ampm}</div>
      <div class="row">${b.customerName} • ${b.customerPhone}</div>
      <div class="row"><strong>$${Number(b.total).toFixed(2)}</strong></div>
      <div class="status">
        <select>
          ${STATUSES.map(s=>`<option ${s===b.status?'selected':''}>${s}</option>`).join('')}
        </select>
        <button class="btn">Update status</button>
      </div>
    `;
    const sel = el.querySelector('select');
    el.querySelector('button').onclick = async ()=>{
      await fetch(API+`/bookings/${b.id}/status`,{
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({status: sel.value})
      });
      load();
    };
    list.appendChild(el);
  });
}
load();
</script>
</body>
</html>
