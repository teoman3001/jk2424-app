<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JK2424 • Admin Center</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; color:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif; }
  header { position:sticky; top:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); padding:16px; border-bottom:1px solid #333; z-index:100; display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:18px; letter-spacing:.2em; color:#f5d05c; font-weight:700; }
  .refresh-indicator { font-size:10px; color:#666; text-transform:uppercase; letter-spacing:0.1em; }
  
  .wrap { padding:12px; max-width:600px; margin:0 auto; }
  .card { background:#111; border:1px solid #333; border-radius:16px; padding:16px; margin-bottom:14px; transition:border-color 0.2s; }
  .card:hover { border-color:#444; }
  
  /* Rota ve Harita */
  .route-info { font-size:14px; line-height:1.4; margin-bottom:10px; }
  .route-info strong { color:#f5d05c; }
  .map-btn { display:inline-flex; align-items:center; background:#1a1a1a; border:1px solid #444; color:#aaa; padding:6px 12px; border-radius:8px; font-size:12px; text-decoration:none; margin-bottom:12px; transition:all 0.2s; }
  .map-btn:hover { background:#f5d05c; color:#000; border-color:#f5d05c; }

  /* Müşteri ve İletişim */
  .customer-info { display:flex; gap:10px; margin-bottom:12px; font-size:13px; border-bottom:1px solid #222; padding-bottom:10px; }
  .customer-info a { color:#f5d05c; text-decoration:none; font-weight:600; }
  
  /* Meta Bilgileri */
  .meta-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size:12px; color:#bbb; margin-bottom:12px; }
  .meta-item b { color:#fff; }
  
  /* Notlar Bölümü */
  .notes-box { background:#0a0a0a; border-left:3px solid #f5d05c; padding:8px 10px; font-size:12px; color:#ccc; margin-bottom:15px; font-style:italic; }
  
  /* Status ve Kontrol */
  .controls { display:flex; gap:8px; align-items:center; }
  select { flex:1; padding:10px; border-radius:10px; border:1px solid #444; background:#050505; color:#f5f5f5; font-size:13px; outline:none; }
  select:focus { border-color:#f5d05c; }
  .update-btn { background:#f5d05c; color:#000; border:none; padding:10px 18px; border-radius:10px; font-weight:700; font-size:12px; cursor:pointer; text-transform:uppercase; }
  
  .empty { padding:40px; color:#666; text-align:center; font-size:14px; }
  .badge-night { background:rgba(245,208,92,0.1); color:#f5d05c; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:bold; }
</style>
</head>
<body>

<header>
  <h1>JK2424 ADMIN</h1>
  <div class="refresh-indicator" id="lastUpdate">Auto-syncing...</div>
</header>

<div class="wrap" id="list"></div>

<script>
const API = 'https://jk2424-backend.onrender.com';
const list = document.getElementById('list');
const STATUSES = ["pending","confirmed","paid","on_the_way","arrived","in_progress","completed"];

// Google Maps Link Üretici
function getGoogleMapsUrl(pickup, stop, dropoff) {
  let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(pickup)}&destination=${encodeURIComponent(dropoff)}`;
  if (stop && stop.trim().length > 0) {
    url += `&waypoints=${encodeURIComponent(stop)}`;
  }
  return url;
}

async function load() {
  try {
    const r = await fetch(API + '/bookings');
    const d = await r.json();
    
    if (!d.bookings || d.bookings.length === 0) {
      list.innerHTML = '<div class="empty">No active bookings found.</div>';
      return;
    }

    list.innerHTML = '';
    d.bookings.forEach(b => {
      const mapsUrl = getGoogleMapsUrl(b.pickup, b.stop, b.dropoff);
      const isNight = b.total > 0 && b.total > (65 + (Math.max(0, b.miles - 8) * 2)); // Basit kontrol

      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="route-info">
          <strong>${b.pickup}</strong> 
          ${b.stop ? `<br><small style="color:#888">→ STOP: ${b.stop}</small>` : ''}
          <br>→ <strong>${b.dropoff}</strong>
        </div>

        <a href="${mapsUrl}" target="_blank" class="map-btn">📍 Open in Google Maps</a>

        <div class="customer-info">
          <span>👤 ${b.customerName}</span>
          <a href="tel:${b.customerPhone}">📞 Call</a>
          <a href="mailto:${b.customerEmail || ''}">✉️ Email</a>
        </div>

        <div class="meta-grid">
          <div class="meta-item">Date: <b>${b.rideDate}</b></div>
          <div class="meta-item">Time: <b>${b.rideTime} ${b.ampm}</b></div>
          <div class="meta-item">Distance: <b>${b.miles} mi</b></div>
          <div class="meta-item">Total: <b style="color:#f5d05c">$${Number(b.total).toFixed(2)}</b></div>
        </div>

        ${b.notes ? `<div class="notes-box">" ${b.notes} "</div>` : ''}

        <div class="controls">
          <select id="status-${b.id}">
            ${STATUSES.map(s => `<option value="${s}" ${s === b.status ? 'selected' : ''}>${s.toUpperCase().replace(/_/g, ' ')}</option>`).join('')}
          </select>
          <button class="update-btn" onclick="updateStatus('${b.id}')">Update</button>
        </div>
      `;
      list.appendChild(el);
    });

    document.getElementById('lastUpdate').innerText = "Last update: " + new Date().toLocaleTimeString();
  } catch (e) {
    console.error("Load error:", e);
  }
}

async function updateStatus(id) {
  const newStatus = document.getElementById(`status-${id}`).value;
  try {
    const res = await fetch(`${API}/bookings/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    if (res.ok) {
      load();
    }
  } catch (e) {
    alert("Update failed!");
  }
}

// Polling: Her 15 saniyede bir listeyi yenile
setInterval(load, 15000);
load();
</script>
</body>
</html>
