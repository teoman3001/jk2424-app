<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JK2424 • Admin Center</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; color:#f5f5f5; font-family:sans-serif; }
  header { position:sticky; top:0; background:rgba(0,0,0,0.9); padding:16px; border-bottom:1px solid #333; z-index:100; display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:18px; color:#f5d05c; }
  .wrap { padding:12px; max-width:850px; margin:0 auto; }
  .card { background:#111; border:1px solid #333; border-radius:18px; padding:20px; margin-bottom:18px; }
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
  .act-btn { border:none; padding:12px; border-radius:10px; font-weight:800; cursor:pointer; font-size:11px; text-transform:uppercase; }
  .pricing-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:12px; background:#111; padding:18px; border-radius:14px; margin-bottom:25px; }
  input { width:100%; background:#050505; border:1px solid #444; color:#fff; padding:10px; border-radius:8px; }
</style>
</head>
<body>

<header><h1>JK2424 ADMIN CENTER</h1></header>

<div class="wrap">
  <div class="pricing-grid">
    <input type="number" id="baseFare" placeholder="Base Fare">
    <input type="number" id="extraPerMile" placeholder="Extra/Mile">
    <button style="background:#f5d05c; padding:10px; border-radius:8px;" onclick="savePricing()">Update Tariffs</button>
  </div>

  <div id="bookingList"></div>
</div>

<script>
const API_BASE = 'https://jk2424-backend.onrender.com';
const ACTION_BUTTONS = [
  { id: 'Approved', label: '✓ Approve (Show Choice)', color: '#28a745', text: '#fff' },
  { id: 'PaymentRequested', label: '💳 Request Zelle', color: '#f5d05c', text: '#000' },
  { id: 'Confirmed', label: '⭐ Confirm Booking', color: '#007bff', text: '#fff' },
  { id: 'cancelled', label: '✕ Cancel', color: '#dc3545', text: '#fff' }
];

async function loadBookings() {
  try {
    const res = await fetch(`${API_BASE}/bookings`);
    const data = await res.json();
    const container = document.getElementById('bookingList');
    container.innerHTML = data.bookings.map(b => `
      <div class="card">
        <div style="font-weight:bold; color:#f5d05c; margin-bottom:10px;">${b.customerName} - ${b.rideDate} @ ${b.rideTime}</div>
        <div style="font-size:12px; color:#aaa;">From: ${b.pickup} <br> To: ${b.dropoff}</div>
        <div style="margin-top:10px; font-weight:bold;">Status: ${b.status} | Total: $${b.total}</div>
        <div class="action-grid">
          ${ACTION_BUTTONS.map(btn => `<button class="act-btn" onclick="updateStatus('${b.id}', '${btn.id}')" style="background:${btn.color}; color:${btn.text};">${btn.label}</button>`).join('')}
        </div>
      </div>
    `).join('');
  } catch (e) {}
}

async function updateStatus(id, newStatus) {
  try {
    const res = await fetch(`${API_BASE}/update-booking`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, status: newStatus })
    });
    if (res.ok) loadBookings();
  } catch (e) {}
}

loadBookings();
setInterval(loadBookings, 10000);
</script>
</body>
</html>
