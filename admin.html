<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JK2424 • Admin Center</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; color:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif; }
  header { position:sticky; top:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); padding:16px; border-bottom:1px solid #333; z-index:100; display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:18px; letter-spacing:.2em; color:#f5d05c; font-weight:700; }
  .wrap { padding:12px; max-width:850px; margin:0 auto; }
  .section-title { font-size:13px; color:#f5d05c; text-transform:uppercase; margin:25px 0 12px; letter-spacing:0.15em; border-bottom:1px solid #222; padding-bottom:6px; font-weight:700; }
  .pricing-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:12px; background:#111; padding:18px; border-radius:14px; border:1px solid #333; margin-bottom:25px; }
  .input-group label { display:block; font-size:10px; color:#aaa; margin-bottom:5px; text-transform:uppercase; font-weight:600; }
  .input-group input { width:100%; background:#050505; border:1px solid #444; color:#fff; padding:10px; border-radius:8px; outline:none; font-size:14px; }
  .save-btn { background:#f5d05c; color:#000; border:none; padding:14px; border-radius:10px; font-weight:800; width:100%; cursor:pointer; margin-top:10px; text-transform:uppercase; }
  .card { background:#111; border:1px solid #333; border-radius:18px; padding:20px; margin-bottom:18px; position:relative; }
  .address-block { margin-bottom:15px; border-left: 2px solid #333; padding-left:12px; }
  .addr-item { font-size:13px; margin-bottom:6px; }
  .addr-label { color:#f5d05c; font-weight:800; font-size:11px; text-transform:uppercase; display:block; }
  .map-link { display:inline-block; color:#aaa; font-size:11px; text-decoration:none; margin:5px 0 15px; border:1px solid #333; padding:5px 10px; border-radius:6px; background:#0a0a0a; }
  .cust-header { font-size:15px; color:#fff; margin-bottom:4px; font-weight:700; }
  .cust-contact { font-size:12px; color:#aaa; margin-bottom:12px; }
  .cust-contact a { color:#f5d05c; text-decoration:none; margin-right:15px; }
  .note-pill { background:#1a1500; border: 1px dashed #f5d05c; color:#f5d05c; padding:10px; border-radius:10px; font-size:12px; margin-bottom:15px; }
  .estimate-box { background:#080808; border: 1px solid #222; border-radius:12px; padding:15px; margin-bottom:15px; }
  .est-title { font-size:11px; color:#f5d05c; font-weight:800; text-transform:uppercase; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px; }
  .est-row { display:flex; justify-content:space-between; font-size:12px; color:#ccc; margin-bottom:5px; }
  .est-row b { color:#fff; }
  .est-total { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid #333; }
  .est-total-value { font-size:18px; font-weight:900; color:#f5d05c; }
  .status-select { width:100%; padding:12px; background:#000; border:1px solid #f5d05c; color:#fff; border-radius:10px; margin-top:10px; font-weight:700; cursor:pointer; }
  .status-label { font-size:10px; color:#f5d05c; text-transform:uppercase; font-weight:bold; margin-top:15px; display:block; }
</style>
</head>
<body>

<header>
  <h1>JK2424 ADMIN CENTER</h1>
  <div style="font-size:10px; color:#f5d05c; font-weight:bold;">v2.2 FINAL</div>
</header>

<div class="wrap">
  <div class="section-title">Global Pricing Engine Settings</div>
  <div class="pricing-grid">
    <div class="input-group"><label>Base Fare ($)</label><input type="number" id="baseFare"></div>
    <div class="input-group"><label>Inc. Miles</label><input type="number" id="includedMiles"></div>
    <div class="input-group"><label>Extra $/Mile</label><input type="number" id="extraPerMile"></div>
    <div class="input-group"><label>Night Mult (x)</label><input type="number" id="nightMultiplier" step="0.05"></div>
    <button class="save-btn" onclick="savePricing()">Update Tariffs</button>
  </div>

  <div class="section-title">Active Reservations</div>
  <div id="bookingList"></div>
</div>

<script>
const API_BASE = 'https://jk2424-backend.onrender.com';

const ALL_STATUSES = [
  "pending", "confirmed", "payment_sent", "paid", 
  "on_the_way", "arrived", "in_progress", "completed", "cancelled"
];

async function loadPricing() {
  try {
    const res = await fetch(`${API_BASE}/pricing`);
    const data = await res.json();
    if (data.success) {
      const s = data.pricingSettings;
      document.getElementById('baseFare').value = s.baseFare;
      document.getElementById('includedMiles').value = s.includedMiles;
      document.getElementById('extraPerMile').value = s.extraPerMile;
      document.getElementById('nightMultiplier').value = s.nightMultiplier;
    }
  } catch (e) { console.error("Pricing Load Error"); }
}

async function savePricing() {
  const payload = {
    baseFare: Number(document.getElementById('baseFare').value),
    includedMiles: Number(document.getElementById('includedMiles').value),
    extraPerMile: Number(document.getElementById('extraPerMile').value),
    nightMultiplier: Number(document.getElementById('nightMultiplier').value),
    minimumFare: Number(document.getElementById('baseFare').value)
  };
  try {
    const res = await fetch(`${API_BASE}/pricing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) alert("✅ Tariffs Updated Successfully!");
  } catch (e) { alert("Save Failed!"); }
}

async function loadBookings() {
  try {
    const res = await fetch(`${API_BASE}/bookings`);
    const data = await res.json();
    const container = document.getElementById('bookingList');
    
    if (!data.bookings || data.bookings.length === 0) {
      container.innerHTML = '<div class="empty" style="color:#444; text-align:center;">NO RESERVATIONS FOUND</div>';
      return;
    }

    container.innerHTML = data.bookings.map(b => {
      const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(b.pickup)}&destination=${encodeURIComponent(b.dropoff)}${b.stop ? `&waypoints=${encodeURIComponent(b.stop)}` : ''}`;

      const optionsHtml = ALL_STATUSES.map(st => 
        `<option value="${st}" ${b.status === st ? 'selected' : ''}>${st.toUpperCase().replace('_', ' ')}</option>`
      ).join('');

      return `
      <div class="card">
        <div class="address-block">
          <div class="addr-item"><span class="addr-label">PICKUP</span><span class="addr-text">${b.pickup}</span></div>
          ${b.stop ? `<div class="addr-item"><span class="addr-label">EXTRA STOP</span><span class="addr-text">${b.stop}</span></div>` : ''}
          <div class="addr-item"><span class="addr-label">DROP-OFF</span><span class="addr-text">${b.dropoff}</span></div>
        </div>
        
        <a href="${mapsUrl}" target="_blank" class="map-link">📍 Open in Google Maps</a>

        <div class="cust-header">👤 ${b.customerName}</div>
        <div class="cust-contact">
          <a href="tel:${b.customerPhone}">📞 ${b.customerPhone}</a>
          <a href="mailto:${b.customerEmail}">✉️ ${b.customerEmail || 'No Email'}</a>
        </div>

        ${b.notes ? `<div class="note-pill"><b>NOTE:</b><br>${b.notes}</div>` : ''}

        <div class="estimate-box">
          <div class="est-title">Logistics & Estimate</div>
          <div class="est-row"><span>Time:</span><b>${b.rideDate} @ ${b.rideTime} ${b.ampm}</b></div>
          <div class="est-row"><span>Distance:</span><b>${b.miles} mi</b></div>
          <div class="est-row"><span>Night Rate:</span><b>${b.nightApplied ? 'YES' : 'NO'}</b></div>
          <div class="est-total">
            <span style="font-size:13px; font-weight:700; color:#fff;">TOTAL EST.</span>
            <span class="est-total-value">$${Number(b.total).toFixed(2)}</span>
          </div>
        </div>

        <span class="status-label">Update Status</span>
        <select class="status-select" onchange="updateStatus('${b.id}', this.value)">
          ${optionsHtml}
        </select>
      </div>
      `;
    }).join('');
  } catch (e) { console.error("Bookings Error"); }
}

async function updateStatus(id, newStatus) {
  if(!newStatus) return;
  try {
    await fetch(`${API_BASE}/bookings/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
  } catch (e) { alert("Connection Failed"); }
}

loadPricing();
loadBookings();
setInterval(loadBookings, 15000); 
</script>
</body>
</html>
