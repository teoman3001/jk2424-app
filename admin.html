<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Teoman Deveci</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #222; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .btn { padding: 10px 20px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; margin-right: 5px; margin-bottom: 5px; }
        .btn-gold { background: #f5d05c; color: #000; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .status { padding: 5px 10px; border-radius: 5px; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .status-pending { background: #f39c12; color: #fff; }
        .status-confirmed { background: #3498db; color: #fff; }
        .status-completed { background: #27ae60; color: #fff; }
        
        /* Akış Kontrol Alanı */
        .flow-controls { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .timer-display { font-size: 24px; color: #f5d05c; font-family: monospace; text-align: center; margin: 10px 0; }
        h1 { color: #f5d05c; }
    </style>
</head>
<body>
    <h1>TEOMAN DEVECI - ADMIN</h1>
    <button onclick="loadBookings()" class="btn btn-blue">Yenile</button>
    
    <div id="list"></div>

    <script>
        const BACKEND = 'http://localhost:3000'; // Sunucu adresi
        let bookings = [];

        async function loadBookings() {
            try {
                const res = await fetch(`${BACKEND}/admin/bookings`);
                const data = await res.json();
                if(data.success) {
                    bookings = data.bookings.sort((a,b) => b.id - a.id);
                    render();
                }
            } catch(e) { alert("Sunucu hatası"); }
        }

        async function updateStatus(id, status) {
            if(!confirm(`Statüyü '${status}' olarak güncelle?`)) return;
            
            // Eğer "Yola Çık" (on_the_way) ise Google Maps'i özel aç
            if(status === 'on_the_way') {
                const booking = bookings.find(b => b.id === id);
                if(booking) openSmartMap(booking);
            }

            await fetch(`${BACKEND}/bookings/${id}/status`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status })
            });
            loadBookings();
        }

        function openSmartMap(b) {
            // MANTIK: Origin = Current Location (boş bırakınca maps kendi konumunu alır)
            // Waypoint (Durak) = Pickup
            // Destination = Dropoff
            const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(b.dropoff)}&waypoints=${encodeURIComponent(b.pickup)}&travelmode=driving`;
            window.open(url, '_blank');
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = bookings.map(b => {
                let controls = '';
                
                // AKIŞ MANTIĞI
                if(b.status === 'confirmed' || b.status === 'paid' || b.status === 'payment_sent') {
                    controls = `<button class="btn btn-gold" onclick="updateStatus(${b.id}, 'on_the_way')">🚗 YOLA ÇIK (Navigasyon Başlat)</button>`;
                } else if (b.status === 'on_the_way') {
                    controls = `<button class="btn btn-blue" onclick="updateStatus(${b.id}, 'arrived')">📍 GELDİM (Kapıdayım)</button>`;
                } else if (b.status === 'arrived') {
                    controls = `
                        <div class="timer-display">Bekleniyor...</div>
                        <button class="btn btn-green" onclick="updateStatus(${b.id}, 'in_progress')">▶️ MÜŞTERİYİ ALDIM (Yolculuğu Başlat)</button>
                    `;
                } else if (b.status === 'in_progress') {
                    controls = `
                        <div class="timer-display">Yolculuk Sürüyor...</div>
                        <button class="btn btn-red" onclick="updateStatus(${b.id}, 'completed')">🏁 VARDIM (Yolculuğu Bitir)</button>
                    `;
                } else if (b.status === 'completed') {
                    // İstatistik Göster
                    const waitTime = b.waitTimeSeconds ? Math.floor(b.waitTimeSeconds / 60) + ' dk' : '0 dk';
                    controls = `<div style="color:#aaa; font-size:12px;">Tamamlandı. Bekleme: ${waitTime}. Tutar: $${b.total}</div>`;
                }

                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>#${b.id} - ${b.customerName}</strong>
                        <span class="status status-${b.status}">${b.status}</span>
                    </div>
                    <div style="font-size:12px; color:#ccc; margin:10px 0;">
                        <div>Pickup: ${b.pickup}</div>
                        <div>Dropoff: ${b.dropoff}</div>
                        <div>Tarih: ${b.rideDate} ${b.rideTime}</div>
                        <div>Tel: ${b.customerPhone}</div>
                        <div>Not: ${b.notes || '-'}</div>
                    </div>
                    <div class="flow-controls">
                        ${controls}
                    </div>
                </div>
                `;
            }).join('');
        }

        loadBookings();
        setInterval(loadBookings, 10000); // Her 10 saniyede bir güncelle
    </script>
</body>
</html>
