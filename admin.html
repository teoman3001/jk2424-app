<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><title>JK2424 • Admin Center</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; color:#f5f5f5; font-family:sans-serif; }
  header { position:sticky; top:0; background:rgba(0,0,0,0.9); padding:16px; border-bottom:1px solid #333; z-index:100; display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:18px; color:#f5d05c; }
  .wrap { padding:12px; max-width:850px; margin:0 auto; }
  .card { background:#111; border:1px solid #333; border-radius:18px; padding:20px; margin-bottom:18px; }
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
  .act-btn { border:none; padding:12px; border-radius:10px; font-weight:800; cursor:pointer; font-size:11px; text-transform:uppercase; color:#fff; }
</style>
</head>
<body>
<header><h1>JK2424 ADMIN CENTER</h1></header>
<div class="wrap">
  <div id="bookingList"></div>
</div>
<script>
const API_BASE = 'https://jk2424-backend.onrender.com';
const ACTIONS = [
  { id: 'Approved', label: '✓ Approve (Choice)', color: '#28a745' },
  { id: 'PaymentRequested', label: '💳 Request Zelle', color: '#f5d05c' },
  { id: 'Confirmed', label: '⭐ Confirm Ride', color: '#007bff' },
  { id: 'cancelled', label: '✕ Cancel', color: '#dc3545' }
];

async function loadBookings() {
  try {
    const res = await fetch(`${API_BASE}/bookings`);
    const data = await res.json();
    document.getElementById('bookingList').innerHTML = data.bookings.map(b => `
      <div class="card">
        <div style="color:#f5d05c; font-weight:bold; margin-bottom:10px;">
          ${b.customerName || 'No Name'} - ${b.rideDate || 'No Date'} @ ${b.rideTime || ''}
        </div>
        <div style="font-size:12px; color:#aaa;">${b.pickup} ➔ ${b.dropoff}</div>
        <div style="background:#050505; padding:10px; border-radius:10px; margin:10px 0; font-size:11px; color:#f5d05c;">NOTE: ${b.notes || 'No note'}</div>
        <div style="font-weight:bold;">Status: ${b.status.toUpperCase()} | Total: $${b.total}</div>
        <div class="action-grid">
          ${ACTIONS.map(a => `<button class="act-btn" onclick="updateStatus('${b.id}', '${a.id}')" style="background:${a.color}; color:${a.id==='PaymentRequested'?'#000':'#fff'}">${a.label}</button>`).join('')}
        </div>
      </div>
    `).join('');
  } catch (e) {}
}

async function updateStatus(id, newStatus) {
  try {
    await fetch(`${API_BASE}/update-booking`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, status: newStatus })
    });
    loadBookings();
  } catch (e) {}
}

loadBookings();
setInterval(loadBookings, 8000);
</script>
</body>
</html>
